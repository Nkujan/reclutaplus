/* ═══════════════════════════════════════════════════════════
   LOGO DE LA EMPRESA (modal de carga)
═══════════════════════════════════════════════════════════ */
function LogoUploadModal({ open, onClose, currentLogo, onSave }) {
  const [preview, setPreview] = useState(currentLogo);
  const [saving, setSaving] = useState(false);
  const fRef = useRef();

  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 800 * 1024) { alert("La imagen debe ser menor a 800 KB"); return; }
    const reader = new FileReader();
    reader.onload = ev => setPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const save = async () => {
    setSaving(true);
    await onSave(preview);
    setSaving(false);
  };

  return (
    <Modal open={open} onClose={onClose} title="Logo de tu empresa" width={400}>
      <div style={{ textAlign: "center" }}>
        <div onClick={() => fRef.current.click()}
          style={{ width: 120, height: 120, borderRadius: 16, margin: "0 auto 16px", border: `2px dashed ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", overflow: "hidden", background: C.bg }}>
          {preview ? <img src={preview} alt="preview" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <Camera size={28} color={C.muted} />}
        </div>
        <input ref={fRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleFile} />
        <Btn variant="secondary" size="sm" onClick={() => fRef.current.click()}>Seleccionar imagen</Btn>
        <p style={{ fontSize: 12, color: C.muted, marginTop: 8 }}>PNG o JPG · máx. 800 KB</p>
        <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 22 }}>
          <Btn variant="secondary" onClick={onClose}>Cancelar</Btn>
          <Btn onClick={save} disabled={saving}>{saving ? <><Spinner size={14} /> Guardando...</> : <><Check size={15} /> Guardar logo</>}</Btn>
        </div>
      </div>
    </Modal>
  );
}

function CompanyApp({ user, onLogout, onSubmit }) {
  const EMPTY = { tituloPuesto: "", area: "", nivelJerarquico: "", departamento: "", informaJerarquico: "", informaFuncional: "", relacionesExternas: "", relacionesInternas: "", posicionEstructural: "", misionCargo: "", responsabilidades: "", autoridades: "", educacion: { maestria: false, titulo3: false, estudiante: false, tecnologo: false, bachiller: false, primaria: false, educacionEn: "" }, experiencia: { sinExp: false, exp12: false, exp35: false, exp5: false, expEn: "" }, formacion: { cert1: "", cert2: "" }, requerimientos: { req1: "", req2: "", req3: "" }, lugarTrabajo: { teletrabajo: "", oficina: "", obras: "", bodegas: "" }, herramientas: { extTelefonica: false, correoInterno: false, llamadasExt: false, compEscritorio: false, uniforme: false, compPortatil: false, credencial: false, celular: false, epp: false, radio: false, vehiculo: false } };
  const [form, setForm] = useState(EMPTY);
  const [submitted, setSubmitted] = useState(false);
  const [sending, setSending] = useState(false);
  // Chat de ayuda
  const [chatOpen, setChatOpen] = useState(false);
  const [chatMsg, setChatMsg] = useState("");
  const [chatSending, setChatSending] = useState(false);
  const [chatSent, setChatSent] = useState(false);

  // Navegación interna del portal de empresa
  const [companyView, setCompanyView] = useState("landing"); // landing | positionRequest | profileForm
  const goToLanding = () => setCompanyView("landing");

  // Logo de la empresa
  const [companyLogo, setCompanyLogo] = useState(user.logoUrl || null);
  const [logoModalOpen, setLogoModalOpen] = useState(false);
  const handleLogoSave = async dataUri => {
    await db.update("users", user.id, { logo_url: dataUri });
    setCompanyLogo(dataUri);
    setLogoModalOpen(false);
  };

  // Encuesta de satisfacción (post-envío del formulario de cargo)
  const [surveyDone, setSurveyDone] = useState(false);
  const [surveySending, setSurveySending] = useState(false);
  const handleSurveySubmit = async data => {
    setSurveySending(true);
    if (data) {
      const surveyOk = await db.insert("satisfaction_surveys", {
        id: uid(), company_id: user.id, company_name: user.companyName || user.name,
        q1_facilidad: data.q1, q2_satisfaccion: data.q2, q3_recomendaria: data.q3, comentario: data.comment || null,
      });
      if (!surveyOk) console.warn("Survey insert failed silently");
    }
    setSurveySending(false);
    setSurveyDone(true);
  };

  const sendChat = async () => {
    if (!chatMsg.trim()) return;
    setChatSending(true);
    try {
      await db.insert("consultations", {
        id: uid(),
        company_id: user.id,
        company_name: user.companyName || user.name,
        message: chatMsg.trim(),
        read: false,
      });
      const text = encodeURIComponent(
        `💼 Consulta de ${user.companyName || user.name}:

${chatMsg.trim()}

_(enviado desde ReclutaPlus)_`
      );
      window.open("https://wa.me/" + WA_NUMBER + "?text=" + text, "_blank");
      setChatSent(true);
      setChatMsg("");
      setTimeout(() => setChatSent(false), 4000);
    } catch (e) {
      alert("Error al enviar. Intenta de nuevo.");
    }
    setChatSending(false);
  };
  const setF = k => e => setForm(f => ({ ...f, [k]: e.target.value }));
  const setNested = (parent, k) => e => { const v = e.target.type === "checkbox" ? e.target.checked : e.target.value; setForm(f => ({ ...f, [parent]: { ...f[parent], [k]: v } })); };
  const handleSubmit = async () => {
    if (!form.tituloPuesto.trim()) { alert('El campo "Título del Puesto" es requerido'); return; }
    setSending(true);
    await onSubmit(form);
    setSending(false); setSubmitted(true);
  };
  const lugarTotal = Object.values(form.lugarTrabajo).reduce((a, v) => a + (parseInt(v) || 0), 0);

  // Después de enviar el formulario de cargo: primero la encuesta, luego el agradecimiento final
  if (submitted && !surveyDone) return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <CompanyHeader user={user} onLogout={onLogout} onBack={null} companyLogo={companyLogo} onOpenLogoModal={() => setLogoModalOpen(true)} />
      <SurveyScreen onSubmitSurvey={handleSurveySubmit} sending={surveySending} />
      <ChatWidget user={user} chatOpen={chatOpen} setChatOpen={setChatOpen} chatMsg={chatMsg} setChatMsg={setChatMsg} chatSending={chatSending} chatSent={chatSent} sendChat={sendChat} />
      {logoModalOpen && <LogoUploadModal open={logoModalOpen} onClose={() => setLogoModalOpen(false)} currentLogo={companyLogo} onSave={handleLogoSave} />}
    </div>
  );

  if (submitted && surveyDone) return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <Card className="fade-in" style={{ maxWidth: 480, textAlign: "center", padding: 52 }}>
        <div style={{ width: 72, height: 72, background: C.successL, borderRadius: "50%", margin: "0 auto 20px", display: "flex", alignItems: "center", justifyContent: "center" }}><Check size={36} color={C.success} /></div>
        <h2 style={{ color: C.text, marginBottom: 10 }}>¡Formulario enviado!</h2>
        <p style={{ color: C.muted, marginBottom: 24, lineHeight: 1.6 }}>Tu solicitud fue recibida exitosamente. La consultora se comunicará contigo a la brevedad.</p>
        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
          <Btn variant="secondary" onClick={() => { setSubmitted(false); setSurveyDone(false); setForm(EMPTY); }}>Enviar otro formulario</Btn>
          <Btn onClick={() => { setSubmitted(false); setSurveyDone(false); setForm(EMPTY); goToLanding(); }}>Volver al menú</Btn>
        </div>
      </Card>
      <ChatWidget user={user} chatOpen={chatOpen} setChatOpen={setChatOpen} chatMsg={chatMsg} setChatMsg={setChatMsg} chatSending={chatSending} chatSent={chatSent} sendChat={sendChat} />
    </div>
  );

  // Pantalla de inicio: dos grandes opciones
  if (companyView === "landing") return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <CompanyHeader user={user} onLogout={onLogout} onBack={null} companyLogo={companyLogo} onOpenLogoModal={() => setLogoModalOpen(true)} />
      <CompanyLanding onSelectPositionRequest={() => setCompanyView("positionRequest")} onSelectProfileForm={() => setCompanyView("profileForm")} />
      <ChatWidget user={user} chatOpen={chatOpen} setChatOpen={setChatOpen} chatMsg={chatMsg} setChatMsg={setChatMsg} chatSending={chatSending} chatSent={chatSent} sendChat={sendChat} />
      {logoModalOpen && <LogoUploadModal open={logoModalOpen} onClose={() => setLogoModalOpen(false)} currentLogo={companyLogo} onSave={handleLogoSave} />}
    </div>
  );

  // Pantalla: tipo y número de posiciones requeridas
  if (companyView === "positionRequest") return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <CompanyHeader user={user} onLogout={onLogout} onBack={goToLanding} companyLogo={companyLogo} onOpenLogoModal={() => setLogoModalOpen(true)} />
      <PositionRequestForm user={user} onBack={goToLanding} />
      <ChatWidget user={user} chatOpen={chatOpen} setChatOpen={setChatOpen} chatMsg={chatMsg} setChatMsg={setChatMsg} chatSending={chatSending} chatSent={chatSent} sendChat={sendChat} />
      {logoModalOpen && <LogoUploadModal open={logoModalOpen} onClose={() => setLogoModalOpen(false)} currentLogo={companyLogo} onSave={handleLogoSave} />}
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <CompanyHeader user={user} onLogout={onLogout} onBack={companyView !== "landing" ? () => goToLanding() : null} companyLogo={companyLogo} onOpenLogoModal={() => setLogoModalOpen(true)} />
      <div style={{ maxWidth: 860, margin: "0 auto", padding: "32px 20px 60px" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ display: "inline-block", background: "#fff", border: `1.5px solid ${C.border}`, borderRadius: 8, padding: "4px 16px", fontSize: 12, color: C.muted, marginBottom: 14 }}>Código: MAN-GTH-001 · Versión 01 · Fecha: {new Date().toLocaleDateString("es-EC")}</div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 8 }}>Manual de Funciones del Cargo</h1>
          <p style={{ color: C.muted, fontSize: 14 }}>Complete el formulario con la información del cargo requerido</p>
        </div>

        <SH n="I" title="IDENTIFICACIÓN DEL CARGO" />
        <SB>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
            <div><label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: "block", marginBottom: 5, textTransform: "uppercase", letterSpacing: "0.04em" }}>Título del puesto <span style={{ color: C.danger }}>*</span></label><input value={form.tituloPuesto} onChange={setF("tituloPuesto")} style={{ ...inputSt }} /></div>
            <div><label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: "block", marginBottom: 5, textTransform: "uppercase", letterSpacing: "0.04em" }}>Área</label><input value={form.area} onChange={setF("area")} style={{ ...inputSt }} /></div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
            <div><label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: "block", marginBottom: 5, textTransform: "uppercase", letterSpacing: "0.04em" }}>Nivel jerárquico</label><input value={form.nivelJerarquico} onChange={setF("nivelJerarquico")} style={{ ...inputSt }} /></div>
            <div><label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: "block", marginBottom: 5, textTransform: "uppercase", letterSpacing: "0.04em" }}>Departamento</label><input value={form.departamento} onChange={setF("departamento")} style={{ ...inputSt }} /></div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.04em" }}>Informa a:</div>
              {[["Jerárquico", "informaJerarquico"], ["Funcional", "informaFuncional"]].map(([l, k]) => <div key={k} style={{ marginBottom: 10 }}><label style={{ fontSize: 12, color: C.muted, display: "block", marginBottom: 4 }}>{l}:</label><input value={form[k]} onChange={setF(k)} style={{ ...inputSt }} /></div>)}
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.04em" }}>Relaciones:</div>
              {[["Externas", "relacionesExternas"], ["Internas", "relacionesInternas"]].map(([l, k]) => <div key={k} style={{ marginBottom: 10 }}><label style={{ fontSize: 12, color: C.muted, display: "block", marginBottom: 4 }}>{l}:</label><input value={form[k]} onChange={setF(k)} style={{ ...inputSt }} /></div>)}
            </div>
          </div>
        </SB>

        <SH n="II" title="POSICIÓN ESTRUCTURAL" />
        <SB><textarea value={form.posicionEstructural} onChange={setF("posicionEstructural")} rows={4} placeholder="Describe la posición dentro de la estructura organizacional..." style={{ ...inputSt, resize: "vertical" }} /></SB>

        <SH n="III" title="MISIÓN DEL CARGO" />
        <SB><textarea value={form.misionCargo} onChange={setF("misionCargo")} rows={4} placeholder="Describe la misión principal del cargo..." style={{ ...inputSt, resize: "vertical" }} /></SB>

        <SH n="IV" title="RESPONSABILIDADES & AUTORIDADES DEL CARGO" />
        <SB>
          <div style={{ marginBottom: 14 }}><label style={{ fontSize: 12, fontWeight: 700, color: C.text, display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.04em" }}>Responsabilidades:</label><textarea value={form.responsabilidades} onChange={setF("responsabilidades")} rows={4} placeholder="Lista las principales responsabilidades..." style={{ ...inputSt, resize: "vertical" }} /></div>
          <div><label style={{ fontSize: 12, fontWeight: 700, color: C.text, display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.04em" }}>Autoridades:</label><textarea value={form.autoridades} onChange={setF("autoridades")} rows={3} placeholder="Describe las autoridades y niveles de decisión..." style={{ ...inputSt, resize: "vertical" }} /></div>
        </SB>

        <SH n="V" title="COMPETENCIAS" />
        <SB>
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.04em" }}>Educación formal</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
              {[["maestria", "Maestría"], ["titulo3", "Título universitario (3er nivel)"], ["estudiante", "Estudiante o egresado de carreras universitarias"], ["tecnologo", "Tecnólogo"], ["bachiller", "Educación Secundaria Completa (Bachiller)"], ["primaria", "Educación Primaria Completa"]].map(([k, l]) => <Cb key={k} label={l} checked={form.educacion[k]} onChange={setNested("educacion", k)} />)}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 10 }}>
              <span style={{ fontSize: 13, color: C.text, fontWeight: 500, whiteSpace: "nowrap" }}>Educación en:</span>
              <input value={form.educacion.educacionEn} onChange={setNested("educacion", "educacionEn")} style={{ ...inputSt }} />
            </div>
          </div>
          <div style={{ marginBottom: 16, paddingTop: 14, borderTop: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.04em" }}>Experiencia:</div>
            <div style={{ display: "flex", gap: 20, flexWrap: "wrap", marginBottom: 10 }}>
              {[["sinExp", "Sin experiencia"], ["exp12", "1-2 años"], ["exp35", "3-5 años"], ["exp5", ">5 años"]].map(([k, l]) => <Cb key={k} label={l} checked={form.experiencia[k]} onChange={setNested("experiencia", k)} />)}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 13, color: C.text, fontWeight: 500, whiteSpace: "nowrap" }}>Experiencia en:</span>
              <input value={form.experiencia.expEn} onChange={setNested("experiencia", "expEn")} style={{ ...inputSt }} />
            </div>
          </div>
          <div style={{ paddingTop: 14, borderTop: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.text, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.04em" }}>Formación: Licencias, Certificaciones o Cursos en temas asociados a:</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <input value={form.formacion.cert1} onChange={setNested("formacion", "cert1")} placeholder="Certificación / Licencia 1..." style={{ ...inputSt }} />
              <input value={form.formacion.cert2} onChange={setNested("formacion", "cert2")} placeholder="Certificación / Licencia 2..." style={{ ...inputSt }} />
            </div>
          </div>
        </SB>

        <SH n="VI" title="REQUERIMIENTOS ESPECIALES" />
        <SB>
          {[["req1", "1"], ["req2", "2"], ["req3", "3"]].map(([k, n]) => (
            <div key={k} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
              <div style={{ width: 26, height: 26, background: C.primary, color: "#fff", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>{n}</div>
              <input value={form.requerimientos[k]} onChange={setNested("requerimientos", k)} placeholder={`Requerimiento ${n}...`} style={{ ...inputSt }} />
            </div>
          ))}
        </SB>

        <SH n="VII" title="LUGAR DE TRABAJO" />
        <SB>
          <div style={{ fontSize: 12, color: C.muted, marginBottom: 10 }}>Los porcentajes deben sumar 100%</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 10 }}>
            {[["teletrabajo", "Teletrabajo"], ["oficina", "Oficina"], ["obras", "Obras"], ["bodegas", "Bodegas"]].map(([k, l]) => (
              <div key={k}>
                <label style={{ fontSize: 12, fontWeight: 600, color: C.text, display: "block", marginBottom: 5 }}>{l}</label>
                <div style={{ position: "relative" }}>
                  <input type="number" min="0" max="100" value={form.lugarTrabajo[k]} onChange={setNested("lugarTrabajo", k)} style={{ ...inputSt, paddingRight: 28 }} />
                  <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", fontSize: 13, color: C.muted }}>%</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{ padding: "9px 14px", background: lugarTotal === 100 ? C.successL : C.warningL, borderRadius: 8, fontSize: 13, color: lugarTotal === 100 ? "#065F46" : "#92400E", display: "flex", alignItems: "center", gap: 8 }}>
            {lugarTotal === 100 ? <Check size={15} color={C.success} /> : <AlertCircle size={15} />} Total: <strong>{lugarTotal}%</strong>{lugarTotal !== 100 && " — debe sumar 100%"}
          </div>
        </SB>

        <SH n="VIII" title="HERRAMIENTAS DE TRABAJO" />
        <SB>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
            {[["extTelefonica", "Extensión telefónica"], ["correoInterno", "Correo electrónico interno"], ["llamadasExt", "Llamadas al exterior"], ["compEscritorio", "Computador de escritorio"], ["uniforme", "Uniforme"], ["compPortatil", "Computador portátil"], ["credencial", "Credencial"], ["celular", "Celular asignado"], ["epp", "Equipo de protección personal EPP"], ["radio", "Radio asignado"], ["vehiculo", "Vehículo asignado"]].map(([k, l]) => <Cb key={k} label={l} checked={form.herramientas[k]} onChange={setNested("herramientas", k)} />)}
          </div>
        </SB>

        <div style={{ textAlign: "center", marginTop: 12 }}>
          <button onClick={handleSubmit} disabled={sending} style={{ background: sending ? "#94A3B8" : C.accent, color: "#fff", border: "none", borderRadius: 12, padding: "14px 44px", fontSize: 16, fontWeight: 600, cursor: sending ? "not-allowed" : "pointer", display: "inline-flex", alignItems: "center", gap: 10, fontFamily: "inherit" }}>
            {sending ? <><Spinner size={18} /> Enviando...</> : <><Check size={18} /> Enviar formulario</>}
          </button>
          <p style={{ color: C.muted, fontSize: 12, marginTop: 12 }}>Al enviar, la consultora recibirá tu solicitud de inmediato</p>
        </div>
      </div>

      <ChatWidget user={user} chatOpen={chatOpen} setChatOpen={setChatOpen} chatMsg={chatMsg} setChatMsg={setChatMsg} chatSending={chatSending} chatSent={chatSent} sendChat={sendChat} />
      {logoModalOpen && <LogoUploadModal open={logoModalOpen} onClose={() => setLogoModalOpen(false)} currentLogo={companyLogo} onSave={handleLogoSave} />}

    </div>
  );
}

  return `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="ProgId" content="Word.Document"><style>

</tr></table>

</table>

<table><tr><td class="sh">III. MISIÓN DEL CARGO</td></tr><tr><td style="min-height:80px;height:80px">${esc(data.misionCargo)}&nbsp;</td></tr></table>

  <tr><td colspan="2" class="lb">RESPONSABILIDADES:</td></tr><tr><td colspan="2">${esc(data.responsabilidades)}&nbsp;</td></tr>
  <tr><td colspan="2" class="lb">AUTORIDADES:</td></tr><tr><td colspan="2">${esc(data.autoridades)}&nbsp;</td></tr>
</table>
<table>
  <tr><td colspan="3" class="sh">V. COMPETENCIAS</td></tr>
  <tr><td class="lb" rowspan="7" style="width:22%;vertical-align:middle">EDUCACIÓN FORMAL</td><td style="width:60%">Maestría</td><td class="cb c" style="width:18%">${cb(data.educacion?.maestria)}</td></tr>
  <tr><td>Título universitario (3er nivel)</td><td class="cb c">${cb(data.educacion?.titulo3)}</td></tr>

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(() => {
    try {
      const s = localStorage.getItem("rp_session");
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  });
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("dashboard");
  const [candidates, setCandidates] = useState([]);
  const [companies, setCompanies] = useState([]);
  const [formSubmissions, setFormSubmissions] = useState([]);
  const [consultations, setConsultations] = useState([]);
  const [positionRequests, setPositionRequests] = useState([]);
  const [surveys, setSurveys] = useState([]);
  const [events, setEvents] = useState([]);

  const refreshCandidates = async () => {
    const data = await db.get("candidates", "order=created_at.desc");
    setCandidates(data.map(mapCandidate));
  };
  const refreshCompanies = async () => {
    const data = await db.get("users", "role=eq.company");
    setCompanies(data.map(mapUser));
  };
  const refreshForms = async () => {
    const data = await db.get("form_submissions", "order=submitted_at.desc");
    setFormSubmissions(data.map(mapForm));
  };
  const refreshConsultations = async () => {
    const data = await db.getConsultations();
    setConsultations(data.map(mapConsultation));
  };
  const refreshPositionRequests = async () => {
    const data = await db.get("position_requests", "order=created_at.desc");
    setPositionRequests(data.map(mapPositionRequest));
  };
  const refreshSurveys = async () => {
    const data = await db.get("satisfaction_surveys", "order=created_at.desc");
    setSurveys(data.map(mapSurvey));
  };
  const refreshEvents = async () => {
    const data = await db.get("calendar_events", "order=event_date.asc");
    setEvents(data.map(mapEvent));
  };

  useEffect(() => {
    (async () => {
      await Promise.all([refreshCandidates(), refreshCompanies(), refreshForms(), refreshConsultations(), refreshPositionRequests(), refreshSurveys(), refreshEvents()]);
      setLoading(false);
    })();
  }, []);

  const handleLogin = async (username, password) => {
    const users = await db.get("users", `username=eq.${username}&password=eq.${password}`);
    if (!users?.length) return false;
    const u = mapUser(users[0]);
    if (u.active === false) { alert("Esta cuenta está desactivada. Contacta a la consultora."); return false; }
    setUser(u);
    localStorage.setItem("rp_session", JSON.stringify(u));
    setView(u.role === "company" ? "company-form" : "dashboard");
    return true;
  };

  const handleLogout = () => {
    setUser(null);
    setView("dashboard");
    localStorage.removeItem("rp_session");
  };

  if (loading) return (
    <>
      <style>{GLOBAL_CSS}</style>
      <div style={{ minHeight: "100vh", background: C.primary, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ textAlign: "center", color: "#fff" }}>
          <img src={LOGO_SRC} alt="Norma Kuján" style={{ width: "100%", maxWidth: 280, height: "auto", display: "block", margin: "0 auto 20px" }} />
          <Spinner size={36} />
          <div style={{ fontSize: 13, opacity: 0.5, marginTop: 14 }}>Conectando a Supabase...</div>
        </div>
      </div>
    </>
  );

  if (!user) return <><style>{GLOBAL_CSS}</style><LoginPage onLogin={handleLogin} /></>;

  if (user.role === "company") return (
    <>
      <style>{GLOBAL_CSS}</style>
      <CompanyApp user={user} onLogout={handleLogout} onSubmit={async formData => {
        const sub = { id: uid(), company_id: user.id, company_name: user.companyName || user.name, form_data: formData, downloaded: false };
        await db.insert("form_submissions", sub);
        await refreshForms();
      }} />
    </>
  );

  return (
    <>
      <style>{GLOBAL_CSS}</style>
      <AdminApp
        user={user} view={view} setView={setView} onLogout={handleLogout}
        candidates={candidates} companies={companies} formSubmissions={formSubmissions}
        consultations={consultations} positionRequests={positionRequests} surveys={surveys} events={events}
        setCandidates={setCandidates}
        refreshCandidates={refreshCandidates}
        refreshCompanies={refreshCompanies}
        refreshForms={refreshForms}
        refreshConsultations={refreshConsultations}
        refreshEvents={refreshEvents}
      />
    </>
  );
}

/* ═══════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════ */
(function () {
  try {
    var boot = document.getElementById("boot");
    if (boot) boot.remove();
    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  } catch (err) {
    rpShowError("Error al renderizar la aplicación:", (err && err.message) ? err.message : String(err));
  }
})();

  </script>
</body>
</html>
