  <!-- Detector de errores: si algo falla, lo muestra en pantalla en vez de quedarse colgado -->
  <script>
    function rpShowError(msg, detail) {
      var boot = document.getElementById("boot");
      if (boot) {
        boot.innerHTML =
          '<div style="max-width:520px;padding:32px;text-align:left;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:#fff">' +
          '<div style="font-size:20px;font-weight:700;margin-bottom:12px">⚠️ No se pudo cargar la aplicación</div>' +
          '<div style="font-size:14px;line-height:1.6;opacity:.85;margin-bottom:16px">' + msg + '</div>' +
          (detail ? '<pre style="font-size:12px;background:rgba(0,0,0,.3);padding:12px;border-radius:8px;overflow:auto;white-space:pre-wrap;color:#FCA5A5">' + detail + '</pre>' : '') +
          '</div>';
      }
    }
    // Captura cualquier error de JavaScript (incluye errores de compilación de Babel)
    window.addEventListener("error", function (e) {
      rpShowError("Ocurrió un error al iniciar. Detalle técnico:", (e.message || "") + (e.filename ? "\n" + e.filename + ":" + e.lineno : ""));
    });
    // Verifica que los CDN (React/Babel) sí cargaron
    window.addEventListener("load", function () {
      setTimeout(function () {
        if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
          rpShowError("No se pudieron cargar las librerías de React desde internet. Verifica tu conexión y recarga la página. (Esta app necesita conexión a internet para funcionar.)");
        } else if (typeof Babel === "undefined") {
          rpShowError("No se pudo cargar Babel desde internet. Verifica tu conexión y recarga la página.");
        }
      }, 1500);
    });
    // Vigilante: si tras 8s sigue la pantalla de carga, diagnostica qué falló
    setTimeout(function () {
      var boot = document.getElementById("boot");
      var root = document.getElementById("root");
      if (boot && root && root.children.length === 0) {
        var faltan = [];
        if (typeof React === "undefined") faltan.push("React");
        if (typeof ReactDOM === "undefined") faltan.push("ReactDOM");
        if (typeof Babel === "undefined") faltan.push("Babel");
        if (faltan.length > 0) {
          rpShowError(
            "No se pudieron cargar estas librerías desde internet: <b>" + faltan.join(", ") + "</b>.<br><br>" +
            "Esto significa que tu red está bloqueando el acceso a los servidores (cdnjs.cloudflare.com). " +
            "Prueba con otra conexión (por ejemplo, datos móviles) o revisa si un firewall/antivirus está bloqueando el acceso."
          );
        } else {
          rpShowError(
            "Las librerías cargaron, pero la aplicación no se renderizó (posible error de compilación del código). " +
            "Abre la consola del navegador (tecla F12 → pestaña «Console») y dime qué error aparece en rojo."
          );
        }
      }
    }, 8000);
  </script>

const db = {
  async get(table, filter = "") {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?select=*${filter ? "&" + filter : ""}`, { headers: H });
      if (!r.ok) { console.error(await r.text()); return []; }
      return await r.json();
    } catch (e) { console.error(e); return []; }
  },
  async insert(table, data) {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}`, { method: "POST", headers: H, body: JSON.stringify(data) });
      if (!r.ok) { console.error(await r.text()); return null; }
      const res = await r.json();
      return Array.isArray(res) ? res[0] : res;
    } catch (e) { console.error(e); return null; }
  },
  async update(table, id, data) {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, { method: "PATCH", headers: H, body: JSON.stringify(data) });
      return r.ok;
    } catch (e) { console.error(e); return false; }
  },
  async del(table, id) {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: "DELETE", headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` },
      });
      return r.ok;
    } catch (e) { console.error(e); return false; }
  },
  async uploadCV(file, candidateId) {
    try {
      const ext = file.name.split(".").pop();
      const fileName = `${candidateId}_${Date.now()}.${ext}`;
      const r = await fetch(`${SB_URL}/storage/v1/object/cvs/${fileName}`, {
        method: "POST",
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": file.type || "application/octet-stream", "x-upsert": "true" },
        body: file,
      });
      if (!r.ok) { console.error(await r.text()); return null; }
      return `${SB_URL}/storage/v1/object/public/cvs/${fileName}`;
    } catch (e) { console.error(e); return null; }
  },
  async deleteCV(cvUrl) {
    try {
      const fileName = cvUrl.split("/cvs/").pop();
      await fetch(`${SB_URL}/storage/v1/object/cvs/${fileName}`, {
        method: "DELETE", headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` },
      });
    } catch (e) { console.error(e); }
  },
};

  const colors = { info: { bg: C.infoL, text: "#1E40AF" }, success: { bg: C.successL, text: "#065F46" }, warning: { bg: C.warningL, text: "#92400E" }, danger: { bg: C.dangerL, text: "#991B1B" }, neutral: { bg: "#F1F5F9", text: C.muted }, teal: { bg: "#CCFBF1", text: "#0F766E" } };
  const c = colors[color] || colors.info;
  return <span style={{ background: c.bg, color: c.text, padding: "3px 10px", borderRadius: 99, fontSize: 12, fontWeight: 600, display: "inline-block" }}>{children}</span>;
};

const Modal = ({ open, onClose, title, children, width = 520 }) => {
  if (!open) return null;
  return (
    <div onClick={e => e.target === e.currentTarget && onClose()} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 16 }}>
      <div className="fade-in" style={{ background: C.card, borderRadius: 16, width: "100%", maxWidth: width, maxHeight: "90vh", overflow: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.25)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "18px 24px", borderBottom: `1px solid ${C.border}`, position: "sticky", top: 0, background: C.card, zIndex: 1 }}>
          <h2 style={{ margin: 0, fontSize: 17, fontWeight: 600, color: C.text }}>{title}</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, display: "flex", padding: 4 }}><X size={20} /></button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
};

const StatCard = ({ label, value, icon: Icon, color, sub, onClick }) => (
  <div onClick={onClick} style={{ background: C.card, borderRadius: 12, padding: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", display: "flex", alignItems: "center", gap: 16, borderLeft: `4px solid ${color}`, cursor: onClick ? "pointer" : "default" }}
    onMouseEnter={e => onClick && (e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,0.1)")}
    onMouseLeave={e => onClick && (e.currentTarget.style.boxShadow = "0 1px 3px rgba(0,0,0,0.06)")}>
    <div style={{ width: 48, height: 48, borderRadius: 12, background: `${color}18`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
      <Icon size={22} color={color} />
    </div>
    <div>
      <div style={{ fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 13, color: C.muted, marginTop: 3 }}>{label}</div>
      {sub && <div style={{ fontSize: 12, color: C.accent, marginTop: 2 }}>{sub}</div>}
    </div>
  </div>
);

const Spinner = ({ size = 24 }) => <div style={{ width: size, height: size, border: "3px solid #E2E8F0", borderTopColor: C.accent, borderRadius: "50%", animation: "spin 0.7s linear infinite", display: "inline-block" }} />;

const Alert = ({ type = "error", children }) => {
  const t = { error: { bg: C.dangerL, color: C.danger }, success: { bg: C.successL, color: C.success }, info: { bg: C.infoL, color: C.info } }[type];
  return <div style={{ background: t.bg, borderRadius: 10, padding: "10px 14px", display: "flex", alignItems: "center", gap: 8, color: t.color, fontSize: 13 }}><AlertCircle size={15} style={{ flexShrink: 0 }} />{children}</div>;
};

/* ═══════════════════════════════════════════════════════════
   LOGIN PAGE
═══════════════════════════════════════════════════════════ */
function LoginPage({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if (!username || !password) { setError("Completa todos los campos"); return; }
    setLoading(true); setError("");
    const ok = await onLogin(username, password);
    if (!ok) { setError("Usuario o contraseña incorrectos"); setLoading(false); }
  };

  return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(135deg, ${C.primary} 0%, ${C.primaryL} 50%, #1a4a6e 100%)`, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div className="fade-in" style={{ background: "rgba(255,255,255,0.08)", backdropFilter: "blur(8px)", borderRadius: 20, padding: 40, width: "100%", maxWidth: 420, border: "1px solid rgba(255,255,255,0.15)" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ width: 72, height: 72, background: "rgba(13,148,136,0.25)", borderRadius: 20, margin: "0 auto 16px", display: "flex", alignItems: "center", justifyContent: "center", border: "2px solid rgba(13,148,136,0.5)" }}>
            <UserPlus size={34} color={C.accentL} />
          </div>
          <h1 style={{ color: "#fff", fontSize: 28, fontWeight: 700, letterSpacing: "-0.5px" }}>RecrutaPlus</h1>
          <p style={{ color: "rgba(255,255,255,0.55)", marginTop: 8, fontSize: 14 }}>Sistema de Gestión de Reclutamiento</p>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {[["Usuario", username, setUsername, "text", "user"], ["Contraseña", password, setPassword, "password", "lock"]].map(([lbl, val, setter, typ, icon]) => (
            <div key={lbl}>
              <div style={{ color: "rgba(255,255,255,0.75)", fontSize: 13, fontWeight: 500, marginBottom: 6 }}>{lbl}</div>
              <div style={{ position: "relative" }}>
                {icon === "user" ? <User size={15} style={{ position: "absolute", left: 13, top: "50%", transform: "translateY(-50%)", color: "rgba(255,255,255,0.4)" }} />
                                 : <Lock size={15} style={{ position: "absolute", left: 13, top: "50%", transform: "translateY(-50%)", color: "rgba(255,255,255,0.4)" }} />}
                <input type={typ} value={val} onChange={e => setter(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()}
                  placeholder={typ === "password" ? "••••••••" : "Ingresa tu usuario"}
                  style={{ width: "100%", background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 10, padding: "11px 12px 11px 40px", fontSize: 14, color: "#fff", outline: "none", fontFamily: "inherit" }} />
              </div>
            </div>
          ))}
          {error && <Alert type="error">{error}</Alert>}
          <button onClick={handleSubmit} disabled={loading}
            style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 10, padding: "13px", fontSize: 15, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 6, fontFamily: "inherit", opacity: loading ? 0.7 : 1 }}>
            {loading ? <><Spinner size={18} /> Ingresando...</> : "Ingresar al sistema"}
          </button>
        </div>
        <p style={{ textAlign: "center", color: "rgba(255,255,255,0.25)", fontSize: 11, marginTop: 24 }}>© 2025 RecrutaPlus · Consultoría de Talento Humano</p>
      </div>
      <style>{`input::placeholder{color:rgba(255,255,255,0.3)!important}`}</style>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   CANDIDATES VIEW
═══════════════════════════════════════════════════════════ */
const STATUS_OPTS = ["Activo", "En proceso", "Seleccionado", "Descartado"];
const STATUS_COLOR = { Activo: "success", "En proceso": "info", Seleccionado: "teal", Descartado: "danger" };

function CandidatesView({ candidates, setCandidates, refreshCandidates }) {
  const [search, setSearch] = useState("");
  const [posFilter, setPosFilter] = useState("");
  const [statusFilter, setStatusFilter] = useState("");
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [saving, setSaving] = useState(false);
  const positions = [...new Set(candidates.map(c => c.position).filter(Boolean))];

  const filtered = candidates.filter(c => {
    const q = search.toLowerCase();
    return (!q || [c.name, c.email, c.position, c.skills].some(f => f?.toLowerCase().includes(q)))
      && (!posFilter || c.position === posFilter)
      && (!statusFilter || c.status === statusFilter);
  });

  const handleDelete = async id => {
    if (!confirm("¿Eliminar este candidato?")) return;
    const cand = candidates.find(c => c.id === id);
    if (cand?.cvUrl) await db.deleteCV(cand.cvUrl);
    await db.del("candidates", id);
    await refreshCandidates();
  };

  const handleSave = async (data, cvFile) => {
    setSaving(true);
    try {
      const isNew = !editing;
      const id = editing?.id || uid();
      let cvUrl = data.cvUrl || null;
      let cvFileName = data.cvFileName || null;

      if (cvFile) {
        if (editing?.cvUrl) await db.deleteCV(editing.cvUrl);
        const url = await db.uploadCV(cvFile, id);
        if (url) { cvUrl = url; cvFileName = cvFile.name; }
      }

      const dbData = {
        id, name: data.name, email: data.email || null, phone: data.phone || null,
        position: data.position || null, status: data.status || "Activo",
        skills: data.skills || null, notes: data.notes || null,
        cv_file_name: cvFileName, cv_url: cvUrl, cv_text: data.cvText || null,
      };

      if (isNew) await db.insert("candidates", dbData);
      else await db.update("candidates", id, dbData);
      await refreshCandidates();
    } catch (e) { console.error(e); alert("Error al guardar. Intenta de nuevo."); }
    setSaving(false);
    setShowModal(false);
  };

  return (
    <div className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Candidatos</h1>
          <p style={{ color: C.muted, fontSize: 14 }}>Banco de hojas de vida en la nube ☁️ · {candidates.length} registrados</p>
        </div>
        <Btn onClick={() => { setEditing(null); setShowModal(true); }}><Plus size={16} /> Agregar candidato</Btn>
      </div>

      <Card style={{ padding: 14, marginBottom: 16 }}>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <div style={{ position: "relative", flex: 2, minWidth: 200 }}>
            <Search size={15} style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", color: C.muted }} />
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar por nombre, email, cargo o habilidades..." style={{ ...inputSt, paddingLeft: 36 }} />
          </div>
          <select value={posFilter} onChange={e => setPosFilter(e.target.value)} style={{ ...inputSt, width: "auto", minWidth: 160, color: posFilter ? C.text : C.muted }}>
            <option value="">Todos los cargos</option>
            {positions.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={{ ...inputSt, width: "auto", minWidth: 140, color: statusFilter ? C.text : C.muted }}>
            <option value="">Todos los estados</option>
            {STATUS_OPTS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          {(search || posFilter || statusFilter) && <Btn variant="ghost" size="sm" onClick={() => { setSearch(""); setPosFilter(""); setStatusFilter(""); }}><X size={14} /> Limpiar</Btn>}
        </div>
      </Card>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: C.bg, borderBottom: `1px solid ${C.border}` }}>
                {["Candidato", "Cargo", "Contacto", "Habilidades", "Estado", "Registrado", "Acciones"].map(h => (
                  <th key={h} style={{ padding: "10px 16px", textAlign: "left", fontSize: 11, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em", whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0
                ? <tr><td colSpan={7} style={{ textAlign: "center", padding: 48, color: C.muted }}>{candidates.length === 0 ? "Agrega tu primer candidato" : "Sin resultados"}</td></tr>
                : filtered.map(c => (
                  <tr key={c.id} className="rp-row" style={{ borderBottom: `1px solid ${C.border}` }}>
                    <td style={{ padding: "12px 16px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 34, height: 34, borderRadius: "50%", background: `${C.accent}20`, color: C.accent, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{(c.name || "?")[0].toUpperCase()}</div>
                        <div>
                          <div style={{ fontWeight: 500, color: C.text, fontSize: 14 }}>{c.name}</div>
                          {c.cvFileName && <div style={{ fontSize: 11, color: C.accent }}>☁️ {c.cvFileName}</div>}
                        </div>
                      </div>
                    </td>
                    <td style={{ padding: "12px 16px", fontSize: 13, color: C.text }}>{c.position || "—"}</td>
                    <td style={{ padding: "12px 16px" }}>
                      <div style={{ fontSize: 12, color: C.muted }}>{c.email || "—"}</div>
                      <div style={{ fontSize: 12, color: C.muted }}>{c.phone || ""}</div>
                    </td>
                    <td style={{ padding: "12px 16px", maxWidth: 160 }}><div style={{ fontSize: 12, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.skills || "—"}</div></td>
                    <td style={{ padding: "12px 16px" }}><Badge color={STATUS_COLOR[c.status] || "neutral"}>{c.status || "Sin estado"}</Badge></td>
                    <td style={{ padding: "12px 16px", fontSize: 12, color: C.muted, whiteSpace: "nowrap" }}>{fmtDate(c.createdAt)}</td>
                    <td style={{ padding: "12px 16px" }}>
                      <div style={{ display: "flex", gap: 5 }}>
                        {c.cvUrl && (
                          <a href={c.cvUrl} target="_blank" rel="noopener noreferrer" title="Ver CV en nueva pestaña"
                            style={{ background: `${C.accent}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: C.accent, display: "inline-flex", alignItems: "center", textDecoration: "none" }}>
                            <ExternalLink size={14} />
                          </a>
                        )}
                        <button onClick={() => { setEditing(c); setShowModal(true); }} style={{ background: `${C.info}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: C.info }}><Edit size={14} /></button>
                        <button onClick={() => handleDelete(c.id)} style={{ background: `${C.danger}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: C.danger }}><Trash2 size={14} /></button>
                      </div>
                    </td>
                  </tr>
                ))}
            </tbody>
          </table>
        </div>
      </Card>

      <CandidateModal open={showModal} onClose={() => setShowModal(false)} editing={editing} onSave={handleSave} saving={saving} />
    </div>
  );
}

function CandidateModal({ open, onClose, editing, onSave, saving }) {
  const blank = { name: "", email: "", phone: "", position: "", status: "Activo", skills: "", notes: "", cvFileName: "", cvUrl: "", cvText: "" };
  const [form, setForm] = useState(blank);
  const [cvFile, setCvFile] = useState(null);
  const fileRef = useRef();

  useEffect(() => {
    setForm(editing ? { ...blank, ...editing } : blank);
    setCvFile(null);
  }, [editing, open]);

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  const handleCV = e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { alert("El archivo debe ser menor a 10 MB"); return; }
    setCvFile(file);
    setForm(f => ({ ...f, cvFileName: file.name }));
  };

  return (
    <Modal open={open} onClose={onClose} title={editing ? "Editar candidato" : "Nuevo candidato"} width={580}>
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Inp label="Nombre completo" required value={form.name} onChange={set("name")} />
          <Inp label="Correo electrónico" type="email" value={form.email} onChange={set("email")} />
          <Inp label="Teléfono" value={form.phone} onChange={set("phone")} />
          <Inp label="Cargo al que aplica" value={form.position} onChange={set("position")} />
        </div>
        <Sel label="Estado del proceso" value={form.status} onChange={set("status")} options={STATUS_OPTS} />
        <Inp label="Habilidades / Skills" value={form.skills} onChange={set("skills")} placeholder="ej: Excel avanzado, Liderazgo, Python..." />
        <Inp label="Notas internas" value={form.notes} onChange={set("notes")} rows={2} />

        <div>
          <label style={{ fontSize: 12, fontWeight: 600, color: C.text, textTransform: "uppercase", letterSpacing: "0.04em", display: "block", marginBottom: 6 }}>Hoja de vida (CV)</label>
          <div style={{ border: `2px dashed ${C.border}`, borderRadius: 10, padding: 16, textAlign: "center", background: C.bg }}>
            {form.cvFileName ? (
              <div>
                <div style={{ color: C.accent, fontWeight: 500, fontSize: 14, marginBottom: 8 }}>☁️ {form.cvFileName}</div>
                <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
                  {form.cvUrl && (
                    <a href={form.cvUrl} target="_blank" rel="noopener noreferrer"
                      style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 13, color: C.info, textDecoration: "none" }}>
                      <ExternalLink size={13} /> Ver CV actual
                    </a>
                  )}
                  <Btn variant="ghost" size="sm" onClick={() => { setCvFile(null); setForm(f => ({ ...f, cvFileName: "", cvUrl: "" })); }}><X size={14} /> Cambiar</Btn>
                </div>
              </div>
            ) : (
              <div>
                <Upload size={22} color={C.muted} style={{ margin: "0 auto 8px" }} />
                <p style={{ color: C.muted, fontSize: 13, margin: "0 0 10px" }}>PDF, DOC, DOCX — hasta 10 MB · Se sube a la nube</p>
                <Btn variant="secondary" size="sm" onClick={() => fileRef.current.click()}>Seleccionar archivo</Btn>
              </div>
            )}
            <input ref={fileRef} type="file" accept=".pdf,.doc,.docx" style={{ display: "none" }} onChange={handleCV} />
          </div>
        </div>

        <Inp label="Resumen del CV (texto para análisis IA)" value={form.cvText} onChange={set("cvText")} rows={3}
          placeholder="Pega aquí el texto del CV o un resumen de experiencia, formación y logros..." />

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", paddingTop: 6, borderTop: `1px solid ${C.border}` }}>
          <Btn variant="secondary" onClick={onClose}>Cancelar</Btn>
          <Btn onClick={() => { if (!form.name.trim()) { alert("El nombre es requerido"); return; } onSave(form, cvFile); }} disabled={saving}>
            {saving ? <><Spinner size={14} /> {cvFile ? "Subiendo CV..." : "Guardando..."}</> : <><Check size={15} /> {editing ? "Guardar cambios" : "Agregar candidato"}</>}
          </Btn>
        </div>
      </div>
    </Modal>
  );
}

/* ═══════════════════════════════════════════════════════════
   AI ANALYSIS VIEW
═══════════════════════════════════════════════════════════ */
function AIAnalysisView({ candidates }) {
  const [selected, setSelected] = useState([]);
  const [position, setPosition] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");

  const toggle = id => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const allSelected = candidates.length > 0 && selected.length === candidates.length;

  const analyze = async () => {
    if (selected.length === 0) { setError("Selecciona al menos un candidato"); return; }
    setLoading(true); setResult(null); setError("");
    const sel = candidates.filter(c => selected.includes(c.id));
    const cvBlock = sel.map((c, i) => `
--- CANDIDATO ${i + 1}: ${c.name.toUpperCase()} ---
Cargo: ${c.position || "No especificado"} | Estado: ${c.status || "N/A"}
Habilidades: ${c.skills || "No especificadas"}
Resumen CV: ${c.cvText || "(Sin texto de CV)"}
Notas: ${c.notes || "Ninguna"}`).join("\n");

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: `Eres una consultora senior de RRHH. Analiza estos candidatos${position ? ` para el cargo de "${position}"` : ""}:\n${cvBlock}\n\nGenera un informe con:\n1. RESUMEN EJECUTIVO del pool\n2. ANÁLISIS INDIVIDUAL: fortalezas, áreas de mejora, idoneidad (Alta/Media/Baja) y calificación ★★★★★\n3. COMPARATIVA entre candidatos\n4. RECOMENDACIÓN FINAL justificada\nSé objetiva y profesional.` }] }),
      });
      const data = await resp.json();
      if (data.content?.[0]?.text) setResult(data.content[0].text);
      else setError("No se pudo obtener el análisis. Intenta de nuevo.");
    } catch { setError("Error de conexión."); }
    setLoading(false);
  };

  const download = () => {
    const blob = new Blob([`ANÁLISIS IA DE CANDIDATOS\nRecrutaPlus · ${new Date().toLocaleDateString("es-EC")}\n${"=".repeat(60)}\n\n${result}`], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `Analisis_Candidatos_${Date.now()}.txt`; a.click(); URL.revokeObjectURL(url);
  };

  return (
    <div className="fade-in">
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Análisis IA de candidatos</h1>
        <p style={{ color: C.muted, fontSize: 14 }}>Selecciona CVs y obtén un informe profesional con inteligencia artificial</p>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 20, alignItems: "start" }}>
        <div>
          <Card style={{ marginBottom: 14 }}>
            <h3 style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 12 }}>Contexto del análisis</h3>
            <Inp label="Cargo a evaluar (opcional)" value={position} onChange={e => setPosition(e.target.value)} placeholder="ej: Gerente comercial..." />
          </Card>
          <Card style={{ padding: 0, overflow: "hidden" }}>
            <div style={{ padding: "13px 16px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>Seleccionar CVs ({selected.length})</span>
              {candidates.length > 0 && <button onClick={() => setSelected(allSelected ? [] : candidates.map(c => c.id))} style={{ background: "none", border: "none", cursor: "pointer", color: C.accent, fontSize: 12, fontWeight: 500, fontFamily: "inherit" }}>{allSelected ? "Desmarcar todos" : "Seleccionar todos"}</button>}
            </div>
            {candidates.length === 0 ? <p style={{ textAlign: "center", color: C.muted, padding: "24px 16px", fontSize: 13 }}>Primero agrega candidatos</p>
              : <div style={{ maxHeight: 360, overflowY: "auto" }}>
                {candidates.map(c => (
                  <label key={c.id} style={{ display: "flex", alignItems: "center", gap: 11, padding: "10px 16px", borderBottom: `1px solid ${C.border}`, cursor: "pointer", background: selected.includes(c.id) ? `${C.accent}08` : "" }}>
                    <input type="checkbox" checked={selected.includes(c.id)} onChange={() => toggle(c.id)} style={{ accentColor: C.accent, width: 15, height: 15 }} />
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: `${C.accent}20`, color: C.accent, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 12, flexShrink: 0 }}>{(c.name || "?")[0].toUpperCase()}</div>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 500, color: C.text }}>{c.name}</div>
                      <div style={{ fontSize: 11, color: C.muted }}>{c.position || "Sin cargo"}{c.cvText ? " · texto disponible" : ""}{c.cvUrl ? " · CV ☁️" : ""}</div>
                    </div>
                  </label>
                ))}
              </div>}
            <div style={{ padding: 12, borderTop: `1px solid ${C.border}` }}>
              <Btn fullWidth onClick={analyze} disabled={loading || selected.length === 0}>
                {loading ? <><Spinner size={15} /> Analizando...</> : <><Zap size={15} /> Analizar {selected.length > 0 ? `${selected.length} CV${selected.length !== 1 ? "s" : ""}` : "CVs"}</>}
              </Btn>
            </div>
          </Card>
        </div>
        <div>
          {error && <div style={{ marginBottom: 16 }}><Alert type="error">{error}</Alert></div>}
          {loading && <Card style={{ textAlign: "center", padding: 48 }}><Spinner size={36} /><p style={{ color: C.muted, fontSize: 14, marginTop: 16 }}>Generando informe profesional...</p></Card>}
          {result && !loading && (
            <Card className="fade-in">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h3 style={{ fontSize: 16, fontWeight: 600, color: C.text }}>Resultado del análisis IA</h3>
                <Btn variant="secondary" size="sm" onClick={download}><Download size={14} /> Descargar</Btn>
              </div>
              <div style={{ background: C.bg, borderRadius: 10, padding: 20, fontSize: 13.5, lineHeight: 1.85, color: C.text, whiteSpace: "pre-wrap", maxHeight: 560, overflowY: "auto", fontFamily: "inherit" }}>{result}</div>
            </Card>
          )}
          {!result && !loading && (
            <Card style={{ textAlign: "center", padding: 56 }}>
              <Brain size={52} color={C.border} style={{ margin: "0 auto 16px" }} />
              <h3 style={{ color: C.text, marginBottom: 8, fontSize: 17 }}>Listo para analizar candidatos</h3>
              <p style={{ color: C.muted, fontSize: 14, maxWidth: 380, margin: "0 auto" }}>Selecciona candidatos del panel izquierdo y presiona "Analizar CVs".</p>
            </Card>
          )}
        </div>
      </div>
    </div>
  );
}

function FormsView({ formSubmissions, refreshForms }) {
  const [selected, setSelected] = useState(null);

  const handleDownload = async form => {
    const html = generateFormHTML(form.formData, { companyName: form.companyName, date: form.submittedAt });
    const blob = new Blob([html], { type: "application/msword;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `MAN-GTH-001_${(form.formData?.tituloPuesto || "Cargo").replace(/\s/g, "_")}_${form.companyName.replace(/\s/g, "_")}.doc`;
    a.click(); URL.revokeObjectURL(url);
    await db.update("form_submissions", form.id, { downloaded: true });
    await refreshForms();
    setSelected(prev => prev?.id === form.id ? { ...prev, downloaded: true } : prev);
  };

  const handleDelete = async id => {
    if (!confirm("¿Eliminar este formulario?")) return;
    await db.del("form_submissions", id);
    await refreshForms();
    if (selected?.id === id) setSelected(null);
  };

  return (
    <div className="fade-in">
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Formularios de cargo</h1>
        <p style={{ color: C.muted, fontSize: 14 }}>Solicitudes enviadas por tus empresas clientes · {formSubmissions.length} recibidos</p>
      </div>
      {formSubmissions.length === 0
        ? <Card style={{ textAlign: "center", padding: 56 }}>
          <FileText size={52} color={C.border} style={{ margin: "0 auto 16px" }} />
          <h3 style={{ color: C.text, marginBottom: 8 }}>Sin formularios recibidos aún</h3>
          <p style={{ color: C.muted, fontSize: 14 }}>Cuando una empresa envíe su solicitud de cargo, aparecerá aquí.</p>
        </Card>
        : <div style={{ display: "grid", gridTemplateColumns: "300px 1fr", gap: 20, alignItems: "start" }}>
          <Card style={{ padding: 0, overflow: "hidden" }}>
            {[...formSubmissions].sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt)).map(f => (
              <div key={f.id} onClick={() => setSelected(f)}
                style={{ padding: "12px 14px", borderBottom: `1px solid ${C.border}`, cursor: "pointer", background: selected?.id === f.id ? `${C.accent}08` : "", borderLeft: `3px solid ${selected?.id === f.id ? C.accent : "transparent"}` }}
                onMouseEnter={e => { if (selected?.id !== f.id) e.currentTarget.style.background = C.bg; }}
                onMouseLeave={e => { if (selected?.id !== f.id) e.currentTarget.style.background = ""; }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontWeight: 500, color: C.text, fontSize: 14 }}>{f.companyName}</div>
                    <div style={{ color: C.muted, fontSize: 12 }}>{f.formData?.tituloPuesto || "Sin título"}</div>
                    <div style={{ color: C.muted, fontSize: 11, marginTop: 2 }}>{fmtDate(f.submittedAt)}</div>
                  </div>
                  <Badge color={f.downloaded ? "neutral" : "info"}>{f.downloaded ? "Revisado" : "Nuevo"}</Badge>
                </div>
              </div>
            ))}
          </Card>
          {selected
            ? <Card className="fade-in">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
                <div>
                  <h2 style={{ fontSize: 18, fontWeight: 600, color: C.text, marginBottom: 3 }}>{selected.companyName}</h2>
                  <div style={{ color: C.muted, fontSize: 13 }}>Recibido: {fmtDate(selected.submittedAt)}</div>
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <Btn variant="danger" size="sm" onClick={() => handleDelete(selected.id)}><Trash2 size={14} /> Eliminar</Btn>
                  <Btn size="sm" onClick={() => handleDownload(selected)}><Download size={14} /> Descargar .doc</Btn>
                </div>
              </div>
              <FormPreview data={selected.formData} />
            </Card>
            : <Card style={{ textAlign: "center", padding: 48 }}>
              <Eye size={40} color={C.border} style={{ margin: "0 auto 16px" }} />
              <p style={{ color: C.muted }}>Selecciona un formulario para ver su contenido y descargarlo</p>
            </Card>}
        </div>}
    </div>
  );
}

          {[["extTelefonica", "Extensión telefónica"], ["correoInterno", "Correo electrónico interno"], ["llamadasExt", "Llamadas al exterior"], ["compEscritorio", "Computador de escritorio"], ["uniforme", "Uniforme"], ["compPortatil", "Computador portátil"], ["credencial", "Credencial"], ["celular", "Celular asignado"], ["epp", "EPP"], ["radio", "Radio asignado"], ["vehiculo", "Vehículo asignado"]].map(([k, l]) => (
            <div key={k} style={{ display: "flex", gap: 6, color: C.text }}><span>{cb(data.herramientas?.[k])}</span><span>{l}</span></div>

/* ═══════════════════════════════════════════════════════════
   COMPANIES VIEW
═══════════════════════════════════════════════════════════ */
function CompaniesView({ companies, refreshCompanies }) {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ companyName: "", username: "", password: "", email: "" });
  const [saving, setSaving] = useState(false);

  const openAdd = () => { setEditing(null); setForm({ companyName: "", username: "", password: "", email: "" }); setShowModal(true); };
  const openEdit = co => { setEditing(co); setForm({ companyName: co.companyName || "", username: co.username || "", password: co.password || "", email: co.email || "" }); setShowModal(true); };
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  const handleSave = async () => {
    if (!form.companyName || !form.username || !form.password) { alert("Completa nombre, usuario y contraseña"); return; }
    if (companies.some(c => c.username === form.username && (!editing || c.id !== editing.id))) { alert("Ese usuario ya existe"); return; }
    setSaving(true);
    const data = { username: form.username, password: form.password, role: "company", name: form.companyName, company_name: form.companyName, email: form.email || null, active: true };
    if (editing) await db.update("users", editing.id, data);
    else await db.insert("users", { ...data, id: uid() });
    await refreshCompanies();
    setSaving(false); setShowModal(false);
  };

  const handleDelete = async id => {
    if (!confirm("¿Eliminar esta empresa?")) return;
    await db.del("users", id);
    await refreshCompanies();
  };

  const toggleActive = async co => {
    await db.update("users", co.id, { active: !co.active });
    await refreshCompanies();
  };

  return (
    <div className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Empresas clientes</h1>
          <p style={{ color: C.muted, fontSize: 14 }}>Gestiona los accesos al portal de formularios</p>
        </div>
        <Btn onClick={openAdd}><Plus size={16} /> Agregar empresa</Btn>
      </div>
      {companies.length === 0
        ? <Card style={{ textAlign: "center", padding: 56 }}>

/* ═══════════════════════════════════════════════════════════
   SETTINGS VIEW
═══════════════════════════════════════════════════════════ */
function SettingsView({ user, candidates, companies, formSubmissions }) {
  const [old, setOld] = useState(""); const [neo, setNeo] = useState(""); const [conf, setConf] = useState("");
  const [msg, setMsg] = useState(null);

  const handleChange = async () => {
    if (!old || !neo || !conf) { setMsg({ t: "error", v: "Completa todos los campos" }); return; }
    if (neo !== conf) { setMsg({ t: "error", v: "Las contraseñas no coinciden" }); return; }
    if (neo.length < 6) { setMsg({ t: "error", v: "Mínimo 6 caracteres" }); return; }
    const users = await db.get("users", `id=eq.${user.id}`);
    if (!users?.length || users[0].password !== old) { setMsg({ t: "error", v: "La contraseña actual es incorrecta" }); return; }
    const ok = await db.update("users", user.id, { password: neo });
    if (ok) { setMsg({ t: "success", v: "Contraseña actualizada correctamente" }); setOld(""); setNeo(""); setConf(""); }
    else setMsg({ t: "error", v: "Error al actualizar. Intenta de nuevo." });
  };

  return (
    <div className="fade-in">
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Configuración</h1>
        <p style={{ color: C.muted, fontSize: 14 }}>Gestiona tu perfil y preferencias del sistema</p>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, maxWidth: 820 }}>
        <Card>
          <h3 style={{ fontSize: 15, fontWeight: 600, color: C.text, marginBottom: 16 }}>Cambiar contraseña</h3>
          {msg && <div style={{ marginBottom: 14 }}><Alert type={msg.t}>{msg.v}</Alert></div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Inp label="Contraseña actual" type="password" value={old} onChange={e => setOld(e.target.value)} />
            <Inp label="Nueva contraseña" type="password" value={neo} onChange={e => setNeo(e.target.value)} />
            <Inp label="Confirmar nueva contraseña" type="password" value={conf} onChange={e => setConf(e.target.value)} />
            <Btn onClick={handleChange} style={{ marginTop: 4 }}><Lock size={15} /> Actualizar contraseña</Btn>
          </div>
        </Card>
        <Card>
          <h3 style={{ fontSize: 15, fontWeight: 600, color: C.text, marginBottom: 16 }}>Estado del sistema</h3>
          {[["Versión", "RecrutaPlus v2.0 ☁️"], ["Base de datos", "Supabase (PostgreSQL)"], ["Almacenamiento CVs", "Supabase Storage"], ["Usuario", user?.username || "admin"], ["Candidatos", candidates.length], ["Empresas", companies.length], ["Formularios", formSubmissions.length]].map(([k, v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
              <span style={{ fontSize: 13, color: C.muted }}>{k}</span>
              <span style={{ fontSize: 13, fontWeight: 500, color: C.text }}>{v}</span>
            </div>
          ))}
          <div style={{ marginTop: 14, padding: "10px 14px", background: C.successL, borderRadius: 8, display: "flex", gap: 8, alignItems: "center", fontSize: 13, color: "#065F46" }}>
            <Check size={15} color={C.success} /> Conectado a Supabase correctamente
          </div>
        </Card>
      </div>
    </div>
  );
}

        <SB>

            {[["extTelefonica", "Extensión telefónica"], ["correoInterno", "Correo electrónico interno"], ["llamadasExt", "Llamadas al exterior"], ["compEscritorio", "Computador de escritorio"], ["uniforme", "Uniforme"], ["compPortatil", "Computador portátil"], ["credencial", "Credencial"], ["celular", "Celular asignado"], ["epp", "Equipo de protección personal EPP"], ["radio", "Radio asignado"], ["vehiculo", "Vehículo asignado"]].map(([k, l]) => <Cb key={k} label={l} checked={form.herramientas[k]} onChange={setNested("herramientas", k)} />)}
          </div>
        </SB>

        <div style={{ textAlign: "center", marginTop: 12 }}>
          <button onClick={handleSubmit} disabled={sending} style={{ background: sending ? "#94A3B8" : C.accent, color: "#fff", border: "none", borderRadius: 12, padding: "14px 44px", fontSize: 16, fontWeight: 600, cursor: sending ? "not-allowed" : "pointer", display: "inline-flex", alignItems: "center", gap: 10, fontFamily: "inherit" }}>
            {sending ? <><Spinner size={18} /> Enviando...</> : <><Check size={18} /> Enviar formulario</>}
          </button>
          <p style={{ color: C.muted, fontSize: 12, marginTop: 12 }}>Al enviar, la consultora recibirá tu solicitud de inmediato</p>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("dashboard");
  const [candidates, setCandidates] = useState([]);
  const [companies, setCompanies] = useState([]);
  const [formSubmissions, setFormSubmissions] = useState([]);

  const refreshCandidates = async () => {
    const data = await db.get("candidates", "order=created_at.desc");
    setCandidates(data.map(mapCandidate));
  };
  const refreshCompanies = async () => {
    const data = await db.get("users", "role=eq.company");
    setCompanies(data.map(mapUser));
  };
  const refreshForms = async () => {
    const data = await db.get("form_submissions", "order=submitted_at.desc");
    setFormSubmissions(data.map(mapForm));
  };

  useEffect(() => {
    (async () => {
      await Promise.all([refreshCandidates(), refreshCompanies(), refreshForms()]);
      setLoading(false);
    })();
  }, []);

  const handleLogin = async (username, password) => {
    const users = await db.get("users", `username=eq.${username}&password=eq.${password}`);
    if (!users?.length) return false;
    const u = mapUser(users[0]);
    if (u.active === false) { alert("Esta cuenta está desactivada. Contacta a la consultora."); return false; }
    setUser(u);
    setView(u.role === "company" ? "company-form" : "dashboard");
    return true;
  };

  const handleLogout = () => { setUser(null); setView("dashboard"); };

  if (loading) return (
    <>
      <style>{GLOBAL_CSS}</style>
      <div style={{ minHeight: "100vh", background: C.primary, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ textAlign: "center", color: "#fff" }}>
          <Spinner size={40} />
          <div style={{ fontSize: 17, fontWeight: 600, marginTop: 16 }}>RecrutaPlus</div>
          <div style={{ fontSize: 13, opacity: 0.5, marginTop: 6 }}>Conectando a Supabase...</div>
        </div>
      </div>
    </>
  );

  if (!user) return <><style>{GLOBAL_CSS}</style><LoginPage onLogin={handleLogin} /></>;

  if (user.role === "company") return (
    <>
      <style>{GLOBAL_CSS}</style>
      <CompanyApp user={user} onLogout={handleLogout} onSubmit={async formData => {
        const sub = { id: uid(), company_id: user.id, company_name: user.companyName || user.name, form_data: formData, downloaded: false };
        await db.insert("form_submissions", sub);
        await refreshForms();
      }} />
    </>
  );

  return (
    <>
      <style>{GLOBAL_CSS}</style>
      <AdminApp
        user={user} view={view} setView={setView} onLogout={handleLogout}
        candidates={candidates} companies={companies} formSubmissions={formSubmissions}
        setCandidates={setCandidates}
        refreshCandidates={refreshCandidates}
        refreshCompanies={refreshCompanies}
        refreshForms={refreshForms}
      />
    </>
  );
}
