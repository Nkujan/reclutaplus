  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; }
    /* Pantalla de carga mientras Babel compila */
    #boot {
      position: fixed; inset: 0; background: #1E3A5F;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 99999;
    }
    #boot .ring {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.2);
      border-top-color: #14B8A6; border-radius: 50%;
      animation: bootspin .7s linear infinite;
    }
    @keyframes bootspin { to { transform: rotate(360deg); } }
    #boot .t1 { font-size: 17px; font-weight: 600; margin-top: 16px; }
    #boot .t2 { font-size: 13px; opacity: .5; margin-top: 6px; }
  </style>
</head>
<body>
  <div id="boot">
    <div class="ring"></div>
    <div class="t1">Norma Kuján</div>
    <div class="t2">Cargando aplicación...</div>
  </div>
  <div id="root"></div>

  <!-- Detector de errores: si algo falla, lo muestra en pantalla en vez de quedarse colgado -->
  <script>
    function rpShowError(msg, detail) {
      var boot = document.getElementById("boot");
      if (boot) {
        boot.innerHTML =
          '<div style="max-width:520px;padding:32px;text-align:left;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:#fff">' +
          '<div style="font-size:20px;font-weight:700;margin-bottom:12px">⚠️ No se pudo cargar la aplicación</div>' +
          '<div style="font-size:14px;line-height:1.6;opacity:.85;margin-bottom:16px">' + msg + '</div>' +
          (detail ? '<pre style="font-size:12px;background:rgba(0,0,0,.3);padding:12px;border-radius:8px;overflow:auto;white-space:pre-wrap;color:#FCA5A5">' + detail + '</pre>' : '') +
          '</div>';
      }
    }
    // Captura cualquier error de JavaScript (incluye errores de compilación de Babel)
    window.addEventListener("error", function (e) {
      rpShowError("Ocurrió un error al iniciar. Detalle técnico:", (e.message || "") + (e.filename ? "\n" + e.filename + ":" + e.lineno : ""));
    });
    // Verifica que los CDN (React/Babel) sí cargaron
    window.addEventListener("load", function () {
      setTimeout(function () {
        if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
          rpShowError("No se pudieron cargar las librerías de React desde internet. Verifica tu conexión y recarga la página. (Esta app necesita conexión a internet para funcionar.)");
        } else if (typeof Babel === "undefined") {
          rpShowError("No se pudo cargar Babel desde internet. Verifica tu conexión y recarga la página.");
        }
      }, 1500);
    });
    // Vigilante: si tras 8s sigue la pantalla de carga, diagnostica qué falló
    setTimeout(function () {
      var boot = document.getElementById("boot");
      var root = document.getElementById("root");
      if (boot && root && root.children.length === 0) {
        var faltan = [];
        if (typeof React === "undefined") faltan.push("React");
        if (typeof ReactDOM === "undefined") faltan.push("ReactDOM");
        if (typeof Babel === "undefined") faltan.push("Babel");
        if (faltan.length > 0) {
          rpShowError(
            "No se pudieron cargar estas librerías desde internet: <b>" + faltan.join(", ") + "</b>.<br><br>" +
            "Esto significa que tu red está bloqueando el acceso a los servidores (cdnjs.cloudflare.com). " +
            "Prueba con otra conexión (por ejemplo, datos móviles) o revisa si un firewall/antivirus está bloqueando el acceso."
          );
        } else {
          rpShowError(
            "Las librerías cargaron, pero la aplicación no se renderizó (posible error de compilación del código). " +
            "Abre la consola del navegador (tecla F12 → pestaña «Console») y dime qué error aparece en rojo."
          );
        }
      }
    }, 8000);
  </script>

const db = {
  async get(table, filter = "") {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?select=*${filter ? "&" + filter : ""}`, { headers: H });
      if (!r.ok) { console.error(await r.text()); return []; }
      return await r.json();
    } catch (e) { console.error(e); return []; }
  },
  async insert(table, data) {
    try {
      const headers = { ...H, "Prefer": "return=minimal" };
      const r = await fetch(`${SB_URL}/rest/v1/${table}`, { method: "POST", headers, body: JSON.stringify(data) });
      if (!r.ok) {
        const errText = await r.text().catch(() => "sin detalle");
        console.error("Insert failed:", table, r.status, errText);
        // Store last error for debugging
        window._lastDbError = `[${table}] HTTP ${r.status}: ${errText}`;
        return null;
      }
      return true;
    } catch (e) {
      console.error("Insert exception:", e);
      window._lastDbError = `[${table}] Exception: ${e.message}`;
      return null;
    }
  },
  async update(table, id, data) {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, { method: "PATCH", headers: H, body: JSON.stringify(data) });
      return r.ok;
    } catch (e) { console.error(e); return false; }
  },
  async del(table, id) {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: "DELETE", headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` },
      });
      return r.ok;
    } catch (e) { console.error(e); return false; }
  },
  async uploadCV(file, candidateId) {
    try {
      const ext = file.name.split(".").pop();
      const fileName = `${candidateId}_${Date.now()}.${ext}`;
      const r = await fetch(`${SB_URL}/storage/v1/object/cvs/${fileName}`, {
        method: "POST",
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": file.type || "application/octet-stream", "x-upsert": "true" },
        body: file,
      });
      if (!r.ok) { console.error(await r.text()); return null; }
      return `${SB_URL}/storage/v1/object/public/cvs/${fileName}`;
    } catch (e) { console.error(e); return null; }
  },
  async deleteCV(cvUrl) {
    try {
      const fileName = cvUrl.split("/cvs/").pop();
      await fetch(`${SB_URL}/storage/v1/object/cvs/${fileName}`, {
        method: "DELETE", headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` },
      });
    } catch (e) { console.error(e); }
  },

  },
  async markConsultationRead(id) {
    return await this.update("consultations", id, { read: true });
  },
};

/* ═══════════════════════════════════════════════════════════
   UI COMPONENTS
═══════════════════════════════════════════════════════════ */
const Btn = ({ children, onClick, variant = "primary", size = "md", disabled, fullWidth, type = "button" }) => {
  const v = { primary: { bg: C.accent, color: "#fff", border: C.accent }, navy: { bg: C.primary, color: "#fff", border: C.primary }, secondary: { bg: "#fff", color: C.text, border: C.border }, danger: { bg: C.danger, color: "#fff", border: C.danger }, ghost: { bg: "transparent", color: C.muted, border: "transparent" } }[variant] || {};
  return (
    <button type={type} onClick={onClick} disabled={disabled} className="rp-btn"
      style={{ display: "inline-flex", alignItems: "center", gap: 6, borderRadius: 8, padding: size === "sm" ? "6px 14px" : "9px 18px", fontSize: size === "sm" ? 13 : 14, fontWeight: 500, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.5 : 1, border: `1.5px solid ${v.border}`, background: v.bg, color: v.color, width: fullWidth ? "100%" : undefined, justifyContent: fullWidth ? "center" : undefined, fontFamily: "inherit", transition: "filter 0.15s" }}>
      {children}
    </button>
  );
};

const inputSt = { border: `1.5px solid ${C.border}`, borderRadius: 8, padding: "9px 12px", fontSize: 14, color: C.text, outline: "none", background: "#fff", width: "100%", fontFamily: "inherit" };

const Inp = ({ label, value, onChange, type = "text", placeholder = "", required, disabled, rows }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
    {label && <label style={{ fontSize: 12, fontWeight: 600, color: C.text, textTransform: "uppercase", letterSpacing: "0.04em" }}>{label}{required && <span style={{ color: C.danger }}> *</span>}</label>}
    {rows ? <textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} disabled={disabled} style={{ ...inputSt, resize: "vertical" }} />
           : <input type={type} value={value} onChange={onChange} placeholder={placeholder} disabled={disabled} style={{ ...inputSt, background: disabled ? C.bg : "#fff" }} />}
  </div>
);

const Sel = ({ label, value, onChange, options, required }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
    {label && <label style={{ fontSize: 12, fontWeight: 600, color: C.text, textTransform: "uppercase", letterSpacing: "0.04em" }}>{label}{required && <span style={{ color: C.danger }}> *</span>}</label>}
    <select value={value} onChange={onChange} style={{ ...inputSt, color: value ? C.text : C.muted }}>
      <option value="">Seleccionar...</option>
      {options.map(o => <option key={o.value || o} value={o.value || o}>{o.label || o}</option>)}
    </select>
  </div>
);

const Card = ({ children, style: s = {} }) => (
  <div style={{ background: C.card, borderRadius: 12, boxShadow: "0 1px 3px rgba(0,0,0,0.06), 0 1px 8px rgba(0,0,0,0.04)", padding: 24, ...s }}>{children}</div>
);

const Badge = ({ children, color = "info" }) => {
  const colors = { info: { bg: C.infoL, text: "#1E40AF" }, success: { bg: C.successL, text: "#065F46" }, warning: { bg: C.warningL, text: "#92400E" }, danger: { bg: C.dangerL, text: "#991B1B" }, neutral: { bg: "#F1F5F9", text: C.muted }, teal: { bg: "#CCFBF1", text: "#0F766E" } };
  const c = colors[color] || colors.info;
  return <span style={{ background: c.bg, color: c.text, padding: "3px 10px", borderRadius: 99, fontSize: 12, fontWeight: 600, display: "inline-block" }}>{children}</span>;
};

const Modal = ({ open, onClose, title, children, width = 520 }) => {
  if (!open) return null;
  return (
    <div onClick={e => e.target === e.currentTarget && onClose()} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 16 }}>
      <div className="fade-in" style={{ background: C.card, borderRadius: 16, width: "100%", maxWidth: width, maxHeight: "90vh", overflow: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.25)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "18px 24px", borderBottom: `1px solid ${C.border}`, position: "sticky", top: 0, background: C.card, zIndex: 1 }}>
          <h2 style={{ margin: 0, fontSize: 17, fontWeight: 600, color: C.text }}>{title}</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: C.muted, display: "flex", padding: 4 }}><X size={20} /></button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
};

const StatCard = ({ label, value, icon: Icon, color, sub, onClick }) => (
  <div onClick={onClick} style={{ background: C.card, borderRadius: 12, padding: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.06)", display: "flex", alignItems: "center", gap: 16, borderLeft: `4px solid ${color}`, cursor: onClick ? "pointer" : "default" }}
    onMouseEnter={e => onClick && (e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,0.1)")}
    onMouseLeave={e => onClick && (e.currentTarget.style.boxShadow = "0 1px 3px rgba(0,0,0,0.06)")}>
    <div style={{ width: 48, height: 48, borderRadius: 12, background: `${color}18`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
      <Icon size={22} color={color} />
    </div>
    <div>
      <div style={{ fontSize: 28, fontWeight: 700, color: C.text, lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 13, color: C.muted, marginTop: 3 }}>{label}</div>
      {sub && <div style={{ fontSize: 12, color: C.accent, marginTop: 2 }}>{sub}</div>}
    </div>
  </div>
);

const Spinner = ({ size = 24 }) => <div style={{ width: size, height: size, border: "3px solid #E2E8F0", borderTopColor: C.accent, borderRadius: "50%", animation: "spin 0.7s linear infinite", display: "inline-block" }} />;

const Alert = ({ type = "error", children }) => {
  const t = { error: { bg: C.dangerL, color: C.danger }, success: { bg: C.successL, color: C.success }, info: { bg: C.infoL, color: C.info } }[type];
  return <div style={{ background: t.bg, borderRadius: 10, padding: "10px 14px", display: "flex", alignItems: "center", gap: 8, color: t.color, fontSize: 13 }}><AlertCircle size={15} style={{ flexShrink: 0 }} />{children}</div>;
};

function LoginPage({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if (!username || !password) { setError("Completa todos los campos"); return; }
    setLoading(true); setError("");
    const ok = await onLogin(username, password);
    if (!ok) { setError("Usuario o contraseña incorrectos"); setLoading(false); }
  };

  return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(135deg, ${C.primary} 0%, ${C.primaryL} 50%, #1a4a6e 100%)`, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
      <div className="fade-in" style={{ background: "rgba(255,255,255,0.08)", backdropFilter: "blur(8px)", borderRadius: 20, padding: 40, width: "100%", maxWidth: 420, border: "1px solid rgba(255,255,255,0.15)" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <img src={LOGO_SRC} alt="Norma Kuján · Consultoría & Coaching" style={{ width: "100%", maxWidth: 300, height: "auto", margin: "0 auto 14px", display: "block" }} />
          <p style={{ color: "rgba(255,255,255,0.55)", marginTop: 4, fontSize: 14 }}>Sistema de Gestión de Reclutamiento</p>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {[["Usuario", username, setUsername, "text", "user"], ["Contraseña", password, setPassword, "password", "lock"]].map(([lbl, val, setter, typ, icon]) => (
            <div key={lbl}>
              <div style={{ color: "rgba(255,255,255,0.75)", fontSize: 13, fontWeight: 500, marginBottom: 6 }}>{lbl}</div>
              <div style={{ position: "relative" }}>
                {icon === "user" ? <User size={15} style={{ position: "absolute", left: 13, top: "50%", transform: "translateY(-50%)", color: "rgba(255,255,255,0.4)" }} />
                                 : <Lock size={15} style={{ position: "absolute", left: 13, top: "50%", transform: "translateY(-50%)", color: "rgba(255,255,255,0.4)" }} />}
                <input type={typ} value={val} onChange={e => setter(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()}
                  placeholder={typ === "password" ? "••••••••" : "Ingresa tu usuario"}
                  style={{ width: "100%", background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 10, padding: "11px 12px 11px 40px", fontSize: 14, color: "#fff", outline: "none", fontFamily: "inherit" }} />
              </div>
            </div>
          ))}
          {error && <Alert type="error">{error}</Alert>}
          <button onClick={handleSubmit} disabled={loading}
            style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 10, padding: "13px", fontSize: 15, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 6, fontFamily: "inherit", opacity: loading ? 0.7 : 1 }}>
            {loading ? <><Spinner size={18} /> Ingresando...</> : "Ingresar al sistema"}
          </button>
        </div>
        <p style={{ textAlign: "center", color: "rgba(255,255,255,0.25)", fontSize: 11, marginTop: 24 }}>© 2025 Norma Kuján · Consultoría & Coaching</p>
      </div>
      <style>{`input::placeholder{color:rgba(255,255,255,0.3)!important}`}</style>
    </div>
  );
}

function Sidebar({ view, setView, user, onLogout, unreadConsultations=0 }) {

  return (
    <div className="desktop-sidebar sb-transition"
      style={{ width:W, background:"#0F2744", display:"flex", flexDirection:"column",

        boxShadow:"2px 0 20px rgba(0,0,0,0.2)", overflow:"hidden" }}>

      {/* ── Header ── */}
      <div style={{ padding: col?"16px 0 12px":"18px 16px 14px",
        borderBottom:"1px solid rgba(255,255,255,0.06)",
        display:"flex", flexDirection:"column", alignItems:"center", gap:10 }}>

        {/* Logo / icon */}
        {col ? (
          <div style={{ width:38, height:38, borderRadius:10,
            background:"rgba(255,255,255,0.08)", display:"flex",
            alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
            <img src={LOGO_SRC} alt="NK"
              style={{ width:32, height:32, objectFit:"contain", filter:"brightness(0) invert(1)", opacity:0.85 }}/>
          </div>
        ) : (
          <img src={LOGO_SRC} alt="Norma Kuján"
            style={{ width:"100%", maxHeight:42, objectFit:"contain", display:"block" }}/>
        )}

        {/* Toggle button */}
        <button onClick={toggle} title={col?"Expandir menú":"Colapsar menú"}
          style={{ width: col?38:32, height:24, borderRadius:6, border:"none",
            background:"rgba(255,255,255,0.07)", cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center",
            color:"rgba(255,255,255,0.45)", transition:"all .15s",
            alignSelf: col?"center":"flex-end" }}
          onMouseEnter={e=>{ e.currentTarget.style.background="rgba(255,255,255,0.12)"; e.currentTarget.style.color="rgba(255,255,255,0.8)"; }}
          onMouseLeave={e=>{ e.currentTarget.style.background="rgba(255,255,255,0.07)"; e.currentTarget.style.color="rgba(255,255,255,0.45)"; }}>
          {col ? <ChevronRight size={13}/> : <ChevronLeft size={13}/>}

      </div>

      {/* ── Nav ── */}
      <nav style={{ padding:"10px 8px", flex:1, overflowY:"auto", overflowX:"hidden" }}>
        {!col && (
          <div style={{ fontSize:9, fontWeight:700, color:"rgba(255,255,255,0.25)",
            textTransform:"uppercase", letterSpacing:"0.1em", padding:"4px 6px 8px" }}>
            Menú
          </div>
        )}
        {NAV.map(({ id, icon:Icon, label, badge }) => {
          const active = view === id;
          const showBadge = badge && unreadConsultations > 0;
          return (
            <button key={id} onClick={()=>setView(id)} title={col ? label : ""}
              style={{ width:"100%", display:"flex", alignItems:"center",
                gap: col?0:10, padding: col?"11px 0":"9px 10px",
                justifyContent: col?"center":"flex-start",
                background: active ? "rgba(255,255,255,0.1)" : "transparent",
                border:"none", borderRadius:9, cursor:"pointer",
                color: active ? "#fff" : "rgba(255,255,255,0.55)",
                marginBottom:2, fontFamily:"inherit", position:"relative",
                transition:"all .15s" }}
              onMouseEnter={e=>{ if(!active){ e.currentTarget.style.background="rgba(255,255,255,0.06)"; e.currentTarget.style.color="rgba(255,255,255,0.8)"; } }}
              onMouseLeave={e=>{ if(!active){ e.currentTarget.style.background="transparent"; e.currentTarget.style.color="rgba(255,255,255,0.55)"; } }}>

                <div style={{ position:"absolute", left:0, top:"20%", bottom:"20%",

                  borderRadius:"0 3px 3px 0" }}/>
              )}

              <Icon size={16} style={{ flexShrink:0, opacity: active?1:0.8 }}/>

                  whiteSpace:"nowrap", overflow:"hidden",
                  textOverflow:"ellipsis", flex:1, textAlign:"left" }}>

          style={{ width:"100%", display:"flex", alignItems:"center",
            justifyContent: col?"center":"flex-start", gap:8,
            background:"rgba(220,38,38,0.12)", border:"1px solid rgba(220,38,38,0.2)",

            transition:"all .15s" }}
          onMouseEnter={e=>{ e.currentTarget.style.background="rgba(220,38,38,0.22)"; }}
          onMouseLeave={e=>{ e.currentTarget.style.background="rgba(220,38,38,0.12)"; }}>
          <LogOut size={14}/>
          {!col && <span>Cerrar sesión</span>}
        </button>
      </div>
    </div>
  );
}


function DashboardView({ candidates, companies, formSubmissions, setView }) {
  const pending = formSubmissions.filter(f => !f.downloaded);
  const positions = [...new Set(candidates.map(c => c.position).filter(Boolean))];
  const recent = [...candidates].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);
  const recentForms = [...formSubmissions].sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt)).slice(0, 5);
  const statColor = { Activo: "success", "En proceso": "info", Seleccionado: "teal", Descartado: "danger" };

  return (
    <div className="fade-in">
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Panel general</h1>
        <p style={{ color: C.muted, fontSize: 14 }}>Resumen del sistema · {new Date().toLocaleDateString("es-EC", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}</p>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 16, marginBottom: 24 }}>
        <StatCard label="Candidatos registrados" value={candidates.length} icon={Users} color={C.accent} sub={`${candidates.filter(c => c.status === "Activo").length} activos`} onClick={() => setView("candidates")} />
        <StatCard label="Formularios recibidos" value={formSubmissions.length} icon={FileText} color={C.info} sub={pending.length > 0 ? `${pending.length} sin revisar` : "Todos revisados"} onClick={() => setView("forms")} />
        <StatCard label="Empresas activas" value={companies.length} icon={Building2} color={C.warning} onClick={() => setView("companies")} />
        <StatCard label="CVs recibidos" value={candidates.filter(c => c.cvUrl).length} icon={Briefcase} color={C.success} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: IS_MOBILE ? "1fr" : "1fr 1fr", gap: 16 }}>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h3 style={{ fontSize: 15, fontWeight: 600, color: C.text }}>Candidatos recientes</h3>
            <Btn variant="ghost" size="sm" onClick={() => setView("candidates")}>Ver todos <ChevronRight size={13} /></Btn>
          </div>
          {recent.length === 0 ? <p style={{ color: C.muted, textAlign: "center", padding: "20px 0" }}>Sin candidatos aún</p>
            : recent.map(c => (
              <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 0", borderBottom: `1px solid ${C.border}` }}>
                <div style={{ width: 34, height: 34, borderRadius: "50%", background: `${C.accent}20`, color: C.accent, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{(c.name || "?")[0].toUpperCase()}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 500, color: C.text, fontSize: 14, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.name}</div>
                  <div style={{ color: C.muted, fontSize: 12 }}>{c.position || "Sin cargo"}</div>
                </div>
                <Badge color={statColor[c.status] || "neutral"}>{c.status || "Sin estado"}</Badge>
              </div>
            ))}
        </Card>
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <h3 style={{ fontSize: 15, fontWeight: 600, color: C.text }}>Formularios recientes</h3>
            <Btn variant="ghost" size="sm" onClick={() => setView("forms")}>Ver todos <ChevronRight size={13} /></Btn>
          </div>
          {recentForms.length === 0 ? <p style={{ color: C.muted, textAlign: "center", padding: "20px 0" }}>Sin formularios aún</p>
            : recentForms.map(f => (
              <div key={f.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 0", borderBottom: `1px solid ${C.border}` }}>
                <div style={{ width: 34, height: 34, borderRadius: 8, background: `${C.info}18`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Building2 size={16} color={C.info} /></div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 500, color: C.text, fontSize: 14 }}>{f.companyName}</div>
                  <div style={{ color: C.muted, fontSize: 12 }}>{f.formData?.tituloPuesto || "Sin título"}</div>
                </div>
                <Badge color={f.downloaded ? "neutral" : "info"}>{f.downloaded ? "Revisado" : "Nuevo"}</Badge>
              </div>
            ))}
        </Card>
      </div>
      {positions.length > 0 && (
        <Card style={{ marginTop: 16, padding: 18 }}>
          <h3 style={{ fontSize: 15, fontWeight: 600, color: C.text, marginBottom: 12 }}>Distribución por cargos</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {positions.map(p => {
              const cnt = candidates.filter(c => c.position === p).length;
              return <div key={p} style={{ background: C.bg, borderRadius: 8, padding: "8px 14px", border: `1px solid ${C.border}`, fontSize: 13 }}>
                <span style={{ fontWeight: 500, color: C.text }}>{p}</span>
                <span style={{ marginLeft: 8, background: `${C.accent}20`, color: C.accent, borderRadius: 99, padding: "1px 8px", fontSize: 12, fontWeight: 600 }}>{cnt}</span>
              </div>;
            })}
          </div>
        </Card>
      )}
    </div>
  );
}

const STATUS_OPTS = ["Nuevo", "CV revisado", "Pre-seleccionado", "En entrevista", "Evaluación", "Finalista", "Seleccionado", "Descartado"];
const STATUS_LEGACY = ["Activo", "En proceso"]; // soporte para datos existentes
const STATUS_COLOR = { Nuevo:"neutral", "CV revisado":"info", "Pre-seleccionado":"info", "En entrevista":"warning", "Evaluación":"warning", Finalista:"teal", Seleccionado:"success", Descartado:"danger", Activo:"success", "En proceso":"info" };

const getSignedUrl = async (path) => {
    // If it's a base64 data URI (legacy), return directly
    if (path.startsWith("data:")) return path;
    // If it's a full URL (old Supabase public URL), return directly
    if (path.startsWith("http")) return path;
    // Otherwise it's a Storage path — generate a signed URL (valid 60 min)
    try {
      const res = await fetch(`${SB_URL}/storage/v1/object/sign/cvs/${path}`, {
        method: "POST",
        headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json" },
        body: JSON.stringify({ expiresIn: 3600 }),
      });
      const data = await res.json();
      return data.signedURL ? `${SB_URL}/storage/v1${data.signedURL}` : null;
    } catch(e) { console.error(e); return null; }
  };

function CandidatesView({ candidates, setCandidates, refreshCandidates }) {
  const [search, setSearch] = useState("");
  const [posFilter, setPosFilter] = useState("");
  const [statusFilter, setStatusFilter] = useState("");
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [saving, setSaving] = useState(false);
  const [cvModal, setCvModal] = useState(null); // { url, fileName }
  const [detailCandidate, setDetailCandidate] = useState(null); // candidate to view



  const viewCV = async (cvUrl, fileName) => {
    if (!cvUrl) return;
    if (cvUrl.startsWith("data:")) {
      setCvModal({ url: cvUrl, fileName, isBlob: false });
      return;
    }
    const url = await getSignedUrl(cvUrl);
    if (url) setCvModal({ url, fileName, isBlob: false });
    else alert("No se pudo obtener el enlace del CV. Intenta de nuevo.");
  };

  const downloadCV = async (cvUrl, fileName) => {
    if (!cvUrl) return;
    if (cvUrl.startsWith("data:")) {
      const a = document.createElement("a");
      a.href = cvUrl; a.download = fileName || "CV.pdf";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      return;
    }
    const url = await getSignedUrl(cvUrl);
    if (url) {
      const a = document.createElement("a");
      a.href = url; a.download = fileName || "CV.pdf";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } else alert("No se pudo descargar el CV. Intenta de nuevo.");
  };
  const positions = [...new Set(candidates.map(c => c.position).filter(Boolean))];

  const filtered = candidates.filter(c => {
    const q = search.toLowerCase();
    return (!q || [c.name, c.email, c.position, c.skills].some(f => f?.toLowerCase().includes(q)))
      && (!posFilter || c.position === posFilter)
      && (!statusFilter || c.status === statusFilter);
  });

  const handleDelete = async id => {
    if (!confirm("¿Eliminar este candidato?")) return;
    const cand = candidates.find(c => c.id === id);
    if (cand?.cvUrl) await db.deleteCV(cand.cvUrl);
    await db.del("candidates", id);
    await refreshCandidates();
  };

  const handleSave = async (data, cvFileToUpload) => {
    setSaving(true);
    try {
      const isNew = !editing;
      const id = editing?.id || uid();
      let cvUrl = data.cvUrl || null;
      let cvFileName = data.cvFileName || null;

      // Upload new CV to Supabase Storage
      if (cvFileToUpload) {
        const ext = cvFileToUpload.name.split(".").pop();
        const path = `${id}_${Date.now()}.${ext}`;
        const uploadRes = await fetch(`${SB_URL}/storage/v1/object/cvs/${path}`, {
          method: "POST",
          headers: {
            "apikey": SB_KEY,
            "Authorization": `Bearer ${SB_KEY}`,
            "Content-Type": cvFileToUpload.type || "application/octet-stream",
            "x-upsert": "true",
          },
          body: cvFileToUpload,
        });
        if (uploadRes.ok) {
          cvUrl = path; // store only the path, not the full URL
          cvFileName = cvFileToUpload.name;
        } else {
          const errText = await uploadRes.text();
          console.error("Upload error:", errText);
          alert("Error al subir el CV. Verifica la conexión e intenta de nuevo.");
          setSaving(false);
          return;
        }
      }

      const dbData = {
        id, name: data.name, email: data.email || null, phone: data.phone || null,
        position: data.position || null, status: data.status || "Nuevo",
        skills: data.skills || null, notes: data.notes || null,
        cv_file_name: cvFileName, cv_url: cvUrl, cv_text: data.cvText || null,
      };

      if (isNew) await db.insert("candidates", dbData);
      else await db.update("candidates", id, dbData);
      await refreshCandidates();
    } catch (e) { console.error(e); alert("Error al guardar. Intenta de nuevo."); }
    setSaving(false);
    setShowModal(false);
  };

  return (
    <div className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Candidatos</h1>
          <p style={{ color: C.muted, fontSize: 14 }}>Banco de hojas de vida en la nube ☁️ · {candidates.length} registrados</p>
        </div>
        <Btn onClick={() => { setEditing(null); setShowModal(true); }}><Plus size={16} /> Agregar candidato</Btn>
      </div>

      <Card style={{ padding: 14, marginBottom: 16 }}>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <div style={{ position: "relative", flex: 2, minWidth: 200 }}>
            <Search size={15} style={{ position: "absolute", left: 11, top: "50%", transform: "translateY(-50%)", color: C.muted }} />
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar por nombre, email, cargo o habilidades..." style={{ ...inputSt, paddingLeft: 36 }} />
          </div>
          <select value={posFilter} onChange={e => setPosFilter(e.target.value)} style={{ ...inputSt, width: "auto", minWidth: 160, color: posFilter ? C.text : C.muted }}>
            <option value="">Todos los cargos</option>
            {positions.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
          <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={{ ...inputSt, width: "auto", minWidth: 140, color: statusFilter ? C.text : C.muted }}>
            <option value="">Todos los estados</option>
            {STATUS_OPTS.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          {(search || posFilter || statusFilter) && <Btn variant="ghost" size="sm" onClick={() => { setSearch(""); setPosFilter(""); setStatusFilter(""); }}><X size={14} /> Limpiar</Btn>}
        </div>
      </Card>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        {IS_MOBILE ? (
        /* ── MOBILE: candidate cards ── */
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {filtered.length===0 ? (
            <div style={{ textAlign:"center", padding:48, color:C.muted }}>
              <Users size={40} color={C.border} style={{ display:"block", margin:"0 auto 12px" }}/>
              Sin candidatos
            </div>
          ) : filtered.map(c => (
            <div key={c.id}
              style={{ background:"#fff", borderRadius:12, padding:"14px 16px",
                border:"1px solid #EBEBEB", boxShadow:"0 1px 3px rgba(0,0,0,0.05)" }}>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:10 }}>
                <div style={{ width:42, height:42, borderRadius:"50%", flexShrink:0,
                  background:`linear-gradient(135deg,${C.accent},${C.primary})`,
                  color:"#fff", display:"flex", alignItems:"center",
                  justifyContent:"center", fontWeight:700, fontSize:16 }}>
                  {(c.name||"?")[0].toUpperCase()}
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontWeight:700, color:C.text, fontSize:15, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.name}</div>
                  <div style={{ color:C.muted, fontSize:13 }}>{c.position||"Sin cargo"}</div>
                </div>
                <Badge color={STATUS_COLOR[c.status]||"neutral"}>{c.status||"Nuevo"}</Badge>
              </div>
              {c.email && <div style={{ fontSize:12, color:C.muted, marginBottom:4 }}>✉ {c.email}</div>}
              {c.phone && <div style={{ fontSize:12, color:C.muted, marginBottom:8 }}>📞 {c.phone}</div>}
              <div style={{ display:"flex", gap:8, marginTop:8, paddingTop:10, borderTop:"1px solid #F0F0F0" }}>
                {c.cvUrl && (
                  <button onClick={()=>viewCV(c.cvUrl, c.cvFileName)}
                    style={{ flex:1, padding:"8px", background:`${C.accent}12`, color:C.accent,
                      border:`1px solid ${C.accent}25`, borderRadius:8, cursor:"pointer",
                      fontSize:13, fontWeight:600, fontFamily:"inherit" }}>
                    Ver CV
                  </button>
                )}
                <button onClick={()=>{ setEditing(c); setShowModal(true); }}
                  style={{ flex:1, padding:"8px", background:`${C.info}12`, color:C.info,
                    border:`1px solid ${C.info}25`, borderRadius:8, cursor:"pointer",
                    fontSize:13, fontWeight:600, fontFamily:"inherit" }}>
                  Editar
                </button>
                <button onClick={()=>setDetailCandidate(c)}
                  style={{ flex:1, padding:"8px", background:`${C.success}12`, color:C.success,
                    border:`1px solid ${C.success}25`, borderRadius:8, cursor:"pointer",
                    fontSize:13, fontWeight:600, fontFamily:"inherit" }}>
                  Ver perfil
                </button>
              </div>
            </div>
          ))}
        </div>
      ) : (
        /* ── DESKTOP: table ── */
        
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: C.bg, borderBottom: `1px solid ${C.border}` }}>
                {["Candidato", "Cargo", "Contacto", "Habilidades", "Estado", "Registrado", "Acciones"].map(h => (
                  <th key={h} style={{ padding: "10px 16px", textAlign: "left", fontSize: 11, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em", whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0
                ? <tr><td colSpan={7} style={{ textAlign: "center", padding: 48, color: C.muted }}>{candidates.length === 0 ? "Agrega tu primer candidato" : "Sin resultados"}</td></tr>
                : filtered.map(c => (
                  <tr key={c.id} className="rp-row" style={{ borderBottom: `1px solid ${C.border}` }}>
                    <td style={{ padding: "12px 16px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 34, height: 34, borderRadius: "50%", background: `${C.accent}20`, color: C.accent, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{(c.name || "?")[0].toUpperCase()}</div>
                        <div>
                          <div style={{ fontWeight: 500, color: C.text, fontSize: 14 }}>{c.name}</div>
                          {c.cvFileName && <div style={{ fontSize: 11, color: C.accent }}>☁️ {c.cvFileName}</div>}
                        </div>
                      </div>
                    </td>
                    <td style={{ padding: "12px 16px", fontSize: 13, color: C.text }}>{c.position || "—"}</td>
                    <td style={{ padding: "12px 16px" }}>
                      <div style={{ fontSize: 12, color: C.muted }}>{c.email || "—"}</div>
                      <div style={{ fontSize: 12, color: C.muted }}>{c.phone || ""}</div>
                    </td>
                    <td style={{ padding: "12px 16px", maxWidth: 160 }}><div style={{ fontSize: 12, color: C.muted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.skills || "—"}</div></td>
                    <td style={{ padding: "12px 16px" }}><Badge color={STATUS_COLOR[c.status] || "neutral"}>{c.status || "Sin estado"}</Badge></td>
                    <td style={{ padding: "12px 16px", fontSize: 12, color: C.muted, whiteSpace: "nowrap" }}>{fmtDate(c.createdAt)}</td>
                    <td style={{ padding: "12px 16px" }}>
                      <div style={{ display: "flex", gap: 5 }}>
                        {c.cvUrl && (
                          <>
                            <button onClick={() => viewCV(c.cvUrl, c.cvFileName)} title="Ver CV"
                              style={{ background: `${C.accent}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: C.accent, display: "inline-flex", alignItems: "center" }}>
                              <Eye size={14} />
                            </button>
                            <button onClick={() => downloadCV(c.cvUrl, c.cvFileName)} title="Descargar CV"
                              style={{ background: `${C.info}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: C.info, display: "inline-flex", alignItems: "center" }}>
                              <Download size={14} />
                            </button>
                          </>
                        )}
                        <button onClick={() => setDetailCandidate(c)} title="Ver respuestas completas"
                          style={{ background: `${C.success}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: C.success, display: "inline-flex", alignItems: "center" }}>
                          <Eye size={14}/>
                        </button>
                        <button onClick={() => { setEditing(c); setShowModal(true); }} title="Editar"
                          style={{ background: `${C.info}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: C.info, display: "inline-flex", alignItems: "center" }}>
                          <Edit size={14}/>
                        </button>
                        <button onClick={() => handleDelete(c.id)} style={{ background: `${C.danger}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: C.danger }}><Trash2 size={14} /></button>
                      </div>
                    </td>
                  </tr>
                ))}
            </tbody>
          </table>
        </div>
      </Card>

      <CandidateModal open={showModal} onClose={() => setShowModal(false)} editing={editing} onSave={handleSave} saving={saving} />

      {/* ── DETAIL MODAL ── */}
      {detailCandidate && (
        <CandidateDetailModal
          candidate={detailCandidate}
          onClose={() => setDetailCandidate(null)}
          onViewCV={viewCV}
          onDownloadCV={downloadCV}
        />
      )}

      {cvModal && (
        <div onClick={e => { if (e.target === e.currentTarget) { if (cvModal.isBlob) URL.revokeObjectURL(cvModal.url); setCvModal(null); } }}
          style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16 }}>
          <div style={{ background:C.card,borderRadius:16,width:"100%",maxWidth:860,maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 24px",borderBottom:`1px solid ${C.border}`,flexShrink:0 }}>
              <div style={{ fontWeight:600,color:C.text,fontSize:16 }}>📎 {cvModal.fileName || "Hoja de vida"}</div>
              <div style={{ display:"flex",gap:10 }}>
                <Btn size="sm" onClick={() => downloadCV(cvModal.url, cvModal.fileName)}><Download size={14} /> Descargar</Btn>
                <button onClick={() => { if (cvModal.isBlob) URL.revokeObjectURL(cvModal.url); setCvModal(null); }}
                  style={{ background:"none",border:"none",cursor:"pointer",color:C.muted,display:"flex",padding:4 }}><X size={20} /></button>
              </div>
            </div>
            <div style={{ flex:1,overflow:"auto",borderRadius:"0 0 16px 16px",minHeight:500 }}>
              <iframe src={cvModal.url} style={{ width:"100%",height:"560px",border:"none" }} title="CV" />
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════════════════════
   CANDIDATE DETAIL MODAL
═══════════════════════════════════════════════════════════ */
function CandidateDetailModal({ candidate: c, onClose, onViewCV, onDownloadCV }) {
  // Parse the notes field — detect if it's a public form submission
  const isPublicForm = c.notes && c.notes.includes("POSTULACIÓN PÚBLICA");

  // Parse structured notes into key-value sections
  const parseNotes = (notes) => {
    if (!notes) return [];
    const lines = notes.split("\n");
    const sections = [];
    let currentSection = [];
    lines.forEach(line => {
      if (line.startsWith("─")) {
        if (currentSection.length > 0) {
          sections.push(currentSection);
          currentSection = [];
        }
      } else if (line.trim()) {
        currentSection.push(line);
      }
    });
    if (currentSection.length > 0) sections.push(currentSection);
    return sections;
  };

  // Extract a specific field from notes
  const extractField = (notes, prefix) => {
    if (!notes) return null;
    const line = notes.split("\n").find(l => l.startsWith(prefix));
    return line ? line.replace(prefix, "").trim() : null;
  };

  const sc = { Nuevo:"#94A3B8", "CV revisado":"#2563EB", "Pre-seleccionado":"#7C3AED",
    "En entrevista":"#D97706", "Evaluación":"#EA580C", Finalista:"#0D9488",
    Seleccionado:"#059669", Descartado:"#DC2626", Activo:"#059669", "En proceso":"#2563EB" };
  const statusColor = sc[c.status] || C.muted;

  // Personal info from notes
  const cedula     = extractField(c.notes, "📄 Cédula:");
  const nacimiento = extractField(c.notes, "🎂 Fecha de nacimiento:");
  const civil      = extractField(c.notes, "💍 Estado civil:");
  const ciudad     = extractField(c.notes, "📍 Ciudad:");
  const vehiculo   = extractField(c.notes, "🚗 Posee vehículo:");
  const titulo     = extractField(c.notes, "🎓 Título profesional:");
  const maestria   = extractField(c.notes, "📚 Maestría:");
  const salario    = extractField(c.notes, "💰 Aspiración salarial:");
  const odoo       = extractField(c.notes, "🔧 Odoo para facturación:");

  // Long-form answers — extract block after label
  const extractBlock = (notes, label) => {
    if (!notes) return null;
    const lines = notes.split("\n");
    const idx = lines.findIndex(l => l.includes(label));
    if (idx < 0) return null;
    const block = [];
    for (let i = idx + 1; i < lines.length; i++) {
      if (lines[i].startsWith("─") || (lines[i].match(/^\d+\./) && i > idx + 1)) break;
      if (lines[i].startsWith("📄") || lines[i].startsWith("🎂") ||
          lines[i].startsWith("🔧") || lines[i].startsWith("💰") ||
          lines[i].startsWith("📚") || lines[i].startsWith("🎓")) break;
      block.push(lines[i]);
    }
    return block.join("\n").trim() || null;
  };

  const motivos    = extractBlock(c.notes, "Motivos de búsqueda laboral");
  const virtudes   = extractBlock(c.notes, "Virtudes y cualidades");
  const mejoras    = extractBlock(c.notes, "Oportunidades de mejora");
  const herramientas = extractBlock(c.notes, "Herramientas tecnológicas") || c.skills;
  const credito    = extractBlock(c.notes, "Experiencia en crédito");
  const logro      = extractBlock(c.notes, "Mayor logro profesional");
  const desvinculacion = extractBlock(c.notes, "Motivo de última desvinculación");

  const Field = ({ label, value, icon }) => {
    if (!value) return null;
    return (
      <div style={{ background: C.bg, borderRadius: 8, padding: "10px 14px", marginBottom: 8 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase",
          letterSpacing: "0.05em", marginBottom: 4 }}>{icon && icon + " "}{label}</div>
        <div style={{ fontSize: 14, color: C.text, lineHeight: 1.65, whiteSpace: "pre-wrap" }}>{value}</div>
      </div>
    );
  };

  const Section = ({ title, color, children }) => (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <div style={{ flex: 1, height: 1, background: C.border }}/>
        <span style={{ fontSize: 11, fontWeight: 700, color: color || C.muted,
          textTransform: "uppercase", letterSpacing: "0.06em", whiteSpace: "nowrap" }}>{title}</span>
        <div style={{ flex: 1, height: 1, background: C.border }}/>
      </div>
      {children}
    </div>
  );

  return (
    <div onClick={e => e.target === e.currentTarget && onClose()}
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex",
        alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 16 }}>
      <div style={{ background: C.card, borderRadius: 16, width: "100%", maxWidth: 640,
        maxHeight: "92vh", display: "flex", flexDirection: "column",
        boxShadow: "0 20px 60px rgba(0,0,0,0.25)" }}>

        {/* Header */}
        <div style={{ padding: "18px 24px", borderBottom: `1px solid ${C.border}`,
          display: "flex", alignItems: "center", gap: 14, flexShrink: 0 }}>
          <div style={{ width: 48, height: 48, borderRadius: "50%",
            background: `${C.accent}20`, color: C.accent,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontWeight: 700, fontSize: 20, flexShrink: 0 }}>
            {(c.name || "?")[0].toUpperCase()}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontWeight: 700, fontSize: 18, color: C.text,
              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c.name}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 3, flexWrap: "wrap" }}>
              <span style={{ background: `${statusColor}18`, color: statusColor,
                borderRadius: 99, padding: "2px 10px", fontSize: 12, fontWeight: 600 }}>
                {c.status || "Sin estado"}
              </span>
              {c.position && <span style={{ color: C.muted, fontSize: 13 }}>· {c.position}</span>}
              {isPublicForm && <span style={{ background: C.infoL, color: C.info,
                borderRadius: 99, padding: "2px 10px", fontSize: 11, fontWeight: 600 }}>
                📋 Formulario público
              </span>}
            </div>
          </div>
          <button onClick={onClose}
            style={{ background: "none", border: "none", cursor: "pointer",
              color: C.muted, display: "flex", padding: 4, flexShrink: 0 }}>
            <X size={22}/>
          </button>
        </div>

        {/* Body - scrollable */}
        <div style={{ flex: 1, overflowY: "auto", padding: "20px 24px" }}>

          {/* Contact info */}
          <Section title="Información de contacto" color={C.accent}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {c.email && <Field label="Correo electrónico" value={c.email} icon="✉️"/>}
              {c.phone && <Field label="Teléfono" value={c.phone} icon="📞"/>}
              {cedula   && <Field label="Cédula" value={cedula} icon="🪪"/>}
              {nacimiento && <Field label="Fecha de nacimiento" value={nacimiento} icon="🎂"/>}
              {civil    && <Field label="Estado civil" value={civil} icon="💍"/>}
              {ciudad   && <Field label="Ciudad" value={ciudad} icon="📍"/>}
              {vehiculo && <Field label="Posee vehículo" value={vehiculo} icon="🚗"/>}
            </div>
          </Section>

function PhoneField({ value, onChange }) {
  const parse = v => {
    if (!v) return { code:"593", num:"" };
    const f = LATAM_CODES.find(c => v.startsWith(c.code));
    return f ? { code:f.code, num:v.slice(f.code.length) } : { code:"593", num:v };
  };
  const p = parse(value);
  const [code, setCode] = useState(p.code);
  const [num,  setNum]  = useState(p.num);

  useEffect(() => { const q=parse(value); setCode(q.code); setNum(q.num); }, [value]);

  const update = (c, n) => {
    const d = n.replace(/\D/g,"");
    onChange(d ? c+d : "");
  };

  return (
    <div>
      <label style={{ display:"block",fontSize:11,fontWeight:600,color:"#374151",
        textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:5 }}>Teléfono</label>
      <div style={{ display:"flex",gap:6 }}>
        <select value={code} onChange={e=>{setCode(e.target.value);update(e.target.value,num);}}
          style={{ border:`1.5px solid ${C.border}`,borderRadius:8,padding:"9px 8px",
            fontSize:13,color:C.text,background:"#fff",flexShrink:0,fontFamily:"inherit",minWidth:140 }}>
          {LATAM_CODES.map(c=>(
            <option key={c.code} value={c.code}>{c.name} ({c.fmt})</option>
          ))}
        </select>
        <input type="tel" value={num}
          onChange={e=>{setNum(e.target.value);update(code,e.target.value);}}
          placeholder="987654321"
          style={{ flex:1,border:`1.5px solid ${C.border}`,borderRadius:8,
            padding:"9px 12px",fontSize:14,color:C.text,fontFamily:"inherit",outline:"none" }}
          onFocus={e=>e.target.style.borderColor=C.accent}
          onBlur={e=>e.target.style.borderColor=C.border}
        />
      </div>
      {num && <div style={{ fontSize:11,color:C.muted,marginTop:3 }}>+{code} {num.replace(/\D/g,"")}</div>}
    </div>
  );
}

function CandidateModal({ open, onClose, editing, onSave, saving }) {
  const blank = { name: "", email: "", phone: "", position: "", status: "Nuevo", skills: "", notes: "", cvFileName: "", cvUrl: "", cvDataUri: "", cvText: "" };
  const [form, setForm] = useState(blank);
  const [cvFile, setCvFile] = useState(null);
  const fileRef = useRef();

  useEffect(() => {
    setForm(editing ? { ...blank, ...editing, cvDataUri: "" } : blank);
    setCvFile(null);
  }, [editing, open]);

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  const handleCV = e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      alert("El CV debe ser menor a 5 MB.");
      return;
    }

    setForm(f => ({ ...f, cvFileName: file.name, cvDataUri: "" }));

        <Inp label="Habilidades / Skills" value={form.skills} onChange={set("skills")} placeholder="ej: Excel avanzado, Liderazgo, Python..." />
        <Inp label="Notas internas" value={form.notes} onChange={set("notes")} rows={2} />

          <label style={{ fontSize: 12, fontWeight: 600, color: C.text, textTransform: "uppercase", letterSpacing: "0.04em", display: "block", marginBottom: 6 }}>Hoja de vida (CV)</label>
          <div style={{ border: `2px dashed ${C.border}`, borderRadius: 10, padding: 16, textAlign: "center", background: C.bg }}>
            {form.cvFileName ? (

                <div style={{ color: C.accent, fontWeight: 600, fontSize: 14, marginBottom: 4 }}>{form.cvFileName}</div>
                <div style={{ fontSize: 12, color: (cvFile || form.cvUrl) ? C.success : C.muted, marginBottom: 10 }}>

                  <X size={14} /> Cambiar archivo
                </Btn>
              </div>
            ) : (
              <div>
                <Upload size={22} color={C.muted} style={{ margin: "0 auto 8px" }} />
                <p style={{ color: C.muted, fontSize: 13, margin: "0 0 10px" }}>PDF o Word — máximo 3 MB</p>
                <Btn variant="secondary" size="sm" onClick={() => fileRef.current.click()}>Seleccionar archivo</Btn>
              </div>
            )}

          </div>

        <Inp label="Resumen del CV (texto para análisis IA)" value={form.cvText} onChange={set("cvText")} rows={3}
          placeholder="Pega aquí el texto del CV o un resumen de experiencia, formación y logros..." />

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", paddingTop: 6, borderTop: `1px solid ${C.border}` }}>

/* helpers for 360 modal */
function parseNotes(notes) {
  if (!notes) return {};
  const ex = lbl => { const m=notes.match(new RegExp(lbl+"[:\\s]+([^\\n]+)","i")); return m?m[1].trim():null; };
  const exB = lbl => {
    const ls=notes.split("\\n"), idx=ls.findIndex(l=>l.toLowerCase().includes(lbl.toLowerCase()));
    if(idx<0) return null;
    const b=[]; for(let i=idx+1;i<ls.length&&i<idx+6;i++){if(ls[i].match(/^[─\\d]/))break;if(ls[i].trim())b.push(ls[i].trim());}
    return b.join(" ").trim()||null;
  };
  return { cedula:ex("Cédula"), nacimiento:ex("Fecha de nacimiento"), civil:ex("Estado civil"),
    ciudad:ex("Ciudad"), vehiculo:ex("Posee vehículo"), titulo:ex("Título profesional"),
    maestria:ex("Maestría"), salario:ex("Aspiración salarial"), odoo:ex("Odoo"),
    motivos:exB("Motivos de búsqueda"), virtudes:exB("Virtudes"),
    mejoras:exB("Oportunidades"), herramientas:exB("Herramientas"), logro:exB("logro") };
}
function smartSummary(c, fd) {
  const skills=(c.skills||fd.herramientas||"").split(/[,;]/).map(s=>s.trim()).filter(Boolean);
  const pros=[]; const cons=[];
  if(c.cvUrl) pros.push("CV adjunto"); if(fd.maestria==="Sí") pros.push("Maestría");
  if(fd.odoo==="Sí") pros.push("Maneja Odoo"); if(fd.vehiculo==="Sí") pros.push("Vehículo propio");
  if(!c.cvUrl) cons.push("Sin CV"); if(!fd.salario) cons.push("Salario no indicado");
  if(!c.phone) cons.push("Sin teléfono");
  let score=50; if(c.cvUrl)score+=15; if(c.email)score+=5; if(c.phone)score+=5;
  if(fd.titulo)score+=8; if(fd.maestria==="Sí")score+=7; if(skills.length>2)score+=10;
  return { skills, pros, cons, score:Math.min(98,score) };
}

function PipelineCandidateModal({ allCandidates, currentIdx, onNavigate, onClose, onUpdated }) {
  const c = allCandidates[currentIdx];
  const total = allCandidates.length;
  const [notes, setNotes]         = useState(c.recruiterNotes||"");
  const [checklist, setChecklist] = useState({cv:false,exp:false,edu:false,sal:false,dis:false});
  const [cvSrc, setCvSrc]         = useState(null);
  const [cvLoad, setCvLoad]       = useState(false);
  const [saving, setSaving]       = useState(false);
  const [approving, setApproving] = useState(false);
  const [toast, setToast]         = useState(null);
  const [mobileTab, setMobileTab] = useState("perfil"); // "perfil" | "cv"
  const fd = parseNotes(c.notes);
  const sm = smartSummary(c, fd);
  const NEXT = {"Nuevo":"CV revisado","CV revisado":"Pre-seleccionado","Pre-seleccionado":"En entrevista","En entrevista":"Evaluación","Evaluación":"Finalista","Finalista":"Seleccionado"};
  const nextStage = NEXT[c.status];
  const stageInfo = PIPELINE_STAGES.find(s=>s.id===c.status)||{color:C.muted,bg:C.bg,label:c.status};
  const showToast=(msg,t="ok")=>{setToast({msg,t});setTimeout(()=>setToast(null),2500);};

  useEffect(()=>{
    setNotes(c.recruiterNotes||"");
    setMobileTab("perfil");
    try{setChecklist({cv:false,exp:false,edu:false,sal:false,dis:false,...JSON.parse(localStorage.getItem("rp_cl_"+c.id)||"{}")});}catch{}
  },[c.id]);
  useEffect(()=>{localStorage.setItem("rp_cl_"+c.id,JSON.stringify(checklist));},[checklist]);
  useEffect(()=>{
    setCvSrc(null);
    if(!c.cvUrl) return;
    if(c.cvUrl.startsWith("data:")){
      try{const[h,d]=c.cvUrl.split(","),m=h.match(/data:([^;]+)/)[1],bytes=atob(d),arr=new Uint8Array(bytes.length);
        for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);

    } else if(c.cvUrl.startsWith("http")){setCvSrc(c.cvUrl);}
    else{setCvLoad(true);getSignedUrl(c.cvUrl).then(u=>{setCvSrc(u);setCvLoad(false);}).catch(()=>setCvLoad(false));}
