      </div>
      <button onClick={onClose} style={{border:"none",background:"transparent",cursor:"pointer",color:C.muted,flexShrink:0}}>
        <X size={IS_MOBILE?16:18}/>
      </button>
    </div>
  );

  /* ── SHARED: bottom bar ── */
  const BottomBar = ()=>(
    <div style={{display:"flex",alignItems:"center",
      justifyContent:IS_MOBILE?"space-between":"space-between",
      padding:IS_MOBILE?"10px 14px":"12px 20px",
      borderTop:`1px solid ${C.border}`,background:"#FAFBFF",flexShrink:0,gap:8,
      flexWrap:IS_MOBILE?"nowrap":"nowrap"}}>
      <button onClick={discard} disabled={saving||c.status==="Descartado"}
        style={{background:"transparent",color:C.danger,border:`1.5px solid ${C.danger}30`,
          borderRadius:10,padding:IS_MOBILE?"7px 10px":"8px 16px",cursor:"pointer",
          fontSize:IS_MOBILE?12:14,fontWeight:600,fontFamily:"inherit",
          opacity:c.status==="Descartado"?0.4:1,flexShrink:0}}>
        Descartar
      </button>
      <div style={{display:"flex",gap:IS_MOBILE?6:10}}>
        <button onClick={saveNotes} disabled={saving}
          style={{background:"#fff",color:C.text,border:`1.5px solid ${C.border}`,borderRadius:10,
            padding:IS_MOBILE?"7px 10px":"8px 18px",cursor:"pointer",
            fontSize:IS_MOBILE?12:14,fontWeight:600,fontFamily:"inherit",
            display:"flex",alignItems:"center",gap:5}}>
          {saving?<><Spinner size={12}/> Guardando...</>:<><Check size={12}/> {IS_MOBILE?"Guardar":"Guardar notas"}</>}
        </button>
        {nextStage&&(
          <button onClick={approve} disabled={approving||saving}
            style={{background:`linear-gradient(135deg,${C.accent},${C.primary})`,color:"#fff",
              border:"none",borderRadius:10,
              padding:IS_MOBILE?"7px 10px":"8px 20px",cursor:"pointer",
              fontSize:IS_MOBILE?12:14,fontWeight:700,fontFamily:"inherit",
              display:"flex",alignItems:"center",gap:5,
              boxShadow:"0 4px 14px rgba(13,148,136,0.3)"}}>
            {approving?<><Spinner size={12}/> Moviendo...</>:<>Aprobar{IS_MOBILE?"":" → "+nextStage}<ChevronRight size={12}/></>}
          </button>
        )}
      </div>
    </div>
  );

  /* ── LEFT PANEL content (shared) ── */
  const ProfilePanel = ()=>(
    <div style={{overflowY:"auto",height:"100%"}}>
      {/* Smart summary */}
      <div style={{padding:"14px 16px",background:`linear-gradient(135deg,${C.primary},#2563EB)`,color:"#fff"}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",opacity:.7,marginBottom:8}}>Resumen del perfil</div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
          <div style={{position:"relative",width:44,height:44,flexShrink:0}}>
            <svg width="44" height="44" viewBox="0 0 44 44">
              <circle cx="22" cy="22" r="18" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="5"/>
              <circle cx="22" cy="22" r="18" fill="none" stroke="#fff" strokeWidth="5"
                strokeDasharray={`${(sm.score/100)*113} 113`} strokeLinecap="round" transform="rotate(-90 22 22)"/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>{sm.score}%</div>
          </div>
          <div>
            <div style={{fontSize:13,fontWeight:600}}>Perfil completado</div>
            <div style={{fontSize:11,opacity:.75}}>{sm.score>=80?"Candidato documentado":sm.score>=60?"Información básica":"Perfil incompleto"}</div>
          </div>
        </div>
        {sm.pros.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
          {sm.pros.map(p=><span key={p} style={{background:"rgba(255,255,255,0.18)",borderRadius:99,padding:"2px 9px",fontSize:11}}>✓ {p}</span>)}
        </div>}
        {sm.skills.slice(0,4).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {sm.skills.slice(0,4).map(s=><span key={s} style={{background:"rgba(255,255,255,0.12)",borderRadius:99,padding:"2px 8px",fontSize:11}}>{s}</span>)}
        </div>}
        {sm.cons.length>0&&<div style={{marginTop:7,fontSize:11,opacity:.7}}>{sm.cons.map(a=>"⚠ "+a).join("  ")}</div>}
      </div>
      {/* Info */}
      <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Información personal</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}>
          <IF label="Correo" value={c.email}/><IF label="Teléfono" value={c.phone}/>
          <IF label="Cédula" value={fd.cedula}/><IF label="Nacimiento" value={fd.nacimiento}/>
          <IF label="Estado civil" value={fd.civil}/><IF label="Ciudad" value={fd.ciudad}/>
          <IF label="Vehículo" value={fd.vehiculo}/><IF label="Salario" value={fd.salario}/>
        </div>
      </div>
      <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Formación y experiencia</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 14px"}}>
          <IF label="Título" value={fd.titulo}/><IF label="Maestría" value={fd.maestria}/>
          <IF label="Odoo" value={fd.odoo}/>
        </div>
        <IF label="Herramientas" value={fd.herramientas} full/>
        <IF label="Mayor logro" value={fd.logro} full/>
        <IF label="Virtudes" value={fd.virtudes} full/>
      </div>
      <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Checklist de validación</div>
        <CL k="cv" label="CV revisado"/>
        <CL k="exp" label="Experiencia validada"/>
        <CL k="edu" label="Formación validada"/>
        <CL k="sal" label="Salario compatible"/>
        <CL k="dis" label="Disponibilidad confirmada"/>
        <div style={{fontSize:11,color:C.muted,marginTop:5,textAlign:"right"}}>{Object.values(checklist).filter(Boolean).length}/5 validados</div>
      </div>
      <div style={{padding:"14px 16px"}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Notas internas</div>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)}
          placeholder="Observaciones sobre el candidato..."
          style={{width:"100%",minHeight:80,border:`1.5px solid ${C.border}`,borderRadius:10,
            padding:"9px 12px",fontSize:13,color:C.text,resize:"vertical",
            fontFamily:"inherit",lineHeight:1.6,outline:"none",boxSizing:"border-box",background:"#fff"}}
          onFocus={e=>e.target.style.borderColor=C.accent}
          onBlur={e=>e.target.style.borderColor=C.border}/>
      </div>
    </div>
  );

  /* ── RIGHT PANEL content (shared) ── */
  const CvPanel = ()=>(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"9px 14px",borderBottom:`1px solid ${C.border}`,background:"#FAFBFF",flexShrink:0}}>
        <span style={{fontSize:13,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>
          📎 {c.cvFileName||"Hoja de vida"}
        </span>
        {c.cvUrl&&<div style={{display:"flex",gap:6,flexShrink:0}}>
          <button onClick={async()=>{let u=cvSrc;if(!u&&c.cvUrl&&!c.cvUrl.startsWith("data:"))u=await getSignedUrl(c.cvUrl);if(u)window.open(u,"_blank");}}
            style={{background:`${C.info}15`,color:C.info,border:"none",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit"}}>
            Abrir
          </button>
          <button onClick={async()=>{let u=cvSrc;if(!u&&c.cvUrl&&!c.cvUrl.startsWith("data:"))u=await getSignedUrl(c.cvUrl);if(u){const a=document.createElement("a");a.href=u;a.download=c.cvFileName||"CV.pdf";document.body.appendChild(a);a.click();document.body.removeChild(a);}}}
            style={{background:`${C.accent}15`,color:C.accent,border:"none",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit"}}>
            Descargar
          </button>
        </div>}
      </div>
      <div style={{flex:1,overflow:"hidden",position:"relative"}}>
        {!c.cvUrl?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:C.muted,gap:10}}>
            <div style={{fontSize:40,opacity:.3}}>📄</div>
            <div style={{fontSize:14,fontWeight:500}}>Sin CV adjunto</div>
          </div>
        ):cvLoad?(
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",gap:10,color:C.muted}}>
            <Spinner size={22}/> Cargando CV...
          </div>
        ):cvSrc?(
          <iframe src={cvSrc} title="CV" width="100%" height="100%" style={{border:"none",display:"block"}}/>
        ):(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:C.muted,gap:12}}>
            <div style={{fontSize:36}}>⚠️</div>
            <button onClick={()=>{setCvLoad(true);getSignedUrl(c.cvUrl).then(u=>{setCvSrc(u);setCvLoad(false);}).catch(()=>setCvLoad(false));}}
              style={{background:C.accent,color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
              Reintentar
            </button>
          </div>
        )}
      </div>
    </div>
  );

  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()}
      style={{position:"fixed",inset:0,background:IS_MOBILE?"#fff":"rgba(0,0,0,0.65)",
        zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",
        backdropFilter:IS_MOBILE?"none":"blur(3px)"}}>

      {toast&&<div style={{position:"fixed",top:IS_MOBILE?60:14,left:"50%",transform:"translateX(-50%)",zIndex:1010,
        background:toast.t==="warn"?"#FEF3C7":"#DCFCE7",color:toast.t==="warn"?"#92400E":"#065F46",
        border:`1px solid ${toast.t==="warn"?"#FDE68A":"#86EFAC"}`,borderRadius:99,
        padding:"6px 18px",fontSize:13,fontWeight:600,boxShadow:"0 4px 12px rgba(0,0,0,0.1)"}}>
        {toast.msg}
      </div>}

      {IS_MOBILE ? (
        /* ════ MOBILE: full screen with tabs ════ */
        <div style={{position:"fixed",inset:0,background:"#fff",display:"flex",flexDirection:"column",zIndex:1000}}>
          <TopBar/>
          {/* Tab switcher */}
          <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:"#fff",flexShrink:0}}>
            {["perfil","cv"].map(tab=>(
              <button key={tab} onClick={()=>setMobileTab(tab)}
                style={{flex:1,padding:"11px 0",border:"none",
                  background:"transparent",cursor:"pointer",fontFamily:"inherit",
                  fontSize:14,fontWeight:mobileTab===tab?700:400,
                  color:mobileTab===tab?C.accent:C.muted,
                  borderBottom:`2.5px solid ${mobileTab===tab?C.accent:"transparent"}`,
                  transition:"all .15s"}}>
                {tab==="perfil"?"👤 Perfil":"📄 CV"}
              </button>
            ))}
          </div>
          {/* Tab content */}
          <div style={{flex:1,overflow:"hidden",background:"#F8FAFF"}}>
            {mobileTab==="perfil" ? <ProfilePanel/> : <CvPanel/>}
          </div>
          <BottomBar/>
        </div>
      ) : (
        /* ════ DESKTOP: two-column modal ════ */
        <div style={{width:"93vw",height:"93vh",background:"#fff",borderRadius:18,
          display:"flex",flexDirection:"column",overflow:"hidden",
          boxShadow:"0 32px 80px rgba(0,0,0,0.3)",position:"relative"}}>
          <TopBar/>
          <div style={{display:"grid",gridTemplateColumns:"40% 60%",flex:1,overflow:"hidden",minHeight:0}}>
            <div style={{background:"#F8FAFF",borderRight:`1px solid ${C.border}`,overflow:"hidden"}}>
              <ProfilePanel/>
            </div>
            <div style={{overflow:"hidden"}}>
              <CvPanel/>
            </div>
          </div>
          <BottomBar/>
        </div>
      )}
    </div>
  );
}


function PipelineView({ candidates, setCandidates, refreshCandidates }) {
  const [modalIdx, setModalIdx]           = useState(null);
  const [modalSnap, setModalSnap]         = useState(null);
  const [search, setSearch]               = useState("");
  const [showDiscarded, setShowDiscarded] = useState(false);
  const discRef = useRef(null);

  useEffect(()=>{
    const h=e=>{ if(discRef.current&&!discRef.current.contains(e.target)) setShowDiscarded(false); };
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[]);

  const PIPE = [
    {id:"Nuevo"},{id:"CV revisado"},{id:"Pre-seleccionado"},
    {id:"En entrevista"},{id:"Evaluación"},{id:"Finalista"},
  ];

  const filtered = search
    ? candidates.filter(c=>(c.name||"").toLowerCase().includes(search.toLowerCase())||(c.position||"").toLowerCase().includes(search.toLowerCase()))
    : candidates;

  const byStage = {};
  [...PIPE.map(s=>s.id),"Seleccionado","Descartado"].forEach(id=>{ byStage[id]=[]; });
  filtered.forEach(c=>{ const st=c.status||"Nuevo"; if(byStage[st]) byStage[st].push(c); else byStage["Nuevo"].push(c); });

  const ordered = [...PIPE.map(s=>s.id),"Seleccionado","Descartado"].flatMap(id=>byStage[id]||[]);

  const openModal = c => {
    const snap=[...ordered]; const idx=snap.findIndex(x=>x.id===c.id);
    setModalSnap(snap); setModalIdx(idx>=0?idx:0);
  };

  const handleUpdate = (id, patch) => {
    setCandidates(prev=>prev.map(c=>c.id===id?{...c,...patch}:c));
    setModalSnap(prev=>prev?prev.map(c=>c.id===id?{...c,...patch}:c):prev);
  };

  const active   = candidates.filter(c=>!["Seleccionado","Descartado"].includes(c.status)).length;
  const selected = byStage["Seleccionado"].length;
  const rejected = byStage["Descartado"].length;

  const daysAgo = d=>{ if(!d)return null; const n=Math.floor((Date.now()-new Date(d))/86400000); return n===0?"Hoy":n===1?"Ayer":n+"d"; };

  return (
    <div className="fade-in" style={{ display:"flex",flexDirection:"column",height:"100%",minHeight:0 }}>
      {/* Header */}
      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",gap:14,marginBottom:16,flexWrap:"wrap" }}>
        <div>
          <h1 style={{ fontSize:21,fontWeight:700,color:C.text,marginBottom:3 }}>Pipeline de selección</h1>
          <div style={{ display:"flex",gap:12,alignItems:"center",flexWrap:"wrap" }}>
            <span style={{ fontSize:13,color:C.muted }}>{active} en proceso</span>
            {selected>0&&<span style={{ fontSize:13,fontWeight:600,color:C.success,background:C.successL,borderRadius:99,padding:"2px 10px" }}>✓ {selected} seleccionado{selected!==1?"s":""}</span>}
            {rejected>0&&(
              <div ref={discRef} style={{ position:"relative" }}>
                <button onClick={()=>setShowDiscarded(v=>!v)}
                  style={{ fontSize:13,color:C.muted,background:showDiscarded?"#E2E8F0":"#F1F5F9",border:"none",
                    borderRadius:99,padding:"3px 12px",cursor:"pointer",fontFamily:"inherit",fontWeight:500 }}>
                  {rejected} descartado{rejected!==1?"s":""} {showDiscarded?"▲":"▼"}
                </button>
                {showDiscarded&&(
                  <div style={{ position:"absolute",top:"calc(100% + 8px)",left:0,zIndex:200,background:"#fff",
                    borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,0.15)",border:`1px solid ${C.border}`,
                    width:280,maxHeight:340,overflowY:"auto" }}>
                    <div style={{ padding:"10px 14px",borderBottom:`1px solid ${C.border}`,fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em" }}>Descartados</div>
                    {(byStage["Descartado"]||[]).map(c=>(
                      <div key={c.id} onClick={()=>{setShowDiscarded(false);openModal(c);}}
                        style={{ display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:`1px solid #F8F9FA`,transition:"background .12s" }}
                        onMouseEnter={e=>e.currentTarget.style.background="#F8FAFF"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <div style={{ width:28,height:28,borderRadius:"50%",flexShrink:0,background:"#F1F5F9",color:C.muted,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12 }}>{(c.name||"?")[0].toUpperCase()}</div>
                        <div style={{ minWidth:0,flex:1 }}>
                          <div style={{ fontWeight:600,color:C.text,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{c.name}</div>
                          {c.position&&<div style={{ color:C.muted,fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{c.position}</div>}
                        </div>
                        {c.cvUrl&&<span style={{ fontSize:9,color:C.success,fontWeight:700,background:"#F0FDF4",borderRadius:4,padding:"1px 5px",border:"1px solid #BBF7D0",flexShrink:0 }}>CV</span>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
        <div style={{ position:"relative" }}>
          <Search size={13} color={C.muted} style={{ position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",pointerEvents:"none" }}/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar..."
            style={{ paddingLeft:28,paddingRight:10,paddingTop:7,paddingBottom:7,
              border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,
              outline:"none",background:"#fff",width:170,fontFamily:"inherit" }}
            onFocus={e=>e.target.style.borderColor=C.accent}
            onBlur={e=>e.target.style.borderColor=C.border}/>
        </div>
      </div>

      {/* Board */}
      {candidates.length===0 ? (
        <div style={{ background:"#fff",borderRadius:12,padding:48,textAlign:"center",border:`1px solid ${C.border}` }}>
          <Layers size={44} color={C.border} style={{ display:"block",margin:"0 auto 12px" }}/>
          <h3 style={{ color:C.text,marginBottom:8 }}>Pipeline vacío</h3>
          <p style={{ color:C.muted,fontSize:13 }}>Agrega candidatos para verlos aquí.</p>
        </div>
      ) : IS_MOBILE ? (
        /* ── MOBILE: vertical list by stage ── */
        <div style={{ display:"flex", flexDirection:"column", gap:12, paddingBottom:8 }}>
          {PIPE.map(stage => (
            <MobilePipelineStage
              key={stage.id}
              stage={stage}
              cards={byStage[stage.id]||[]}
              onOpenModal={openModal}
            />
          ))}
        </div>
      ) : (
        /* ── DESKTOP: kanban columns ── */
        <div style={{ display:"grid", gridTemplateColumns:`repeat(${PIPE.length},1fr)`, gap:8, flex:1, minHeight:0, alignItems:"start" }}>
          {PIPE.map(stage=>{
            const cards=byStage[stage.id]||[];
            return (
              <div key={stage.id} style={{ display:"flex",flexDirection:"column",maxHeight:"calc(100vh - 200px)" }}>
                <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,padding:"0 2px" }}>
                  <span style={{ fontSize:11.5,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{stage.id}</span>
                  <span style={{ background:cards.length>0?C.accent:"#E2E8F0",color:cards.length>0?"#fff":C.muted,
                    borderRadius:99,padding:"1px 6px",fontSize:11,fontWeight:700,flexShrink:0,marginLeft:4 }}>{cards.length}</span>
                </div>
                <div style={{ background:"#F8F9FA",borderRadius:10,padding:6,flex:1,overflowY:"auto",border:"1px solid #EBEBEB",minHeight:72 }}>
                  {cards.length===0 ? (
                    <div style={{ textAlign:"center",padding:"18px 4px",color:"#CBD5E1",fontSize:11 }}>Sin candidatos</div>
                  ) : cards.map(c=>(
                    <div key={c.id} onClick={()=>openModal(c)}
                      style={{ background:"#fff",borderRadius:8,padding:"10px",marginBottom:5,
                        border:"1px solid #EBEBEB",cursor:"pointer",transition:"all .15s",
                        boxShadow:"0 1px 2px rgba(0,0,0,0.04)" }}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.boxShadow="0 3px 8px rgba(0,0,0,0.1)";e.currentTarget.style.transform="translateY(-1px)";}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor="#EBEBEB";e.currentTarget.style.boxShadow="0 1px 2px rgba(0,0,0,0.04)";e.currentTarget.style.transform="translateY(0)";}}>
                      <div style={{ display:"flex",alignItems:"center",gap:7,marginBottom:6 }}>
                        <div style={{ width:26,height:26,borderRadius:"50%",flexShrink:0,
                          background:`linear-gradient(135deg,${C.accent},${C.primary})`,color:"#fff",
                          display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11 }}>
                          {(c.name||"?")[0].toUpperCase()}
                        </div>
                        <div style={{ minWidth:0,flex:1 }}>
                          <div style={{ fontWeight:600,color:C.text,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{c.name}</div>
                          {c.position&&<div style={{ color:C.muted,fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{c.position}</div>}
                        </div>
                      </div>
                      <div style={{ display:"flex",alignItems:"center",gap:4 }}>
                        {c.cvUrl&&<span style={{ fontSize:9,color:C.success,fontWeight:700,background:"#F0FDF4",borderRadius:4,padding:"1px 5px",border:"1px solid #BBF7D0",flexShrink:0 }}>CV</span>}
                        {c.email&&<span style={{ fontSize:9,color:C.muted,background:"#F8F9FA",borderRadius:4,padding:"1px 4px",border:"1px solid #EBEBEB",flexShrink:0 }}>✉</span>}
                        {c.createdAt&&<span style={{ fontSize:9,color:"#CBD5E1",marginLeft:"auto",flexShrink:0 }}>{daysAgo(c.createdAt)}</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modalIdx!==null&&modalSnap&&modalSnap[modalIdx]&&(
        <PipelineCandidateModal
          allCandidates={modalSnap}
          currentIdx={modalIdx}
          onNavigate={idx=>setModalIdx(idx)}
          onClose={()=>{setModalIdx(null);setModalSnap(null);}}
          onUpdated={handleUpdate}
        />
      )}
    </div>
  );
}


function FormsView({ formSubmissions, refreshForms }) {
  const [selected, setSelected] = useState(null);

  const handleDownload = async form => {
    const html = generateFormHTML(form.formData, { companyName: form.companyName, date: form.submittedAt });
    const blob = new Blob([html], { type: "application/msword;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `MAN-GTH-001_${(form.formData?.tituloPuesto || "Cargo").replace(/\s/g, "_")}_${form.companyName.replace(/\s/g, "_")}.doc`;
    a.click(); URL.revokeObjectURL(url);
    await db.update("form_submissions", form.id, { downloaded: true });
    await refreshForms();
    setSelected(prev => prev?.id === form.id ? { ...prev, downloaded: true } : prev);
  };

  const handleDelete = async id => {
    if (!confirm("¿Eliminar este formulario?")) return;
    await db.del("form_submissions", id);
    await refreshForms();
    if (selected?.id === id) setSelected(null);
  };

  return (
    <div className="fade-in">
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Formularios de cargo</h1>
        <p style={{ color: C.muted, fontSize: 14 }}>Solicitudes enviadas por tus empresas clientes · {formSubmissions.length} recibidos</p>
      </div>
      {formSubmissions.length === 0
        ? <Card style={{ textAlign: "center", padding: 56 }}>
          <FileText size={52} color={C.border} style={{ margin: "0 auto 16px" }} />
          <h3 style={{ color: C.text, marginBottom: 8 }}>Sin formularios recibidos aún</h3>
          <p style={{ color: C.muted, fontSize: 14 }}>Cuando una empresa envíe su solicitud de cargo, aparecerá aquí.</p>
        </Card>
        : <div style={{ display: IS_MOBILE ? "block" : "grid", gridTemplateColumns: "300px 1fr", gap: 20, alignItems: "start" }}>
          <Card style={{ padding: 0, overflow: "hidden" }}>
            {[...formSubmissions].sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt)).map(f => (
              <div key={f.id} onClick={() => setSelected(f)}
                style={{ padding: "12px 14px", borderBottom: `1px solid ${C.border}`, cursor: "pointer", background: selected?.id === f.id ? `${C.accent}08` : "", borderLeft: `3px solid ${selected?.id === f.id ? C.accent : "transparent"}` }}
                onMouseEnter={e => { if (selected?.id !== f.id) e.currentTarget.style.background = C.bg; }}
                onMouseLeave={e => { if (selected?.id !== f.id) e.currentTarget.style.background = ""; }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontWeight: 500, color: C.text, fontSize: 14 }}>{f.companyName}</div>
                    <div style={{ color: C.muted, fontSize: 12 }}>{f.formData?.tituloPuesto || "Sin título"}</div>
                    <div style={{ color: C.muted, fontSize: 11, marginTop: 2 }}>{fmtDate(f.submittedAt)}</div>
                  </div>
                  <Badge color={f.downloaded ? "neutral" : "info"}>{f.downloaded ? "Revisado" : "Nuevo"}</Badge>
                </div>
              </div>
            ))}
          </Card>
          {selected
            ? <Card className="fade-in">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
                <div>
                  <h2 style={{ fontSize: 18, fontWeight: 600, color: C.text, marginBottom: 3 }}>{selected.companyName}</h2>
                  <div style={{ color: C.muted, fontSize: 13 }}>Recibido: {fmtDate(selected.submittedAt)}</div>
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <Btn variant="danger" size="sm" onClick={() => handleDelete(selected.id)}><Trash2 size={14} /> Eliminar</Btn>
                  <Btn size="sm" onClick={() => handleDownload(selected)}><Download size={14} /> Descargar .doc</Btn>
                </div>
              </div>
              <FormPreview data={selected.formData} />
            </Card>
            : <Card style={{ textAlign: "center", padding: 48 }}>
              <Eye size={40} color={C.border} style={{ margin: "0 auto 16px" }} />
              <p style={{ color: C.muted }}>Selecciona un formulario para ver su contenido y descargarlo</p>
            </Card>}
        </div>}
    </div>
  );
}

const Eye = ({ size, color, style: s }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color || "currentColor"} strokeWidth="2" style={s}>
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
  </svg>
);

function FormPreview({ data = {} }) {
  const Sec = ({ title, children }) => (
    <div style={{ marginBottom: 14 }}>
      <div style={{ background: C.primary, color: "#fff", padding: "6px 12px", borderRadius: "6px 6px 0 0", fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>{title}</div>
      <div style={{ border: `1px solid ${C.border}`, borderTop: "none", borderRadius: "0 0 6px 6px", padding: 14 }}>{children}</div>
    </div>
  );
  const Row = ({ label, value }) => (
    <div style={{ display: "flex", gap: 8, marginBottom: 5 }}>
      <span style={{ fontWeight: 600, fontSize: 12, color: C.text, minWidth: 170, flexShrink: 0 }}>{label}:</span>
      <span style={{ fontSize: 13, color: C.muted }}>{value || "—"}</span>
    </div>
  );
  const cb = v => v ? "✅" : "⬜";
  return (
    <div style={{ fontSize: 13 }}>
      <Sec title="I. Identificación del cargo">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 20px" }}>
          <Row label="Título del puesto" value={data.tituloPuesto} /><Row label="Área" value={data.area} />
          <Row label="Nivel jerárquico" value={data.nivelJerarquico} /><Row label="Departamento" value={data.departamento} />
          <Row label="Informa a (jerárquico)" value={data.informaJerarquico} /><Row label="Informa a (funcional)" value={data.informaFuncional} />
          <Row label="Relaciones externas" value={data.relacionesExternas} /><Row label="Relaciones internas" value={data.relacionesInternas} />
        </div>
      </Sec>
      <Sec title="II. Posición estructural"><p style={{ margin: 0, color: C.muted, lineHeight: 1.6 }}>{data.posicionEstructural || "—"}</p></Sec>
      <Sec title="III. Misión del cargo"><p style={{ margin: 0, color: C.muted, lineHeight: 1.6 }}>{data.misionCargo || "—"}</p></Sec>
      <Sec title="IV. Responsabilidades & autoridades"><Row label="Responsabilidades" value={data.responsabilidades} /><Row label="Autoridades" value={data.autoridades} /></Sec>
      <Sec title="V. Competencias">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 20px", marginBottom: 10 }}>
          {[["maestria", "Maestría"], ["titulo3", "Título universitario (3er nivel)"], ["estudiante", "Estudiante/egresado universitario"], ["tecnologo", "Tecnólogo"], ["bachiller", "Bachiller"], ["primaria", "Educación primaria"]].map(([k, l]) => (
            <div key={k} style={{ display: "flex", gap: 6, color: C.text }}><span>{cb(data.educacion?.[k])}</span><span>{l}</span></div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", margin: "8px 0" }}>
          {[["sinExp", "Sin experiencia"], ["exp12", "1-2 años"], ["exp35", "3-5 años"], ["exp5", ">5 años"]].map(([k, l]) => (
            <span key={k} style={{ color: C.text }}>{cb(data.experiencia?.[k])} {l}</span>
          ))}
        </div>
        {data.formacion?.cert1 && <Row label="Formación 1" value={data.formacion.cert1} />}
        {data.formacion?.cert2 && <Row label="Formación 2" value={data.formacion.cert2} />}
      </Sec>
      <Sec title="VII. Lugar de trabajo">
        <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
          {[["teletrabajo", "Teletrabajo"], ["oficina", "Oficina"], ["obras", "Obras"], ["bodegas", "Bodegas"]].map(([k, l]) => (
            <span key={k} style={{ color: C.text }}>{l}: <strong>{data.lugarTrabajo?.[k] || 0}%</strong></span>
          ))}
        </div>
      </Sec>
      <Sec title="VIII. Herramientas de trabajo">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 20px" }}>
          {[["extTelefonica", "Extensión telefónica"], ["correoInterno", "Correo electrónico interno"], ["llamadasExt", "Llamadas al exterior"], ["compEscritorio", "Computador de escritorio"], ["uniforme", "Uniforme"], ["compPortatil", "Computador portátil"], ["credencial", "Credencial"], ["celular", "Celular asignado"], ["epp", "EPP"], ["radio", "Radio asignado"], ["vehiculo", "Vehículo asignado"]].map(([k, l]) => (
            <div key={k} style={{ display: "flex", gap: 6, color: C.text }}><span>{cb(data.herramientas?.[k])}</span><span>{l}</span></div>
          ))}
        </div>
      </Sec>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   COMPANIES VIEW

function CompaniesView({ companies, refreshCompanies }) {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ companyName: "", username: "", password: "", email: "" });
  const [saving, setSaving] = useState(false);

  const openAdd = () => { setEditing(null); setForm({ companyName: "", username: "", password: "", email: "" }); setShowModal(true); };
  const openEdit = co => { setEditing(co); setForm({ companyName: co.companyName || "", username: co.username || "", password: co.password || "", email: co.email || "" }); setShowModal(true); };
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  const handleSave = async () => {
    if (!form.companyName || !form.username || !form.password) { alert("Completa nombre, usuario y contraseña"); return; }
    if (companies.some(c => c.username === form.username && (!editing || c.id !== editing.id))) { alert("Ese usuario ya existe"); return; }
    setSaving(true);
    const data = { username: form.username, password: form.password, role: "company", name: form.companyName, company_name: form.companyName, email: form.email || null, active: true };
    if (editing) await db.update("users", editing.id, data);
    else await db.insert("users", { ...data, id: uid() });
    await refreshCompanies();
    setSaving(false); setShowModal(false);
  };

  const handleDelete = async id => {
    if (!confirm("¿Eliminar esta empresa?")) return;
    await db.del("users", id);
    await refreshCompanies();
  };

  const toggleActive = async co => {
    await db.update("users", co.id, { active: !co.active });
    await refreshCompanies();
  };

  return (
    <div className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Empresas clientes</h1>
          <p style={{ color: C.muted, fontSize: 14 }}>Gestiona los accesos al portal de formularios</p>
        </div>
        <Btn onClick={openAdd}><Plus size={16} /> Agregar empresa</Btn>
      </div>
      {companies.length === 0
        ? <Card style={{ textAlign: "center", padding: 56 }}>
          <Building2 size={52} color={C.border} style={{ margin: "0 auto 16px" }} />
          <h3 style={{ color: C.text, marginBottom: 8 }}>Sin empresas registradas</h3>
          <p style={{ color: C.muted, fontSize: 14, marginBottom: 20 }}>Crea cuentas de acceso para tus clientes.</p>
          <Btn onClick={openAdd}><Plus size={16} /> Agregar primera empresa</Btn>
        </Card>
        : <Card style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: C.bg, borderBottom: `1px solid ${C.border}` }}>
                {["Empresa", "Usuario", "Email", "Estado", "Creado", "Acciones"].map(h => (
                  <th key={h} style={{ padding: "10px 16px", textAlign: "left", fontSize: 11, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {companies.map(co => (
                <tr key={co.id} className="rp-row" style={{ borderBottom: `1px solid ${C.border}` }}>
                  <td style={{ padding: "12px 16px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 34, height: 34, borderRadius: 8, background: `${C.info}18`, display: "flex", alignItems: "center", justifyContent: "center" }}><Building2 size={16} color={C.info} /></div>
                      <span style={{ fontWeight: 500, color: C.text }}>{co.companyName}</span>
                    </div>
                  </td>
                  <td style={{ padding: "12px 16px", fontSize: 13, color: C.muted, fontFamily: "monospace" }}>{co.username}</td>
                  <td style={{ padding: "12px 16px", fontSize: 13, color: C.muted }}>{co.email || "—"}</td>
                  <td style={{ padding: "12px 16px" }}><Badge color={co.active !== false ? "success" : "danger"}>{co.active !== false ? "Activa" : "Inactiva"}</Badge></td>
                  <td style={{ padding: "12px 16px", fontSize: 12, color: C.muted }}>{fmtDate(co.createdAt)}</td>
                  <td style={{ padding: "12px 16px" }}>
                    <div style={{ display: "flex", gap: 5 }}>
                      <button onClick={() => toggleActive(co)} style={{ background: `${co.active !== false ? C.warning : C.success}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: co.active !== false ? C.warning : C.success }}>{co.active !== false ? <X size={14} /> : <Check size={14} />}</button>
                      <button onClick={() => openEdit(co)} style={{ background: `${C.info}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: C.info }}><Edit size={14} /></button>
                      <button onClick={() => handleDelete(co.id)} style={{ background: `${C.danger}15`, border: "none", borderRadius: 6, padding: "5px 8px", cursor: "pointer", color: C.danger }}><Trash2 size={14} /></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        </Card>}
      <Modal open={showModal} onClose={() => setShowModal(false)} title={editing ? "Editar empresa" : "Nueva empresa"}>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <Inp label="Nombre de la empresa" required value={form.companyName} onChange={set("companyName")} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Inp label="Usuario de acceso" required value={form.username} onChange={set("username")} />
            <Inp label="Contraseña" type="password" required value={form.password} onChange={set("password")} />
          </div>
          <Inp label="Email de contacto" type="email" value={form.email} onChange={set("email")} />
          <div style={{ background: C.infoL, borderRadius: 8, padding: "10px 14px", fontSize: 13, color: C.info, display: "flex", gap: 8, alignItems: "flex-start" }}>
            <Shield size={15} style={{ flexShrink: 0, marginTop: 1 }} /> La empresa usará estas credenciales para acceder al formulario de cargo.
          </div>
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", paddingTop: 6 }}>
            <Btn variant="secondary" onClick={() => setShowModal(false)}>Cancelar</Btn>
            <Btn onClick={handleSave} disabled={saving}>{saving ? <><Spinner size={14} /> Guardando...</> : <><Check size={15} /> {editing ? "Guardar cambios" : "Crear empresa"}</>}</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   STAR DISPLAY (solo lectura, para mostrar calificaciones)
═══════════════════════════════════════════════════════════ */
function StarDisplay({ value = 0, size = 13 }) {
  return (
    <span style={{ display: "inline-flex", gap: 1, verticalAlign: "middle" }}>
      {[1, 2, 3, 4, 5].map(n => (
        <svg key={n} width={size} height={size} viewBox="0 0 24 24"
          fill={n <= value ? "#F59E0B" : "none"} stroke={n <= value ? "#F59E0B" : "#CBD5E1"} strokeWidth="1.5">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
        </svg>
      ))}
    </span>
  );
}

function FeedbackView({ consultations, refreshConsultations, surveys }) {
  const [filter, setFilter] = useState("all");
  const unread = consultations.filter(c => !c.read);
  const filtered = filter === "unread"
    ? unread
    : filter === "read"
      ? consultations.filter(c => c.read)
      : consultations;

  const markRead = async id => {
    await db.markConsultationRead(id);
    await refreshConsultations();
  };

  const markAllRead = async () => {
    await Promise.all(unread.map(c => db.markConsultationRead(c.id)));
    await refreshConsultations();
  };

  const openWhatsApp = (msg, companyName) => {
    const text = encodeURIComponent(`Hola, respondo tu consulta sobre: "${msg.substring(0, 80)}${msg.length > 80 ? "..." : ""}"`);
    window.open(`https://wa.me/${WA_NUMBER}?text=${text}`, "_blank");
  };

  return (
    <div className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Feedback empresarial</h1>
          <p style={{ color: C.muted, fontSize: 14 }}>Encuestas de satisfacción y consultas enviadas por tus empresas</p>
        </div>
        {unread.length > 0 && (
          <Btn size="sm" variant="secondary" onClick={markAllRead}>
            <Check size={14} /> Marcar todas como leídas
          </Btn>
        )}
      </div>


      {/* Encuestas de satisfacción */}
      <Card style={{ marginBottom: 28 }}>
        <h3 style={{ fontSize: 15, fontWeight: 600, color: C.text, marginBottom: 16, display: "flex", alignItems: "center", gap: 8 }}>
          <ThumbsUp size={16} color={C.accent} /> Encuestas de satisfacción
        </h3>
        {surveys.length === 0 ? (
          <p style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "16px 0" }}>
            Aún no hay encuestas respondidas. Aparecerán aquí cuando una empresa envíe su formulario de cargo.
          </p>
        ) : (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14, marginBottom: 20 }}>
              {[
                ["Facilidad del formulario", surveys.reduce((a, s) => a + (s.q1 || 0), 0) / surveys.length],
                ["Satisfacción del proceso", surveys.reduce((a, s) => a + (s.q2 || 0), 0) / surveys.length],
                ["Probabilidad de recomendar", surveys.reduce((a, s) => a + (s.q3 || 0), 0) / surveys.length],
              ].map(([label, avg]) => (
                <div key={label} style={{ background: C.bg, borderRadius: 10, padding: "14px 16px", textAlign: "center" }}>
                  <div style={{ fontSize: 24, fontWeight: 700, color: C.accent }}>{avg.toFixed(1)}<span style={{ fontSize: 14, color: C.muted }}>/5</span></div>
                  <div style={{ fontSize: 11.5, color: C.muted, marginTop: 4 }}>{label}</div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: 260, overflowY: "auto" }}>
              {[...surveys].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).map(s => (
                <div key={s.id} style={{ border: `1px solid ${C.border}`, borderRadius: 10, padding: "12px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                    <span style={{ fontWeight: 600, fontSize: 13.5, color: C.text }}>{s.companyName}</span>
                    <span style={{ fontSize: 11, color: C.muted }}>{new Date(s.createdAt).toLocaleDateString("es-EC")}</span>
                  </div>
                  <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: s.comment ? 8 : 0 }}>
                    <span style={{ fontSize: 12, color: C.muted }}>Facilidad: <StarDisplay value={s.q1} /></span>
                    <span style={{ fontSize: 12, color: C.muted }}>Satisfacción: <StarDisplay value={s.q2} /></span>
                    <span style={{ fontSize: 12, color: C.muted }}>Recomienda: <StarDisplay value={s.q3} /></span>
                  </div>
                  {s.comment && <div style={{ fontSize: 13, color: C.text, background: C.bg, borderRadius: 8, padding: "8px 12px" }}>{s.comment}</div>}
                </div>
              ))}
            </div>
          </>
        )}
      </Card>

      <h3 style={{ fontSize: 15, fontWeight: 600, color: C.text, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
        <MessageSquare size={16} color={C.info} /> Consultas vía chat
      </h3>
      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14, marginBottom: 20 }}>
        {[
          { label: "Total recibidas", value: consultations.length, color: C.info },
          { label: "Sin leer", value: unread.length, color: C.danger },
          { label: "Respondidas", value: consultations.filter(c => c.read).length, color: C.success },
        ].map(s => (
          <div key={s.label} style={{ background: C.card, borderRadius: 10, padding: "14px 18px",
            boxShadow: "0 1px 3px rgba(0,0,0,0.06)", borderLeft: `3px solid ${s.color}` }}>
            <div style={{ fontSize: 26, fontWeight: 700, color: C.text }}>{s.value}</div>
            <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Filter tabs */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {[["all", "Todas"], ["unread", "Sin leer"], ["read", "Leídas"]].map(([val, lbl]) => (
          <button key={val} onClick={() => setFilter(val)}
            style={{ padding: "6px 16px", borderRadius: 99, border: "1.5px solid",
              borderColor: filter === val ? C.accent : C.border,
              background: filter === val ? `${C.accent}15` : "transparent",
              color: filter === val ? C.accent : C.muted,
              cursor: "pointer", fontSize: 13, fontWeight: filter === val ? 600 : 400, fontFamily: "inherit" }}>
            {lbl}
          </button>
        ))}
      </div>

      {/* Messages list */}
      {consultations.length === 0 ? (
        <div style={{ background: C.card, borderRadius: 12, padding: 56, textAlign: "center",
          boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
          <MessageSquare size={52} color={C.border} style={{ display: "block", margin: "0 auto 16px" }} />
          <h3 style={{ color: C.text, marginBottom: 8 }}>Sin consultas aún</h3>
          <p style={{ color: C.muted, fontSize: 14 }}>Cuando una empresa envíe una consulta desde el formulario, aparecerá aquí.</p>
        </div>
      ) : filtered.length === 0 ? (
        <div style={{ background: C.card, borderRadius: 12, padding: 40, textAlign: "center",
          boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>

/* ═══════════════════════════════════════════════════════════
   CALENDARIO Y ALERTAS (admin)
═══════════════════════════════════════════════════════════ */
function CalendarView({ candidates }) {
  const [events, setEvents] = useState([]);
  const [cursor, setCursor] = useState(new Date());
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [prefillDate, setPrefillDate] = useState(null);

  const loadEvents = async () => {
    const data = await db.get("calendar_events", "order=event_date.asc");
    if (data) setEvents(data.map(mapEvent));
  };

  // Fetch every time this view renders (mounts)
  useEffect(() => { loadEvents(); }, []);

  const year = cursor.getFullYear(), month = cursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthLabel = cursor.toLocaleDateString("es-EC", { month: "long", year: "numeric" });

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const pad2 = n => String(n).padStart(2, "0");
  const dateKey = d => `${year}-${pad2(month + 1)}-${pad2(d)}`;
  const todayKey = new Date().toISOString().slice(0, 10);

  const eventsByDay = {};
  events.forEach(ev => {
    const key = (ev.eventDate || "").slice(0, 10);
    if (!eventsByDay[key]) eventsByDay[key] = [];
    eventsByDay[key].push(ev);
  });

  const openNew = d => { setEditing(null); setPrefillDate(d ? dateKey(d) : todayKey); setModalOpen(true); };
  const openEdit = ev => { setEditing(ev); setModalOpen(true); };

  const handleSave = async data => {
    if (editing) {
      const ok = await db.update("calendar_events", editing.id, data);
      if (ok === false) { alert("Error al actualizar. Intenta de nuevo."); return; }
    } else {
      const res = await db.insert("calendar_events", { id: uid(), ...data });
      if (!res) {
        const detail = window._lastDbError || "sin detalle";
        alert("Error al guardar el evento.\n\nDetalle técnico:\n" + detail + "\n\nCopia este mensaje y envíalo a tu consultor.");
        return;
      }
    }
    await loadEvents();
    setModalOpen(false);
  };
  const handleDelete = async id => {
    if (!confirm("¿Eliminar este evento?")) return;
    await db.del("calendar_events", id);
    await loadEvents();
    setModalOpen(false);
  };

  const upcoming = events
    .filter(e => (e.eventDate || "") >= todayKey && e.status !== "Cancelado")
    .sort((a, b) => (a.eventDate + (a.eventTime || "")).localeCompare(b.eventDate + (b.eventTime || "")))
    .slice(0, 8);

  return (
    <div className="fade-in">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Calendario y alertas</h1>
          <p style={{ color: C.muted, fontSize: 14 }}>Agenda entrevistas, evaluaciones y citas del proceso de selección</p>
        </div>
        <Btn onClick={() => openNew(null)}><Plus size={16} /> Nuevo evento</Btn>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 280px", gap: 20, alignItems: "start" }}>
        <Card style={{ padding: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <button onClick={() => setCursor(new Date(year, month - 1, 1))} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: 7, cursor: "pointer", display: "flex" }}><ChevronLeft size={16} /></button>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: C.text, textTransform: "capitalize" }}>{monthLabel}</h3>
            <button onClick={() => setCursor(new Date(year, month + 1, 1))} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, padding: 7, cursor: "pointer", display: "flex" }}><ChevronRight size={16} /></button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 6 }}>
            {["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"].map(d => (
              <div key={d} style={{ textAlign: "center", fontSize: 10.5, fontWeight: 700, color: C.muted, textTransform: "uppercase" }}>{d}</div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
            {cells.map((d, i) => {
              if (d === null) return <div key={i} />;
              const key = dateKey(d);
              const dayEvents = eventsByDay[key] || [];
              const isToday = key === todayKey;
              return (
                <div key={i} onClick={() => openNew(d)}
                  style={{ minHeight: 76, border: `1.5px solid ${isToday ? C.accent : C.border}`, borderRadius: 8, padding: 4, cursor: "pointer", background: isToday ? `${C.accent}08` : "#fff", display: "flex", flexDirection: "column", gap: 2, overflow: "hidden" }}>
                  <span style={{ fontSize: 11, fontWeight: isToday ? 700 : 500, color: isToday ? C.accent : C.text }}>{d}</span>
                  {dayEvents.slice(0, 2).map(ev => {
                    const t = EVENT_TYPES.find(t => t.id === ev.eventType) || EVENT_TYPES[4];
                    return (
                      <div key={ev.id} onClick={e => { e.stopPropagation(); openEdit(ev); }}
                        title={ev.title}
                        style={{ fontSize: 9.5, background: t.bg, color: t.color, borderRadius: 4, padding: "1px 4px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontWeight: 600 }}>
                        {ev.eventTime ? ev.eventTime + " " : ""}{ev.title}
                      </div>
                    );
                  })}
                  {dayEvents.length > 2 && <div style={{ fontSize: 9, color: C.muted }}>+{dayEvents.length - 2} más</div>}
                </div>
              );
            })}
          </div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 16, paddingTop: 14, borderTop: `1px solid ${C.border}` }}>
            {EVENT_TYPES.map(t => (
              <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11.5, color: C.muted }}>
                <span style={{ width: 9, height: 9, borderRadius: 3, background: t.color }} /> {t.id}
              </div>
            ))}
          </div>
        </Card>

        <Card>
          <h3 style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 14, display: "flex", alignItems: "center", gap: 7 }}>
            <Bell size={15} color={C.warning} /> Próximos eventos
          </h3>
          {upcoming.length === 0 ? (
            <p style={{ color: C.muted, fontSize: 13, textAlign: "center", padding: "16px 0" }}>Sin eventos próximos</p>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {upcoming.map(ev => {
                const t = EVENT_TYPES.find(t => t.id === ev.eventType) || EVENT_TYPES[4];
                const isToday = (ev.eventDate || "").slice(0, 10) === todayKey;
                return (
                  <div key={ev.id} onClick={() => openEdit(ev)}
                    style={{ border: `1px solid ${C.border}`, borderLeft: `3px solid ${t.color}`, borderRadius: 8, padding: "9px 11px", cursor: "pointer" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 12.5, fontWeight: 600, color: C.text }}>{ev.title}</span>
                      {isToday && <Badge color="warning">Hoy</Badge>}
                    </div>
                    <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>
                      {new Date(ev.eventDate + "T00:00:00").toLocaleDateString("es-EC", { day: "2-digit", month: "short" })}
                      {ev.eventTime ? ` · ${ev.eventTime}` : ""} · {ev.eventType}
                    </div>
                    {ev.candidateName && <div style={{ fontSize: 11, color: C.accent, marginTop: 2 }}>👤 {ev.candidateName}</div>}
                  </div>
                );
              })}
            </div>
          )}
          <div style={{ marginTop: 14, padding: "10px 12px", background: C.infoL, borderRadius: 8, fontSize: 11.5, color: "#1E40AF", lineHeight: 1.5 }}>
            💡 Estas alertas se muestran dentro del sistema. La sincronización con tu correo o agenda externa puede agregarse más adelante si lo necesitas.
          </div>
        </Card>
      </div>

      {modalOpen && (
        <EventModal
          event={editing}
          prefillDate={prefillDate}
          candidates={candidates}
          onClose={() => setModalOpen(false)}
          onSave={handleSave}
          onDelete={editing ? () => handleDelete(editing.id) : null}
        />
      )}
    </div>
  );
}

function EventModal({ event, prefillDate, candidates, onClose, onSave, onDelete }) {
  const blank = { title:"", eventType:"Entrevista", eventDate:prefillDate||"", eventTime:"",
    candidateId:"", notes:"", status:"Pendiente", meetingUrl:"", priority:"Media" };
  const [form, setForm] = useState(event ? {
    title:event.title||"", eventType:event.eventType||"Entrevista",
    eventDate:(event.eventDate||"").slice(0,10), eventTime:event.eventTime||"",
    candidateId:event.candidateId||"", notes:event.notes||"",
    status:event.status||"Pendiente", meetingUrl:event.meetingUrl||"",
    priority:event.priority||"Media",
  } : blank);
  const [saving, setSaving] = useState(false);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));

  const genJitsi = () => {
    const room = "ReclutaPlus-"+Math.random().toString(36).substr(2,8).toUpperCase();
    setForm(f=>({...f, meetingUrl:"https://meet.jit.si/"+room}));
  };

  const sendWA = () => {
    const cand = candidates.find(c=>c.id===form.candidateId);
    let dest = WA_NUMBER;
    if (cand && cand.phone) {
      const clean = cand.phone.replace(/[^0-9]/g,"");
      if (clean.length>=7) dest=clean;
    } else if (cand) {
      alert("El candidato "+cand.name+" no tiene telefono registrado.");
      return;
    }
    const d = form.eventDate ? new Date(form.eventDate+"T12:00:00").toLocaleDateString("es-EC",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) : "";
    const t = form.eventTime ? " a las "+form.eventTime : "";
    const meet = form.meetingUrl ? "\nLink de reunion: "+form.meetingUrl : "";
    const txt = encodeURIComponent(
      "Estimado/a "+(cand?cand.name:"")+",\n\n"+
      "Le confirmamos su "+form.eventType.toLowerCase()+" para el "+d+t+"."+
      (form.title&&form.title!==form.eventType?"\nAsunto: "+form.title:"")+
      meet+(form.notes?"\nDetalles: "+form.notes:"")+
      "\n\nAtentamente,\nNorma Kujan Consultoria & Coaching"
    );
    window.open("https://wa.me/"+dest+"?text="+txt,"_blank");
  };

  const save = async () => {
    if (!form.title.trim()){alert("El título es requerido");return;}
    if (!form.eventDate){alert("La fecha es requerida");return;}
    setSaving(true);
    const cand = candidates.find(c=>c.id===form.candidateId);
    await onSave({
      title:form.title, event_type:form.eventType, event_date:form.eventDate,
      event_time:form.eventTime||null, candidate_id:form.candidateId||null,
      candidate_name:cand?cand.name:null, notes:form.notes||null, status:form.status,
      meeting_url:form.meetingUrl||null, priority:form.priority,
    });
    setSaving(false);
  };

  const pLevel = PRIORITY_LEVELS.find(p=>p.id===form.priority)||PRIORITY_LEVELS[1];

  return (
    <Modal open onClose={onClose} title={event?"Editar evento":"Nuevo evento"} width={540}>
      <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
        <Inp label="Título" required value={form.title} onChange={set("title")} placeholder="Ej: Entrevista con candidato..."/>

        {/* Prioridad */}

          <label style={{ fontSize:12,fontWeight:600,color:C.text,textTransform:"uppercase",letterSpacing:"0.04em",display:"block",marginBottom:8 }}>Prioridad</label>

            {PRIORITY_LEVELS.map(p=>(
              <button key={p.id} type="button" onClick={()=>setForm(f=>({...f,priority:p.id}))}
                style={{ flex:1,padding:"8px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                  border:`2px solid ${form.priority===p.id?p.color:C.border}`,
                  background:form.priority===p.id?p.bg:"#fff",
                  fontSize:13,fontWeight:form.priority===p.id?700:400,
                  color:form.priority===p.id?p.color:C.muted,transition:"all .15s" }}>
                {p.id}
              </button>
            ))}
          </div>
          <div style={{ fontSize:11,color:C.muted,marginTop:4 }}>
            {pLevel.id==="Alta"&&"Avisos: 60, 30, 15 y 5 min antes"}
            {pLevel.id==="Media"&&"Avisos: 30 y 15 min antes"}
            {pLevel.id==="Baja"&&"Aviso: 15 min antes"}
          </div>
        </div>

        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12 }}>
          <div style={{ display:"flex",flexDirection:"column",gap:4 }}>
            <label style={{ fontSize:12,fontWeight:600,color:C.text,textTransform:"uppercase",letterSpacing:"0.04em" }}>Tipo</label>
            <select value={form.eventType} onChange={set("eventType")} style={{ ...inputSt }}>
              {EVENT_TYPES.map(t=><option key={t.id} value={t.id}>{t.id}</option>)}
            </select>
          </div>
          <div style={{ display:"flex",flexDirection:"column",gap:4 }}>
            <label style={{ fontSize:12,fontWeight:600,color:C.text,textTransform:"uppercase",letterSpacing:"0.04em" }}>Estado</label>
            <select value={form.status} onChange={set("status")} style={{ ...inputSt }}>
              <option>Pendiente</option><option>Completado</option><option>Cancelado</option>
            </select>
          </div>
        </div>

        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12 }}>
          <Inp label="Fecha" type="date" required value={form.eventDate} onChange={set("eventDate")}/>
          <Inp label="Hora (opcional)" type="time" value={form.eventTime} onChange={set("eventTime")}/>

      id:r.id, name:r.candidate_name, email:r.candidate_email,
      cargo:r.cargo, type:r.evaluation_type,
      total:r.total_questions, answered:r.answered_questions,

function SettingsView({ user, candidates, companies, formSubmissions }) {
  const [old, setOld] = useState(""); const [neo, setNeo] = useState(""); const [conf, setConf] = useState("");
  const [msg, setMsg] = useState(null);

  const handleChange = async () => {
    if (!old || !neo || !conf) { setMsg({ t: "error", v: "Completa todos los campos" }); return; }
    if (neo !== conf) { setMsg({ t: "error", v: "Las contraseñas no coinciden" }); return; }
    if (neo.length < 6) { setMsg({ t: "error", v: "Mínimo 6 caracteres" }); return; }
    const users = await db.get("users", `id=eq.${user.id}`);
    if (!users?.length || users[0].password !== old) { setMsg({ t: "error", v: "La contraseña actual es incorrecta" }); return; }
    const ok = await db.update("users", user.id, { password: neo });
    if (ok) { setMsg({ t: "success", v: "Contraseña actualizada correctamente" }); setOld(""); setNeo(""); setConf(""); }
    else setMsg({ t: "error", v: "Error al actualizar. Intenta de nuevo." });
  };

  return (
    <div className="fade-in">
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Configuración</h1>
        <p style={{ color: C.muted, fontSize: 14 }}>Gestiona tu perfil y preferencias del sistema</p>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, maxWidth: 820 }}>
        <Card>
          <h3 style={{ fontSize: 15, fontWeight: 600, color: C.text, marginBottom: 16 }}>Cambiar contraseña</h3>
          {msg && <div style={{ marginBottom: 14 }}><Alert type={msg.t}>{msg.v}</Alert></div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Inp label="Contraseña actual" type="password" value={old} onChange={e => setOld(e.target.value)} />
            <Inp label="Nueva contraseña" type="password" value={neo} onChange={e => setNeo(e.target.value)} />
            <Inp label="Confirmar nueva contraseña" type="password" value={conf} onChange={e => setConf(e.target.value)} />
            <Btn onClick={handleChange} style={{ marginTop: 4 }}><Lock size={15} /> Actualizar contraseña</Btn>
          </div>
        </Card>
        <Card>
          <h3 style={{ fontSize: 15, fontWeight: 600, color: C.text, marginBottom: 16 }}>Estado del sistema</h3>
          {[["Versión", "Norma Kuján v2.0 ☁️"], ["Base de datos", "Supabase (PostgreSQL)"], ["Almacenamiento CVs", "Supabase Storage"], ["Usuario", user?.username || "admin"], ["Candidatos", candidates.length], ["Empresas", companies.length], ["Formularios", formSubmissions.length]].map(([k, v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
              <span style={{ fontSize: 13, color: C.muted }}>{k}</span>
              <span style={{ fontSize: 13, fontWeight: 500, color: C.text }}>{v}</span>
            </div>
          ))}
          <div style={{ marginTop: 14, padding: "10px 14px", background: C.successL, borderRadius: 8, display: "flex", gap: 8, alignItems: "center", fontSize: 13, color: "#065F46" }}>
            <Check size={15} color={C.success} /> Conectado a Supabase correctamente
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   FORMULARIO: TIPO Y NÚMERO DE POSICIONES REQUERIDAS
═══════════════════════════════════════════════════════════ */
function PositionRequestForm({ user, onBack }) {
  const [form, setForm] = useState({ position: "", quantity: "1", salaryRange: "", startDate: "" });
  const [sending, setSending] = useState(false);
  const [done, setDone] = useState(false);
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  const save = async () => {
    if (!form.position.trim()) { alert("El nombre de la posición es requerido"); return; }
    setSending(true);
    const ok = await db.insert("position_requests", {
      id: uid(), company_id: user.id, company_name: user.companyName || user.name,
      position_name: form.position.trim(), quantity: parseInt(form.quantity) || 1,
      salary_range: form.salaryRange.trim() || null, start_date: form.startDate || null,
    });
    setSending(false);
    if (!ok) {
      const detail = window._lastDbError || "sin detalle";
      alert("No se pudo guardar la solicitud.\n\nDetalle técnico:\n" + detail + "\n\nCopia este mensaje y envíalo a Norma Kuján.");
      return;
    }
    setDone(true);
  };

  if (done) return (
    <div style={{ maxWidth: 520, margin: "60px auto", padding: "0 20px" }}>
      <Card className="fade-in" style={{ textAlign: "center", padding: 44 }}>
        <div style={{ width: 64, height: 64, background: C.successL, borderRadius: "50%", margin: "0 auto 18px", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Check size={30} color={C.success} />
        </div>
        <h2 style={{ color: C.text, marginBottom: 8, fontSize: 19 }}>¡Solicitud enviada!</h2>
        <p style={{ color: C.muted, marginBottom: 24, lineHeight: 1.6, fontSize: 14 }}>
          Registramos tu solicitud para <strong>{form.position}</strong>. La consultora la revisará a la brevedad.
        </p>
        <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
          <Btn variant="secondary" onClick={() => { setDone(false); setForm({ position: "", quantity: "1", salaryRange: "", startDate: "" }); }}>Agregar otra posición</Btn>
          <Btn onClick={onBack}>Volver al menú</Btn>
        </div>
      </Card>
    </div>
  );

  return (
    <div style={{ maxWidth: 560, margin: "0 auto", padding: "40px 20px 60px" }}>
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <h1 style={{ fontSize: 22, fontWeight: 700, color: C.text, marginBottom: 6 }}>Tipo y número de posiciones requeridas</h1>
        <p style={{ color: C.muted, fontSize: 13.5 }}>Cuéntanos qué necesitas para empezar la búsqueda</p>
      </div>
      <Card>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <Inp label="Nombre de la posición / cargo requerido" required value={form.position} onChange={set("position")} placeholder="Ej: Asesor comercial" />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <Inp label="Número de personas requeridas" type="number" value={form.quantity} onChange={set("quantity")} placeholder="1" />
            <Inp label="Fecha tentativa de inicio" type="date" value={form.startDate} onChange={set("startDate")} />
          </div>
          <Inp label="Rango salarial presupuestado" value={form.salaryRange} onChange={set("salaryRange")} placeholder="Ej: $800 - $1,200" />
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", paddingTop: 8, borderTop: `1px solid ${C.border}` }}>
            <Btn variant="secondary" onClick={onBack}>Cancelar</Btn>
            <Btn onClick={save} disabled={sending}>{sending ? <><Spinner size={14} /> Guardando...</> : <><Check size={15} /> Guardar</>}</Btn>
          </div>
        </div>
      </Card>
    </div>
  );
}
