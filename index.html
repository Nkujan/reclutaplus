const H = { "apikey":SB_KEY, "Authorization":`Bearer ${SB_KEY}`, "Content-Type":"application/json", "Prefer":"return=representation" };

const db = {
  async get(table, filter="") {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?select=*${filter?"&"+filter:""}`, {headers:H});
      if(!r.ok){console.error(await r.text());return [];}
      return await r.json();
    } catch(e){console.error(e);return [];}
  },
  async insert(table, data) {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}`,{method:"POST",headers:H,body:JSON.stringify(data)});
      if(!r.ok){console.error(await r.text());return null;}
      const res=await r.json(); return Array.isArray(res)?res[0]:res;
    } catch(e){console.error(e);return null;}
  },
  async update(table, id, data) {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:"PATCH",headers:H,body:JSON.stringify(data)});
      return r.ok;
    } catch(e){console.error(e);return false;}
  },
  async del(table, id) {
    try {
      const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:"DELETE",headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`}});
      return r.ok;
    } catch(e){console.error(e);return false;}
  },
  async uploadCV(file, candidateId) {
    try {
      const ext=file.name.split(".").pop();
      const fileName=`${candidateId}_${Date.now()}.${ext}`;
      const r = await fetch(`${SB_URL}/storage/v1/object/cvs/${fileName}`,{
        method:"POST",
        headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":file.type||"application/octet-stream","x-upsert":"true"},
        body:file,
      });
      if(!r.ok){console.error(await r.text());return null;}
      return `${SB_URL}/storage/v1/object/public/cvs/${fileName}`;
    } catch(e){console.error(e);return null;}
  },
  async deleteCV(cvUrl) {
    try {
      const fileName=cvUrl.split("/cvs/").pop();
      await fetch(`${SB_URL}/storage/v1/object/cvs/${fileName}`,{method:"DELETE",headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`}});
    } catch(e){console.error(e);}
  },
};

/* ═══ LOGIN PAGE ═══ */
function LoginPage({onLogin}) {
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  const handleSubmit = async () => {
    if(!username||!password){setError("Completa todos los campos");return;}
    setLoading(true);setError("");
    const ok=await onLogin(username,password);
    if(!ok){setError("Usuario o contraseña incorrectos");setLoading(false);}
  };

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${C.primary} 0%,${C.primaryL} 50%,#1a4a6e 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className="fade-in" style={{background:"rgba(255,255,255,0.08)",backdropFilter:"blur(8px)",borderRadius:20,padding:40,width:"100%",maxWidth:420,border:"1px solid rgba(255,255,255,0.15)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:72,height:72,background:"rgba(13,148,136,0.25)",borderRadius:20,margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid rgba(13,148,136,0.5)"}}>
            <IconUserPlus size={34} color="#14B8A6"/>
          </div>
          <h1 style={{color:"#fff",fontSize:28,fontWeight:700,letterSpacing:"-0.5px"}}>RecrutaPlus</h1>
          <p style={{color:"rgba(255,255,255,0.55)",marginTop:8,fontSize:14}}>Sistema de Gestión de Reclutamiento</p>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {[["Usuario",username,setUsername,"text"],["Contraseña",password,setPassword,"password"]].map(([lbl,val,setter,typ])=>(
            <div key={lbl}>
              <div style={{color:"rgba(255,255,255,0.75)",fontSize:13,fontWeight:500,marginBottom:6}}>{lbl}</div>
              <div style={{position:"relative"}}>
                {typ==="text"?<IconUser size={15} style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,0.4)"}}/>
                             :<IconLock size={15} style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,0.4)"}}/>}
                <input type={typ} value={val} onChange={e=>setter(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSubmit()}
                  placeholder={typ==="password"?"••••••••":"Ingresa tu usuario"}
                  style={{width:"100%",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:10,padding:"11px 12px 11px 40px",fontSize:14,color:"#fff",outline:"none",fontFamily:"inherit"}}/>
              </div>
            </div>
          ))}
          {error&&<AlertBox type="error">{error}</AlertBox>}
          <button onClick={handleSubmit} disabled={loading} style={{background:C.accent,color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:15,fontWeight:600,cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:6,fontFamily:"inherit",opacity:loading?0.7:1}}>
            {loading?<><Spinner size={18}/> Ingresando...</>:"Ingresar al sistema"}
          </button>
        </div>
        <p style={{textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:11,marginTop:24}}>© 2025 RecrutaPlus · Consultoría de Talento Humano</p>
      </div>
      <style>{`input::placeholder{color:rgba(255,255,255,0.3)!important}`}</style>
    </div>
  );
}

const STATUS_OPTS=["Activo","En proceso","Seleccionado","Descartado"];
const STATUS_COLOR={Activo:"success","En proceso":"info",Seleccionado:"teal",Descartado:"danger"};

function CandidatesView({candidates,refreshCandidates}) {
  const [search,setSearch]=useState("");
  const [posFilter,setPosFilter]=useState("");
  const [statusFilter,setStatusFilter]=useState("");
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const positions=[...new Set(candidates.map(c=>c.position).filter(Boolean))];
  const filtered=candidates.filter(c=>{
    const q=search.toLowerCase();
    return(!q||[c.name,c.email,c.position,c.skills].some(f=>f?.toLowerCase().includes(q)))&&(!posFilter||c.position===posFilter)&&(!statusFilter||c.status===statusFilter);
  });
  const handleDelete=async id=>{
    if(!confirm("¿Eliminar este candidato?"))return;
    const cand=candidates.find(c=>c.id===id);
    if(cand?.cvUrl)await db.deleteCV(cand.cvUrl);
    await db.del("candidates",id);
    await refreshCandidates();
  };
  const handleSave=async(data,cvFile)=>{
    setSaving(true);
    try{
      const isNew=!editing;const id=editing?.id||uid();
      let cvUrl=data.cvUrl||null;let cvFileName=data.cvFileName||null;
      if(cvFile){
        if(editing?.cvUrl)await db.deleteCV(editing.cvUrl);
        const url=await db.uploadCV(cvFile,id);
        if(url){cvUrl=url;cvFileName=cvFile.name;}
      }
      const dbData={id,name:data.name,email:data.email||null,phone:data.phone||null,position:data.position||null,status:data.status||"Activo",skills:data.skills||null,notes:data.notes||null,cv_file_name:cvFileName,cv_url:cvUrl,cv_text:data.cvText||null};
      if(isNew)await db.insert("candidates",dbData);
      else await db.update("candidates",id,dbData);
      await refreshCandidates();
    }catch(e){console.error(e);alert("Error al guardar.");}
    setSaving(false);setShowModal(false);
  };
  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
        <div><h1 style={{fontSize:24,fontWeight:700,color:C.text,marginBottom:4}}>Candidatos</h1>
        <p style={{color:C.muted,fontSize:14}}>Banco de hojas de vida ☁️ · {candidates.length} registrados</p></div>
        <Btn onClick={()=>{setEditing(null);setShowModal(true);}}><IconPlus size={16}/> Agregar candidato</Btn>
      </div>
      <Card style={{padding:14,marginBottom:16}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <div style={{position:"relative",flex:2,minWidth:200}}>
            <IconSearch size={15} style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:C.muted}}/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nombre, email, cargo o habilidades..." style={{...inputSt,paddingLeft:36}}/>
          </div>
          <select value={posFilter} onChange={e=>setPosFilter(e.target.value)} style={{...inputSt,width:"auto",minWidth:160,color:posFilter?C.text:C.muted}}>
            <option value="">Todos los cargos</option>
            {positions.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
          <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{...inputSt,width:"auto",minWidth:140,color:statusFilter?C.text:C.muted}}>
            <option value="">Todos los estados</option>
            {STATUS_OPTS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          {(search||posFilter||statusFilter)&&<Btn variant="ghost" size="sm" onClick={()=>{setSearch("");setPosFilter("");setStatusFilter("");}}><IconX size={14}/> Limpiar</Btn>}
        </div>
      </Card>
      <Card style={{padding:0,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:C.bg,borderBottom:`1px solid ${C.border}`}}>
              {["Candidato","Cargo","Contacto","Habilidades","Estado","Registrado","Acciones"].map(h=><th key={h} style={{padding:"10px 16px",textAlign:"left",fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.04em",whiteSpace:"nowrap"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {filtered.length===0?<tr><td colSpan={7} style={{textAlign:"center",padding:48,color:C.muted}}>{candidates.length===0?"Agrega tu primer candidato":"Sin resultados"}</td></tr>
              :filtered.map(c=><tr key={c.id} className="rp-row" style={{borderBottom:`1px solid ${C.border}`}}>
                <td style={{padding:"12px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:34,height:34,borderRadius:"50%",background:`${C.accent}20`,color:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,flexShrink:0}}>{(c.name||"?")[0].toUpperCase()}</div>
                    <div><div style={{fontWeight:500,color:C.text,fontSize:14}}>{c.name}</div>{c.cvFileName&&<div style={{fontSize:11,color:C.accent}}>☁️ {c.cvFileName}</div>}</div>
                  </div>
                </td>
                <td style={{padding:"12px 16px",fontSize:13,color:C.text}}>{c.position||"—"}</td>
                <td style={{padding:"12px 16px"}}><div style={{fontSize:12,color:C.muted}}>{c.email||"—"}</div><div style={{fontSize:12,color:C.muted}}>{c.phone||""}</div></td>
                <td style={{padding:"12px 16px",maxWidth:150}}><div style={{fontSize:12,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.skills||"—"}</div></td>
                <td style={{padding:"12px 16px"}}><Badge color={STATUS_COLOR[c.status]||"neutral"}>{c.status||"Sin estado"}</Badge></td>
                <td style={{padding:"12px 16px",fontSize:12,color:C.muted,whiteSpace:"nowrap"}}>{fmtDate(c.createdAt)}</td>
                <td style={{padding:"12px 16px"}}>
                  <div style={{display:"flex",gap:5}}>
                    {c.cvUrl&&<a href={c.cvUrl} target="_blank" rel="noopener noreferrer" title="Ver CV" style={{background:`${C.accent}15`,border:"none",borderRadius:6,padding:"5px 8px",cursor:"pointer",color:C.accent,display:"inline-flex",alignItems:"center",textDecoration:"none"}}><IconExtLink size={14}/></a>}
                    <button onClick={()=>{setEditing(c);setShowModal(true);}} style={{background:`${C.info}15`,border:"none",borderRadius:6,padding:"5px 8px",cursor:"pointer",color:C.info}}><IconEdit size={14}/></button>
                    <button onClick={()=>handleDelete(c.id)} style={{background:`${C.danger}15`,border:"none",borderRadius:6,padding:"5px 8px",cursor:"pointer",color:C.danger}}><IconTrash size={14}/></button>
                  </div>
                </td>
              </tr>)}
            </tbody>
          </table>
        </div>
      </Card>
      <CandidateModal open={showModal} onClose={()=>setShowModal(false)} editing={editing} onSave={handleSave} saving={saving}/>
    </div>
  );
}

function CandidateModal({open,onClose,editing,onSave,saving}) {
  const blank={name:"",email:"",phone:"",position:"",status:"Activo",skills:"",notes:"",cvFileName:"",cvUrl:"",cvText:""};
  const [form,setForm]=useState(blank);
  const [cvFile,setCvFile]=useState(null);
  const fileRef=useRef();
  useEffect(()=>{setForm(editing?{...blank,...editing}:blank);setCvFile(null);},[editing,open]);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const handleCV=e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>10*1024*1024){alert("Máximo 10 MB");return;}
    setCvFile(file);setForm(f=>({...f,cvFileName:file.name}));
  };
  return(
    <Modal open={open} onClose={onClose} title={editing?"Editar candidato":"Nuevo candidato"} width={580}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Nombre completo" required value={form.name} onChange={set("name")}/>
          <Inp label="Correo electrónico" type="email" value={form.email} onChange={set("email")}/>
          <Inp label="Teléfono" value={form.phone} onChange={set("phone")}/>
          <Inp label="Cargo al que aplica" value={form.position} onChange={set("position")}/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <label style={{fontSize:12,fontWeight:600,color:C.text,textTransform:"uppercase",letterSpacing:"0.04em"}}>Estado del proceso</label>
          <select value={form.status} onChange={set("status")} style={{...inputSt}}>
            {STATUS_OPTS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <Inp label="Habilidades / Skills" value={form.skills} onChange={set("skills")} placeholder="ej: Excel avanzado, Liderazgo, Python..."/>
        <Inp label="Notas internas" value={form.notes} onChange={set("notes")} rows={2}/>
        <div>
          <label style={{fontSize:12,fontWeight:600,color:C.text,textTransform:"uppercase",letterSpacing:"0.04em",display:"block",marginBottom:6}}>Hoja de vida (CV)</label>
          <div style={{border:`2px dashed ${C.border}`,borderRadius:10,padding:16,textAlign:"center",background:C.bg}}>
            {form.cvFileName?(
              <div>
                <div style={{color:C.accent,fontWeight:500,fontSize:14,marginBottom:8}}>☁️ {form.cvFileName}</div>
                <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                  {form.cvUrl&&<a href={form.cvUrl} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:13,color:C.info,textDecoration:"none"}}><IconExtLink size={13}/> Ver CV actual</a>}
                  <Btn variant="ghost" size="sm" onClick={()=>{setCvFile(null);setForm(f=>({...f,cvFileName:"",cvUrl:""}));}}><IconX size={14}/> Cambiar</Btn>
                </div>
              </div>
            ):(
              <div>
                <IconUpload size={22} style={{display:"block",margin:"0 auto 8px",color:C.muted}}/>
                <p style={{color:C.muted,fontSize:13,margin:"0 0 10px"}}>PDF, DOC, DOCX — hasta 10 MB · Se sube a la nube ☁️</p>
                <Btn variant="secondary" size="sm" onClick={()=>fileRef.current.click()}>Seleccionar archivo</Btn>
              </div>
            )}
            <input ref={fileRef} type="file" accept=".pdf,.doc,.docx" style={{display:"none"}} onChange={handleCV}/>
          </div>
        </div>
        <Inp label="Resumen del CV (texto para análisis IA)" value={form.cvText} onChange={set("cvText")} rows={3} placeholder="Pega aquí el texto del CV o un resumen de experiencia y formación..."/>

          </Btn>
        </div>
      </div>
    </Modal>
  );
}

/* ═══ AI ANALYSIS VIEW ═══ */
function AIAnalysisView({candidates}) {
  const [selected,setSelected]=useState([]);
  const [position,setPosition]=useState("");
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState("");
  const toggle=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const allSelected=candidates.length>0&&selected.length===candidates.length;
  const analyze=async()=>{
    if(selected.length===0){setError("Selecciona al menos un candidato");return;}
    setLoading(true);setResult(null);setError("");
    const sel=candidates.filter(c=>selected.includes(c.id));
    const cvBlock=sel.map((c,i)=>`--- CANDIDATO ${i+1}: ${c.name.toUpperCase()} ---\nCargo: ${c.position||"N/A"} | Estado: ${c.status||"N/A"}\nHabilidades: ${c.skills||"N/A"}\nCV: ${c.cvText||"(Sin texto)"}\nNotas: ${c.notes||"Ninguna"}`).join("\n\n");
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:`Eres consultora senior de RRHH. Analiza estos candidatos${position?` para el cargo de "${position}"`:""}:\n\n${cvBlock}\n\nGenera un informe con:\n1. RESUMEN EJECUTIVO del pool\n2. ANÁLISIS INDIVIDUAL: fortalezas, áreas de mejora, idoneidad (Alta/Media/Baja) y calificación ★★★★★\n3. COMPARATIVA entre candidatos\n4. RECOMENDACIÓN FINAL justificada`}]})});
      const data=await resp.json();
      if(data.content?.[0]?.text)setResult(data.content[0].text);
      else setError("No se pudo obtener el análisis.");
    }catch{setError("Error de conexión.");}
    setLoading(false);
  };
  const download=()=>{
    const blob=new Blob([`ANÁLISIS IA DE CANDIDATOS\nRecrutaPlus · ${new Date().toLocaleDateString("es-EC")}\n${"=".repeat(60)}\n\n${result}`],{type:"text/plain;charset=utf-8"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`Analisis_${Date.now()}.txt`;a.click();URL.revokeObjectURL(url);
  };
  return(
    <div className="fade-in">
      <div style={{marginBottom:24}}><h1 style={{fontSize:24,fontWeight:700,color:C.text,marginBottom:4}}>Análisis IA de candidatos</h1><p style={{color:C.muted,fontSize:14}}>Selecciona CVs y obtén un informe profesional con inteligencia artificial</p></div>
      <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:20,alignItems:"start"}}>
        <div>
          <Card style={{marginBottom:14}}>
            <h3 style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:12}}>Contexto del análisis</h3>
            <Inp label="Cargo a evaluar (opcional)" value={position} onChange={e=>setPosition(e.target.value)} placeholder="ej: Gerente comercial..."/>
          </Card>
          <Card style={{padding:0,overflow:"hidden"}}>
            <div style={{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:14,fontWeight:600,color:C.text}}>Seleccionar CVs ({selected.length})</span>
              {candidates.length>0&&<button onClick={()=>setSelected(allSelected?[]:candidates.map(c=>c.id))} style={{background:"none",border:"none",cursor:"pointer",color:C.accent,fontSize:12,fontWeight:500,fontFamily:"inherit"}}>{allSelected?"Desmarcar todos":"Seleccionar todos"}</button>}
            </div>
            {candidates.length===0?<p style={{textAlign:"center",color:C.muted,padding:"24px 16px",fontSize:13}}>Primero agrega candidatos</p>
            :<div style={{maxHeight:360,overflowY:"auto"}}>

function FormsView({formSubmissions,refreshForms}) {
  const [selected,setSelected]=useState(null);

    const html=generateFormHTML(form.formData,{companyName:form.companyName,date:form.submittedAt});
    const blob=new Blob([html],{type:"application/msword;charset=utf-8"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`MAN-GTH-001_${(form.formData?.tituloPuesto||"Cargo").replace(/\s/g,"_")}_${form.companyName.replace(/\s/g,"_")}.doc`;
    a.click();URL.revokeObjectURL(url);
    await db.update("form_submissions",form.id,{downloaded:true});
    await refreshForms();
    setSelected(prev=>prev?.id===form.id?{...prev,downloaded:true}:prev);

        <Card style={{padding:0,overflow:"hidden"}}>
          {[...formSubmissions].sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt)).map(f=><div key={f.id} onClick={()=>setSelected(f)}
            style={{padding:"12px 14px",borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:selected?.id===f.id?`${C.accent}08`:"",borderLeft:`3px solid ${selected?.id===f.id?C.accent:"transparent"}`}}

/* ═══ SETTINGS VIEW ═══ */
function SettingsView({user,candidates,companies,formSubmissions}) {
  const [old,setOld]=useState("");const [neo,setNeo]=useState("");const [conf,setConf]=useState("");
  const [msg,setMsg]=useState(null);
  const handleChange=async()=>{
    if(!old||!neo||!conf){setMsg({t:"error",v:"Completa todos los campos"});return;}
    if(neo!==conf){setMsg({t:"error",v:"Las contraseñas no coinciden"});return;}
    if(neo.length<6){setMsg({t:"error",v:"Mínimo 6 caracteres"});return;}
    const users=await db.get("users",`id=eq.${user.id}`);
    if(!users?.length||users[0].password!==old){setMsg({t:"error",v:"La contraseña actual es incorrecta"});return;}
    const ok=await db.update("users",user.id,{password:neo});
    if(ok){setMsg({t:"success",v:"Contraseña actualizada correctamente"});setOld("");setNeo("");setConf("");}
    else setMsg({t:"error",v:"Error al actualizar."});
  };
  return(
    <div className="fade-in">
      <div style={{marginBottom:24}}><h1 style={{fontSize:24,fontWeight:700,color:C.text,marginBottom:4}}>Configuración</h1><p style={{color:C.muted,fontSize:14}}>Gestiona tu perfil y preferencias</p></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,maxWidth:820}}>
        <Card>
          <h3 style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:16}}>Cambiar contraseña</h3>
          {msg&&<div style={{marginBottom:14}}><AlertBox type={msg.t}>{msg.v}</AlertBox></div>}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <Inp label="Contraseña actual" type="password" value={old} onChange={e=>setOld(e.target.value)}/>
            <Inp label="Nueva contraseña" type="password" value={neo} onChange={e=>setNeo(e.target.value)}/>
            <Inp label="Confirmar nueva contraseña" type="password" value={conf} onChange={e=>setConf(e.target.value)}/>
            <Btn onClick={handleChange} style={{marginTop:4}}><IconLock size={15}/> Actualizar contraseña</Btn>
          </div>
        </Card>
        <Card>
          <h3 style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:16}}>Estado del sistema</h3>
          {[["Versión","RecrutaPlus v2.0 ☁️"],["Base de datos","Supabase (PostgreSQL)"],["Almacenamiento CVs","Supabase Storage"],["Usuario",user?.username||"admin"],["Candidatos",candidates.length],["Empresas",companies.length],["Formularios",formSubmissions.length]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:13,color:C.muted}}>{k}</span><span style={{fontSize:13,fontWeight:500,color:C.text}}>{v}</span></div>)}
          <div style={{marginTop:14,padding:"10px 14px",background:C.successL,borderRadius:8,display:"flex",gap:8,alignItems:"center",fontSize:13,color:"#065F46"}}><IconCheck size={15} color={C.success}/> Conectado a Supabase correctamente</div>
        </Card>
      </div>
    </div>
  );
}

    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <Card className="fade-in" style={{maxWidth:480,textAlign:"center",padding:52}}>
        <div style={{width:72,height:72,background:C.successL,borderRadius:"50%",margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"center"}}><IconCheck size={36} color={C.success}/></div>
        <h2 style={{color:C.text,marginBottom:10}}>¡Formulario enviado!</h2>
        <p style={{color:C.muted,marginBottom:24,lineHeight:1.6}}>Tu solicitud fue recibida exitosamente. La consultora se comunicará contigo a la brevedad.</p>
        <Btn variant="secondary" onClick={()=>{setSubmitted(false);setForm(EMPTY);}}>Enviar otro formulario</Btn>
      </Card>
    </div>
  );
  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      <div style={{background:C.primary,padding:"14px 32px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 10px rgba(0,0,0,0.2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,background:C.accent,borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center"}}><IconFile size={18} style={{color:"#fff"}}/></div>
          <div><div style={{color:"#fff",fontWeight:700,fontSize:16}}>RecrutaPlus</div><div style={{color:"rgba(255,255,255,0.55)",fontSize:11}}>{user.companyName||user.name}</div></div>
        </div>
        <button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.8)",borderRadius:8,padding:"7px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,fontFamily:"inherit"}}>
          <IconLogout size={14}/> Cerrar sesión
        </button>
      </div>
      <div style={{maxWidth:860,margin:"0 auto",padding:"32px 20px 60px"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{display:"inline-block",background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:8,padding:"4px 16px",fontSize:12,color:C.muted,marginBottom:14}}>Código: MAN-GTH-001 · Versión 01 · Fecha: {new Date().toLocaleDateString("es-EC")}</div>
          <h1 style={{fontSize:24,fontWeight:700,color:C.text,marginBottom:8}}>Manual de Funciones del Cargo</h1>
          <p style={{color:C.muted,fontSize:14}}>Complete el formulario con la información del cargo requerido</p>
        </div>
        <SH n="I" title="IDENTIFICACIÓN DEL CARGO"/>
        <SB>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            <div><label style={{fontSize:12,fontWeight:600,color:C.text,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>Título del puesto <span style={{color:C.danger}}>*</span></label><input value={form.tituloPuesto} onChange={setF("tituloPuesto")} style={fi}/></div>
            <div><label style={{fontSize:12,fontWeight:600,color:C.text,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>Área</label><input value={form.area} onChange={setF("area")} style={fi}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            <div><label style={{fontSize:12,fontWeight:600,color:C.text,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>Nivel jerárquico</label><input value={form.nivelJerarquico} onChange={setF("nivelJerarquico")} style={fi}/></div>
            <div><label style={{fontSize:12,fontWeight:600,color:C.text,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>Departamento</label><input value={form.departamento} onChange={setF("departamento")} style={fi}/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <div><div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.04em"}}>Informa a:</div>
              {[["Jerárquico","informaJerarquico"],["Funcional","informaFuncional"]].map(([l,k])=><div key={k} style={{marginBottom:10}}><label style={{fontSize:12,color:C.muted,display:"block",marginBottom:4}}>{l}:</label><input value={form[k]} onChange={setF(k)} style={fi}/></div>)}
            </div>
            <div><div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.04em"}}>Relaciones:</div>
              {[["Externas","relacionesExternas"],["Internas","relacionesInternas"]].map(([l,k])=><div key={k} style={{marginBottom:10}}><label style={{fontSize:12,color:C.muted,display:"block",marginBottom:4}}>{l}:</label><input value={form[k]} onChange={setF(k)} style={fi}/></div>)}
            </div>
          </div>
        </SB>
        <SH n="II" title="POSICIÓN ESTRUCTURAL"/>
        <SB><textarea value={form.posicionEstructural} onChange={setF("posicionEstructural")} rows={4} placeholder="Describe la posición dentro de la estructura organizacional..." style={{...fi,resize:"vertical"}}/></SB>
        <SH n="III" title="MISIÓN DEL CARGO"/>
        <SB><textarea value={form.misionCargo} onChange={setF("misionCargo")} rows={4} placeholder="Describe la misión principal del cargo..." style={{...fi,resize:"vertical"}}/></SB>
        <SH n="IV" title="RESPONSABILIDADES & AUTORIDADES DEL CARGO"/>
        <SB>
          <div style={{marginBottom:14}}><label style={{fontSize:12,fontWeight:700,color:C.text,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.04em"}}>Responsabilidades:</label><textarea value={form.responsabilidades} onChange={setF("responsabilidades")} rows={4} placeholder="Lista las principales responsabilidades..." style={{...fi,resize:"vertical"}}/></div>
          <div><label style={{fontSize:12,fontWeight:700,color:C.text,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.04em"}}>Autoridades:</label><textarea value={form.autoridades} onChange={setF("autoridades")} rows={3} placeholder="Describe las autoridades y niveles de decisión..." style={{...fi,resize:"vertical"}}/></div>
        </SB>
        <SH n="V" title="COMPETENCIAS"/>
        <SB>
          <div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.04em"}}>Educación formal</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {[["maestria","Maestría"],["titulo3","Título universitario (3er nivel)"],["estudiante","Estudiante o egresado de carreras universitarias"],["tecnologo","Tecnólogo"],["bachiller","Educación Secundaria Completa (Bachiller)"],["primaria","Educación Primaria Completa"]].map(([k,l])=><Cb key={k} label={l} checked={form.educacion[k]} onChange={setNested("educacion",k)}/>)}

            <div style={{display:"flex",alignItems:"center",gap:10,marginTop:10}}><span style={{fontSize:13,color:C.text,fontWeight:500,whiteSpace:"nowrap"}}>Educación en:</span><input value={form.educacion.educacionEn} onChange={setNested("educacion","educacionEn")} style={fi}/></div>

          <div style={{marginBottom:16,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.04em"}}>Experiencia:</div>
            <div style={{display:"flex",gap:20,flexWrap:"wrap",marginBottom:10}}>
              {[["sinExp","Sin experiencia"],["exp12","1-2 años"],["exp35","3-5 años"],["exp5",">5 años"]].map(([k,l])=><Cb key={k} label={l} checked={form.experiencia[k]} onChange={setNested("experiencia",k)}/>)}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:13,color:C.text,fontWeight:500,whiteSpace:"nowrap"}}>Experiencia en:</span><input value={form.experiencia.expEn} onChange={setNested("experiencia","expEn")} style={fi}/></div>
          </div>
          <div style={{paddingTop:14,borderTop:`1px solid ${C.border}`}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.04em"}}>Formación: Licencias, Certificaciones o Cursos en temas asociados a:</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <input value={form.formacion.cert1} onChange={setNested("formacion","cert1")} placeholder="Certificación / Licencia 1..." style={fi}/>
              <input value={form.formacion.cert2} onChange={setNested("formacion","cert2")} placeholder="Certificación / Licencia 2..." style={fi}/>
            </div>
          </div>
        </SB>
        <SH n="VI" title="REQUERIMIENTOS ESPECIALES"/>
        <SB>
          {[["req1","1"],["req2","2"],["req3","3"]].map(([k,n])=><div key={k} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <div style={{width:26,height:26,background:C.primary,color:"#fff",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>{n}</div>
            <input value={form.requerimientos[k]} onChange={setNested("requerimientos",k)} placeholder={`Requerimiento ${n}...`} style={fi}/>
          </div>)}
        </SB>
        <SH n="VII" title="LUGAR DE TRABAJO"/>
        <SB>
          <div style={{fontSize:12,color:C.muted,marginBottom:10}}>Los porcentajes deben sumar 100%</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:10}}>
            {[["teletrabajo","Teletrabajo"],["oficina","Oficina"],["obras","Obras"],["bodegas","Bodegas"]].map(([k,l])=><div key={k}>
              <label style={{fontSize:12,fontWeight:600,color:C.text,display:"block",marginBottom:5}}>{l}</label>
              <div style={{position:"relative"}}><input type="number" min="0" max="100" value={form.lugarTrabajo[k]} onChange={setNested("lugarTrabajo",k)} style={{...fi,paddingRight:28}}/><span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:13,color:C.muted}}>%</span></div>
            </div>)}
          </div>
          <div style={{padding:"9px 14px",background:lugarTotal===100?C.successL:C.warningL,borderRadius:8,fontSize:13,color:lugarTotal===100?"#065F46":"#92400E",display:"flex",alignItems:"center",gap:8}}>
            {lugarTotal===100?<IconCheck size={15} color={C.success}/>:<IconAlert size={15}/>} Total: <strong>{lugarTotal}%</strong>{lugarTotal!==100&&" — debe sumar 100%"}
          </div>
        </SB>
        <SH n="VIII" title="HERRAMIENTAS DE TRABAJO"/>
        <SB>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {[["extTelefonica","Extensión telefónica"],["correoInterno","Correo electrónico interno"],["llamadasExt","Llamadas al exterior"],["compEscritorio","Computador de escritorio"],["uniforme","Uniforme"],["compPortatil","Computador portátil"],["credencial","Credencial"],["celular","Celular asignado"],["epp","Equipo de protección personal EPP"],["radio","Radio asignado"],["vehiculo","Vehículo asignado"]].map(([k,l])=><Cb key={k} label={l} checked={form.herramientas[k]} onChange={setNested("herramientas",k)}/>)}
          </div>
        </SB>
        <div style={{textAlign:"center",marginTop:12}}>
          <button onClick={handleSubmit} disabled={sending} style={{background:sending?"#94A3B8":C.accent,color:"#fff",border:"none",borderRadius:12,padding:"14px 44px",fontSize:16,fontWeight:600,cursor:sending?"not-allowed":"pointer",display:"inline-flex",alignItems:"center",gap:10,fontFamily:"inherit"}}>
            {sending?<><Spinner size={18}/> Enviando...</>:<><IconCheck size={18}/> Enviar formulario</>}
          </button>
          <p style={{color:C.muted,fontSize:12,marginTop:12}}>Al enviar, la consultora recibirá tu solicitud de inmediato</p>
        </div>
      </div>
    </div>
  );
}

<table><tr><td colspan="3" class="sh">V. COMPETENCIAS</td></tr><tr><td class="lb" rowspan="7" style="width:22%;vertical-align:middle">EDUCACIÓN FORMAL</td><td style="width:60%">Maestría</td><td class="cb c" style="width:18%">${cb(data.educacion?.maestria)}</td></tr><tr><td>Título universitario (3er nivel)</td><td class="cb c">${cb(data.educacion?.titulo3)}</td></tr><tr><td>Estudiante o egresado de carreras universitarias</td><td class="cb c">${cb(data.educacion?.estudiante)}</td></tr><tr><td>Tecnólogo</td><td class="cb c">${cb(data.educacion?.tecnologo)}</td></tr><tr><td>Educación Secundaria Completa (Bachiller)</td><td class="cb c">${cb(data.educacion?.bachiller)}</td></tr><tr><td>Educación Primaria Completa</td><td class="cb c">${cb(data.educacion?.primaria)}</td></tr><tr><td colspan="2">Educación en: ${esc(data.educacion?.educacionEn)}</td></tr><tr><td class="lb">EXPERIENCIA:</td><td colspan="2"><b>Sin experiencia:</b> <span class="cb">${cb(data.experiencia?.sinExp)}</span> &nbsp;<b>1-2 años:</b> <span class="cb">${cb(data.experiencia?.exp12)}</span> &nbsp;<b>3-5 años:</b> <span class="cb">${cb(data.experiencia?.exp35)}</span> &nbsp;<b>&gt;5 años:</b> <span class="cb">${cb(data.experiencia?.exp5)}</span><br>Experiencia en: ${esc(data.experiencia?.expEn)}</td></tr><tr><td class="lb">FORMACIÓN:</td><td colspan="2">Licencias, Certificaciones o Cursos:<br>${esc(data.formacion?.cert1)}<br>${esc(data.formacion?.cert2)}</td></tr></table>

/* ═══ ROOT APP ═══ */
function App() {
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState("dashboard");
  const [candidates,setCandidates]=useState([]);
  const [companies,setCompanies]=useState([]);
  const [formSubmissions,setFormSubmissions]=useState([]);

  const refreshCandidates=async()=>{const d=await db.get("candidates","order=created_at.desc");setCandidates(d.map(mapCandidate));};
  const refreshCompanies=async()=>{const d=await db.get("users","role=eq.company");setCompanies(d.map(mapUser));};
  const refreshForms=async()=>{const d=await db.get("form_submissions","order=submitted_at.desc");setFormSubmissions(d.map(mapForm));};

  useEffect(()=>{
    (async()=>{
      await Promise.all([refreshCandidates(),refreshCompanies(),refreshForms()]);
      setLoading(false);
    })();
  },[]);

  const handleLogin=async(username,password)=>{
    const users=await db.get("users",`username=eq.${username}&password=eq.${password}`);
    if(!users?.length)return false;
    const u=mapUser(users[0]);
    if(u.active===false){alert("Esta cuenta está desactivada. Contacta a la consultora.");return false;}
    setUser(u);setView(u.role==="company"?"company-form":"dashboard");return true;
  };

  const handleLogout=()=>{setUser(null);setView("dashboard");};

  if(loading)return(
    <div style={{minHeight:"100vh",background:C.primary,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:"#fff"}}>
        <Spinner size={40}/>
        <div style={{fontSize:17,fontWeight:600,marginTop:16}}>RecrutaPlus</div>
        <div style={{fontSize:13,opacity:0.5,marginTop:6}}>Conectando a Supabase...</div>
      </div>
    </div>
  );

  if(!user)return <LoginPage onLogin={handleLogin}/>;

  if(user.role==="company")return(
    <CompanyApp user={user} onLogout={handleLogout} onSubmit={async formData=>{
      const sub={id:uid(),company_id:user.id,company_name:user.companyName||user.name,form_data:formData,downloaded:false};
      await db.insert("form_submissions",sub);await refreshForms();
    }}/>
  );

  return(
    <AdminApp
      user={user} view={view} setView={setView} onLogout={handleLogout}
      candidates={candidates} companies={companies} formSubmissions={formSubmissions}
      refreshCandidates={refreshCandidates} refreshCompanies={refreshCompanies} refreshForms={refreshForms}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
